/* ════════════════════════════════════════════════════════
   1 · TOKENS
   Valores brutos de identidad. Nada de selectores aquí.
   Cambiar esto afecta toda la app.
════════════════════════════════════════════════════════ */
:root{

  /* ── Superficies ── */
  --bg: #0A0A0A;
  --surf: #141414;
  --surf-2: #1A1A1A;
  --card-a: #141414;
  --card-b: #1A1A1A;
  --card-p: #141414;
  /* ── Bordes — dos niveles semánticos ──
     --bdr:   #2A2A2A  chrome estructural: nav, headers, UI interactiva
     --bdr-l: #1E1E1E  separación de contenido: ítems de lista, filas internas */
  --bdr: #2A2A2A;
  --bdr-l: #1E1E1E;

  /* ── Amber ── */
  --amber: #F59E0B;
  --amber-d: #D97706;
  --amber-06: rgba(245,158,11,.06);
  --amber-08: rgba(245,158,11,.08);
  --amber-10: rgba(245,158,11,.1);
  --amber-12: rgba(245,158,11,.12);
  --amber-20: rgba(245,158,11,.2);
  --amber-30: rgba(245,158,11,.3);
  --amber-60: rgba(245,158,11,.6);
  --orange: var(--amber);

  /* ── Texto ── */
  --white: #F0EDE8;
  --white-30: rgba(240,237,232,.3);
  --white-45: rgba(240,237,232,.45);
  --white-60: rgba(240,237,232,.6);
  --gray: #888888;
  --gray2: #555555;

  /* ── Verde ── */
  --green: #3AAA6E;
  --green-08: rgba(58,170,110,.08);
  --green-12: rgba(58,170,110,.12);
  --green-15: rgba(58,170,110,.15);
  --green-20: rgba(58,170,110,.2);

  /* ── Rojo ── */
  --red: #E05252;
  --red-03: rgba(224,80,80,.03);
  --red-06: rgba(224,80,80,.06);
  --red-08: rgba(224,80,80,.08);
  --red-12: rgba(224,82,82,.12);

  /* ── Amarillo ── */
  --yellow: #E5A020;
  --yellow-04: rgba(229,160,32,.04);
  --yellow-08: rgba(229,160,32,.08);
  --yellow-10: rgba(229,160,32,.1);
  --yellow-12: rgba(229,160,32,.12);

  /* ── Layout — radios ── */
  --r-sm:  4px;
  --r-md:  8px;
  --r:     11px;
  --r-pill:999px;

  /* ── Transiciones — velocidades semánticas ── */
  --tr-fast:   100ms ease;   /* feedback inmediato: hover color           */
  --tr-base:   150ms ease;   /* micro-interacción: botones, badges        */
  --tr-smooth: 200ms ease;   /* overlays, opacidades, estados             */
  --tr-enter:  300ms ease-out; /* entradas al DOM: paneles, drawers       */

  /* ── Layout — espaciado (escala base-2) ── */
  --sp-1:  4px;   /* micro: gaps inline, separaciones mínimas    */
  --sp-2:  8px;   /* xs:    gaps entre elementos, padding botones */
  --sp-3: 12px;   /* sm:    padding componentes pequeños          */
  --sp-4: 16px;   /* md:    padding componentes medianos          */
  --sp-5: 24px;   /* lg:    padding secciones y contenedores      */
  --sp-6: 32px;   /* xl:    separación entre secciones            */
  --sp-7: 48px;   /* 2xl:   padding vistas principales            */

  /* ── Layout — pósters (ratio 2:3) ── */
  --poster-xs-w: 40px;   /* thumbnail lista: Mi Plan, Planear, Sugerencias */
  --poster-xs-h: 60px;
  --poster-md-w: 72px;   /* chip standalone: Prio strip                    */
  --poster-md-h: 108px;
  --poster-lg-w: 96px;   /* card descubrimiento: Cartelera                 */
  --poster-lg-h: 144px;

  /* ── Tipografía — escala ── */
  --t-xs: 9px;
  --t-sm: 11px;
  --t-base: 13px;
  --t-md: 16px;
  --t-lg: 20px;
  --t-display: 30px;
  --flag-size: var(--t-base); /* 13px — tamaño único de flags/emojis de país */

  /* ── Tipografía — pesos ── */
  --w-regular: 500;
  --w-semi: 600;
  --w-bold: 700;
  --w-display: 800;

  /* ── Fuente ── */
  --font: 'Plus Jakarta Sans', sans-serif;


  /* ── Amber — opacidades extendidas ── */
  --amber-35: rgba(245,158,11,.35);
  --amber-40: rgba(245,158,11,.4);
  --amber-50: rgba(245,158,11,.5);
  --amber-55: rgba(245,158,11,.55);
  --amber-70: rgba(245,158,11,.7);
  --amber-85: rgba(245,158,11,.85);

  /* ── Overlays ── */
  --overlay-10: rgba(0,0,0,.1);
  --overlay-15: rgba(0,0,0,.15);
  --overlay-20: rgba(0,0,0,.2);
  --overlay-35: rgba(0,0,0,.35);
  --overlay-40: rgba(0,0,0,.4);
  --overlay-50: rgba(0,0,0,.5);
  --overlay-55: rgba(0,0,0,.55);
  --overlay-60: rgba(0,0,0,.6);
  --overlay-70: rgba(0,0,0,.7);
  --overlay-75: rgba(0,0,0,.75);
  --overlay-85: rgba(0,0,0,.85);

  /* ── Breakpoints ── */
  --bp-sm: 600px;
  --bp-md: 768px;
  --bp-lg: 960px;

  /* ── Tokens semánticos ── */
  --t-icon:           15px;
  --opacity-conflict: .22;
  --gray3:            #444444;
  --white-05:         rgba(255,255,255,.05);
  --white-15:         rgba(255,255,255,.15);
  --yellow-25:        rgba(229,160,32,.25);
  --green-00:         rgba(58,170,110,0);
  --green-35:         rgba(58,170,110,.35);
}


/* ════════════════════════════════════════════════════════
   2 · RESET & BASE
════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--white);font-family:var(--font);min-height:100vh}


/* ════════════════════════════════════════════════════════
   3 · LAYOUT
   Estructura global: header, navegación principal, tabs.
════════════════════════════════════════════════════════ */

/* Header */
.hdr{padding:var(--sp-5) var(--sp-5) var(--sp-3)}
.hdr-wordmark{font-family:var(--font);font-size:var(--t-display);font-weight:var(--w-display);line-height:1;letter-spacing:-.03em;color:var(--white)}
.hdr-wordmark span{color:var(--amber)}
/* Barra de contexto — Opción C
   Vive dentro de .hdr (padding:var(--sp-5)).
   margin negativo cancela ese padding → barra full-width.
   padding propio var(--sp-5) → contenido alineado con el wordmark. */
.hdr-fest-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surf);border-top:1px solid var(--bdr-l);border-bottom:1px solid var(--bdr-l);padding:var(--sp-2) var(--sp-5);cursor:pointer;-webkit-tap-highlight-color:transparent}
.hdr-fest-bar:active{background:var(--surf-2)}
.hdr-fest-left{display:flex;align-items:center;gap:var(--sp-2)}
.hdr-fest-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0}
.hdr-fest-name{font-size:var(--t-xs);font-weight:var(--w-bold);letter-spacing:.08em;text-transform:uppercase;color:var(--white-60)}
.hdr-fest-dates{font-size:var(--t-xs);font-weight:var(--w-semi);letter-spacing:.05em;text-transform:uppercase;color:var(--white-30)}
.hdr-fest-chev{font-size:var(--t-xs);color:var(--white-45);line-height:1;margin-left:var(--sp-1)}

/* Nav row (tabs de días en Planear) */
.nav-row{display:flex;align-items:stretch;border-bottom:1px solid var(--bdr);margin-top:var(--sp-1)}
.nav-row.hidden{display:none}
.nav-tabs{display:flex;flex:1;justify-content:space-evenly;gap:0;padding:0;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.fdr-filters{display:flex;align-items:center;flex-shrink:0}
.filter-row{display:flex;align-items:center;border-bottom:1px solid var(--bdr);padding:0 2px}
.filter-row.hidden{display:none}
/* ══════════════════════════════════════════════════════
   DAY-CHIP — componente apilado de día
   ABREV (9px, gray2) arriba / NÚMERO (20px, white) abajo
   Contextos: dtab | mplan-wk-col | av-row-lbl | mplan-nav
══════════════════════════════════════════════════════ */
.day-chip{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.day-chip-abr{font-size:var(--t-xs);font-weight:var(--w-bold);color:var(--gray2);text-transform:uppercase;letter-spacing:.5px;line-height:1}
.day-chip-num{font-size:var(--t-lg);font-weight:var(--w-semi);color:var(--white);line-height:1}
.dtab{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:var(--sp-2) var(--sp-3) var(--sp-2);cursor:pointer;color:var(--gray2);font-family:var(--font);transition:color var(--tr-base),border-color var(--tr-base);text-align:center}
.dtab-name{font-size:var(--t-lg);font-weight:var(--w-semi);display:block;line-height:1;letter-spacing:.08em;text-transform:uppercase;font-family:var(--font)}
.dtab-date{font-size:var(--t-xs);font-weight:var(--w-bold);display:block;margin-top:var(--sp-1);letter-spacing:.5px;text-transform:uppercase;opacity:.7;color:var(--gray2)}
.dtab-cnt{display:none}
.dtab:hover{color:var(--white)}
.dtab.on{color:var(--orange);border-bottom-color:var(--orange)}
.dtab.past{opacity:.35}

/* Navegación principal (bottom tabs) */
.main-nav{display:flex;border-bottom:1px solid var(--bdr);background:var(--surf)}
.main-nav-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:var(--sp-2) var(--sp-1) var(--sp-3);cursor:pointer;color:var(--gray2);font-family:var(--font);font-size:var(--t-base);font-weight:var(--w-semi);letter-spacing:.3px;text-align:center;transition:color var(--tr-base),border-color var(--tr-base);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-1);height:52px;box-sizing:border-box}
.main-nav-tab:active{opacity:.7}
.main-nav-tab.on{color:var(--orange);border-bottom-color:var(--orange)}
.main-nav-tab:hover:not(.on){color:var(--white)}
.main-nav-ico{font-size:var(--t-icon);line-height:1;height:20px;display:flex;align-items:center;justify-content:center}
.main-nav-lbl{font-size:var(--t-xs);letter-spacing:.08em;text-transform:uppercase;font-family:var(--font);font-weight:var(--w-bold)}

/* Vistas */
.ag-view{padding:var(--sp-4) var(--sp-5) 60px;display:none}
.ag-view.visible{display:block}
.hint{padding:0 var(--sp-5);font-size:var(--t-sm);color:var(--gray);min-height:0}
.hint.active{color:var(--orange)}
.cnt-line{padding:2px var(--sp-5) var(--sp-2);font-size:var(--t-sm);color:var(--gray)}
.cnt-line b{color:var(--white)}


/* ════════════════════════════════════════════════════════
   4 · COMPONENTES
   Elementos reutilizables en múltiples vistas.
════════════════════════════════════════════════════════ */

/* ── Filtros de sección ── */
.fdr-row{display:flex;gap:0;padding:0 var(--sp-2);border-bottom:1px solid var(--bdr)}
.fdr-row::-webkit-scrollbar{display:none}
.fdr-wrap{position:relative}
.fdr-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:var(--sp-2) var(--sp-2) var(--sp-2);cursor:pointer;color:var(--gray2);font-family:var(--font);font-size:var(--t-xs);font-weight:var(--w-bold);letter-spacing:.07em;text-transform:uppercase;display:inline-flex;align-items:center;gap:var(--sp-1);transition:color var(--tr-base),border-color var(--tr-base);white-space:nowrap;min-height:36px}
.fdr-btn:hover{color:var(--white)}
.fdr-btn.active{border-bottom-color:var(--orange);color:var(--orange)}
.fdr-arrow{font-size:var(--t-sm);transition:transform var(--tr-smooth);flex-shrink:0;font-family:var(--font)}
.fdr-arrow.open{transform:rotate(180deg)}
.fdr-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fdr-panel{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);z-index:200;min-width:190px;max-height:60vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.55)}
.fdr-panel.open{display:block}
.fdr-opt{display:block;width:100%;background:none;border:none;border-bottom:1px solid var(--bdr-l);text-align:left;padding:var(--sp-3) var(--sp-4);font-size:var(--t-sm);font-weight:var(--w-regular);color:var(--gray);cursor:pointer;font-family:var(--font);transition:background var(--tr-fast),color var(--tr-fast);white-space:nowrap}
.fdr-opt:last-child{border-bottom:none}
.fdr-opt:hover{background:var(--card-b);color:var(--white)}
.fdr-opt.on{color:var(--orange);background:var(--amber-08)}

.fdr-cnt{color:var(--gray2);font-size:var(--t-sm);margin-left:var(--sp-1)}

/* ── Filtros de sección horizontal ── */
.fbar-wrap{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bdr);-webkit-overflow-scrolling:touch}
.fbar-wrap::-webkit-scrollbar{display:none}
.fbar{display:flex;gap:0;padding:0 var(--sp-4);width:max-content;min-width:100%;align-items:center}
.fbar-lbl{font-size:var(--t-xs);color:var(--gray2);text-transform:uppercase;letter-spacing:1.2px;white-space:nowrap;flex-shrink:0;min-width:44px;font-weight:var(--w-semi);opacity:.6}
.fbtn{flex-shrink:0;padding:var(--sp-2) var(--sp-3) var(--sp-2);border-radius:0;border:none;border-bottom:1.5px solid transparent;margin-bottom:-1px;background:none;color:var(--gray2);font-size:var(--t-sm);font-weight:var(--w-regular);cursor:pointer;font-family:var(--font);transition:color var(--tr-base),border-color var(--tr-base);white-space:nowrap;min-height:30px;display:inline-flex;align-items:center;gap:var(--sp-1)}
.fbtn:active{opacity:.7}
.fbtn.on{border-bottom-color:var(--orange);color:var(--white)}
.agbar{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bdr);-webkit-overflow-scrolling:touch}
.agbar-inner{display:flex;gap:0;padding:0 var(--sp-4);align-items:center}
.agbar-lbl{font-size:var(--t-xs);color:var(--gray2);text-transform:uppercase;letter-spacing:1.2px;white-space:nowrap;flex-shrink:0;min-width:44px;font-weight:var(--w-semi);opacity:.6}
.agbar-btn{padding:var(--sp-2) var(--sp-3) var(--sp-2);border-radius:0;border:none;border-bottom:1.5px solid transparent;margin-bottom:-1px;background:none;color:var(--gray2);font-size:var(--t-sm);font-weight:var(--w-regular);cursor:pointer;font-family:var(--font);transition:color var(--tr-base),border-color var(--tr-base);white-space:nowrap;min-height:30px;display:inline-flex;align-items:center;gap:var(--sp-2)}
.agbar-btn:hover{color:var(--white)}
.agbar-btn.on{border-bottom-color:var(--orange);color:var(--white)}
.agbar-cnt{font-size:var(--t-sm);background:var(--white-30);border-radius:var(--r-sm);padding:1px var(--sp-2);font-weight:var(--w-semi);font-variant-numeric:tabular-nums}
.agbar-btn.on .agbar-cnt{background:var(--orange);color:var(--white)}

/* ── Búsqueda ── */
.ag-search-wrap{position:relative;margin-bottom:var(--sp-3);overflow:hidden}
.ag-search{display:block;width:100%;max-width:100%;min-width:0;box-sizing:border-box;background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r);color:var(--white);font-size:var(--t-base);padding:var(--sp-3) var(--sp-4) var(--sp-3) 40px /* icon accommodation */;font-family:var(--font);transition:border-color var(--tr-base);-webkit-appearance:none}
.ag-search::placeholder{color:var(--gray2)}
.ag-search:focus{outline:none;border-color:var(--orange)}
.ag-search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray2);pointer-events:none;display:flex;align-items:center}
.ag-search-results{background:var(--card-b);border:1px solid var(--bdr);border-radius:var(--r);margin-top:var(--sp-1);overflow:hidden;display:none}
.ag-search-results.open{display:block}
.ag-sr-item{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--bdr-l)}
.ag-sr-item:last-child{border-bottom:none}
.ag-sr-item:hover{background:var(--card-a)}
.ag-sr-title{font-size:var(--t-base);color:var(--white);font-weight:var(--w-semi);flex:1;min-width:0}
.ag-sr-meta{font-size:var(--t-sm);color:var(--gray)}
.ag-sr-add{background:none;border:1px solid var(--bdr);border-radius:var(--r-pill);color:var(--gray);font-size:var(--t-sm);padding:var(--sp-1) var(--sp-3);cursor:pointer;font-family:var(--font);transition:color var(--tr-base);white-space:nowrap;flex-shrink:0}
.ag-sr-add:hover{border-color:var(--orange);color:var(--orange)}
.ag-sr-add.added{border-color:var(--orange);color:var(--orange);background:var(--amber-08)}


/* ── Modal de conflictos ── */
.conflict-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:var(--sp-5)}
.conflict-modal-box{background:var(--surf-2);border:1px solid rgba(245,158,11,.4);border-radius:var(--r);max-width:320px;width:100%;overflow:hidden}
.conflict-modal-hdr{padding:var(--sp-4) var(--sp-5);background:var(--yellow-10);border-bottom:1px solid rgba(229,160,32,.25);font-size:var(--t-sm);font-weight:var(--w-bold);letter-spacing:.06em;text-transform:uppercase;color:var(--yellow)}
.conflict-modal-body{padding:var(--sp-3) var(--sp-5);font-size:var(--t-sm);color:var(--gray);line-height:1.6}
.conflict-modal-body b{color:var(--white)}
.conflict-modal-btns{display:flex;gap:var(--sp-2);padding:var(--sp-3) var(--sp-5);border-top:1px solid var(--bdr-l)}
.conflict-modal-btn{flex:1;padding:var(--sp-3);border-radius:var(--r-md);border:none;font-family:var(--font);font-size:var(--t-sm);font-weight:var(--w-semi);cursor:pointer;touch-action:manipulation}
.conflict-modal-btn.cancel{background:var(--card-b);color:var(--gray)}
.conflict-modal-btn.confirm{background:var(--orange);color:var(--white)}

/* ── Toast ── */
.prio-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--surf-2);border:1px solid #444;color:var(--white);font-size:var(--t-base);padding:var(--sp-3) var(--sp-5);border-radius:var(--r-md);z-index:9999;transition:opacity var(--tr-smooth);max-width:320px;width:calc(100% - 32px);text-align:center;pointer-events:none;line-height:1.5}
.prio-toast.warn{border-color:var(--yellow-12);color:var(--yellow)}

/* ── Badges ── */
.apertura-badge{display:inline-block;font-size:var(--t-xs);background:var(--orange);color:var(--white);font-weight:var(--w-bold);letter-spacing:1px;padding:2px var(--sp-2);border-radius:var(--r-md);font-family:var(--font);margin-right:var(--sp-2);vertical-align:middle;flex-shrink:0}
.past-badge{position:absolute;bottom:8px;right:10px;font-size:var(--t-xs);color:var(--gray2);font-weight:var(--w-semi);letter-spacing:.5px;z-index:2;background:rgba(0,0,0,.5);padding:1px var(--sp-2);border-radius:var(--r-sm)}
.ag-fi-prio-badge{position:absolute;top:5px;left:5px;font-size:var(--t-sm);color:var(--orange);background:rgba(0,0,0,.6);border-radius:var(--r-sm);padding:1px var(--sp-1);font-weight:var(--w-bold);pointer-events:none;z-index:3}

/* ── Poster ── */
.lb-poster{width:var(--poster-xs-w);height:var(--poster-xs-h);object-fit:cover;border-radius:var(--r-sm);flex-shrink:0;display:block;background:var(--surf-2)}
.lb-poster-ph{width:var(--poster-xs-w);height:var(--poster-xs-h);border-radius:var(--r-sm);flex-shrink:0;background:var(--surf-2);display:flex;align-items:center;justify-content:center;font-size:var(--t-base);opacity:.3}

/* ── Check-in ── */
.checkin-wrap{background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:var(--sp-3);overflow:hidden}
.checkin-hdr{padding:var(--sp-3) var(--sp-4);background:var(--amber-08);border-bottom:1px solid var(--bdr-l);font-size:var(--t-xs);font-weight:var(--w-bold);color:var(--amber-60);letter-spacing:.8px;text-transform:uppercase}
.checkin-item{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--bdr-l)}
.checkin-item:last-child{border-bottom:none}
.checkin-info{flex:1;min-width:0}
.checkin-title{font-size:var(--t-base);font-weight:var(--w-semi);color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.checkin-time{font-size:var(--t-sm);color:var(--gray);margin-top:1px}
.checkin-btns{display:flex;gap:var(--sp-2);flex-shrink:0}
.checkin-btn{padding:var(--sp-2) var(--sp-3);border-radius:var(--r-pill);border:1px solid var(--bdr);background:none;font-family:var(--font);font-size:var(--t-sm);font-weight:var(--w-semi);cursor:pointer;touch-action:manipulation;white-space:nowrap;transition:color var(--tr-base),border-color var(--tr-base)}
.checkin-btn.yes{color:var(--green);border-color:var(--green-20)}
.checkin-btn.yes:active{background:var(--green-15)}
.checkin-btn.no{color:var(--gray)}
.checkin-btn.no:active{background:var(--card-b)}
.checkin-result{background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:var(--sp-3);overflow:hidden}
.checkin-result-msg{padding:var(--sp-3) var(--sp-4);font-size:var(--t-sm);color:var(--gray);line-height:1.5}
.checkin-result-msg b{color:var(--white)}
.checkin-result-btns{display:flex;gap:var(--sp-2);padding:var(--sp-2) var(--sp-4) var(--sp-3)}
.checkin-result-btn{flex:1;padding:var(--sp-2);border-radius:var(--r-md);border:none;font-family:var(--font);font-size:var(--t-sm);font-weight:var(--w-semi);cursor:pointer;touch-action:manipulation;transition:opacity var(--tr-base)}
.checkin-result-btn.primary{background:var(--orange);color:var(--white)}
.checkin-result-btn.secondary{background:var(--card-b);color:var(--gray)}

/* ── Alternativas (⇄) ── */
.film-alts{background:var(--card-b);border-top:1px solid var(--bdr-l);border-radius:0 0 var(--r) var(--r);overflow:hidden}
.film-switch{background:none;border:1px solid var(--bdr);border-radius:var(--r-md);color:var(--white);font-size:var(--t-base);padding:var(--sp-1) var(--sp-3);cursor:pointer;font-family:var(--font);touch-action:manipulation;transition:background var(--tr-base),color var(--tr-base);flex-shrink:0;opacity:.7}
.film-switch:active{border-color:var(--orange);color:var(--orange)}
.film-switch.open{border-color:var(--orange);color:var(--orange);background:var(--amber-08)}
.checkin-opt{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--bdr-l);cursor:pointer;transition:background var(--tr-base);touch-action:manipulation}
.checkin-opt:active{background:var(--card-b)}
.checkin-opt-info{flex:1;min-width:0}
.checkin-opt-time{font-size:var(--t-sm);color:var(--orange);font-weight:var(--w-semi)}
.checkin-opt-title{font-size:var(--t-base);color:var(--white);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.checkin-opt-venue{font-size:var(--t-sm);color:var(--gray);margin-top:1px}
.checkin-opt-add{font-size:var(--t-lg);color:var(--orange);flex-shrink:0;padding:0 var(--sp-1)}

/* ── Sugerencias ── */
.suggestion-wrap{margin-top:var(--sp-5);padding-top:var(--sp-3);border-top:1px solid var(--bdr-l)}
.suggestion-day-lbl{display:flex;flex-direction:column;align-items:flex-start;gap:1px;margin:var(--sp-3) 0 var(--sp-2);padding-left:2px}
.suggestion-item{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) 0;border-bottom:1px solid var(--bdr-l);opacity:.9}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover{opacity:1}
.suggestion-time{font-family:var(--font);font-size:var(--t-md);color:var(--orange);letter-spacing:.5px;flex-shrink:0;min-width:46px}
.suggestion-info{flex:1;min-width:0}
.suggestion-title{font-size:var(--t-base);color:var(--white);font-weight:var(--w-semi)}
.suggestion-meta{font-size:var(--t-sm);color:var(--gray2);margin-top:2px}.suggestion-meta-ico{display:flex;align-items:center;gap:var(--sp-1);font-size:var(--t-sm);color:var(--gray2);margin-top:2px}.suggestion-meta-ico svg{flex-shrink:0;opacity:.7}
.suggestion-add{background:none;border:1px solid var(--bdr);border-radius:var(--r-pill);color:var(--gray);font-size:var(--t-sm);padding:2px var(--sp-2);cursor:pointer;font-family:var(--font);transition:background var(--tr-base),color var(--tr-base);white-space:nowrap;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.suggestion-add:hover{border-color:var(--orange);color:var(--orange)}

/* ── Tira próxima función ── */
.next-film-strip{background:var(--amber-08);border:1px solid var(--amber-30);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-3);display:flex;align-items:center;gap:var(--sp-3)}
.next-film-ico{font-size:var(--t-lg);flex-shrink:0}
.next-film-info{flex:1;min-width:0}
.next-film-countdown{font-size:var(--t-base);font-weight:var(--w-bold);color:var(--orange);line-height:1}
.next-film-title{font-size:var(--t-sm);color:var(--white);margin-top:var(--sp-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.next-film-venue{font-size:var(--t-sm);color:var(--gray);margin-top:1px}
.next-film-strip.now{background:var(--amber-12);border-color:var(--orange)}

/* ── Strip de prioridades ── */
.prio-strip{margin-bottom:var(--sp-3)}
.prio-strip-title{font-size:var(--t-xs);font-weight:var(--w-bold);color:var(--amber-60);letter-spacing:1px;text-transform:uppercase;margin-bottom:var(--sp-2);display:flex;align-items:center;gap:var(--sp-2);width:100%}
.prio-strip-row{display:flex;gap:var(--sp-2);overflow-x:auto;padding-bottom:var(--sp-1)}
.prio-chip{flex-shrink:0;width:var(--poster-md-w);position:relative;cursor:pointer}
.prio-chip-poster{width:var(--poster-md-w);height:var(--poster-md-h);object-fit:cover;border-radius:var(--r-md);display:block;background:var(--surf-2)}
.prio-chip-ph{width:72px;height:108px;border-radius:var(--r-md);background:var(--surf-2);display:flex;align-items:center;justify-content:center;font-size:var(--t-lg);opacity:.3}
.prio-chip-rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;color:var(--white);border-radius:50%;width:18px;height:18px;font-size:var(--t-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.prio-chip-title{font-size:var(--t-xs);color:var(--gray2);margin-top:var(--sp-1);line-height:1.2;text-align:center;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.prio-reminder{background:var(--amber-08);border:1px solid var(--amber-20);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-3);margin-bottom:var(--sp-3)}
.prio-reminder-title{font-size:var(--t-xs);font-weight:var(--w-bold);color:var(--amber-60);letter-spacing:.5px;text-transform:uppercase;margin-bottom:var(--sp-2)}
.prio-pill{display:inline-flex;align-items:center;gap:var(--sp-2);background:var(--amber-12);border:1px solid var(--amber-30);border-radius:var(--r);padding:2px var(--sp-2) 2px var(--sp-2);font-size:var(--t-sm);color:var(--white);margin:2px;cursor:pointer}
.prio-pill:hover{background:var(--amber-20)}
.prio-pill-rm{color:var(--orange);font-size:var(--t-xs);margin-left:2px}

/* ── Pulse "en curso" ── */
.now-pulse{display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;margin-right:var(--sp-1);animation:pulse-green 1.4s ease infinite;flex-shrink:0}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 var(--green-20)}60%{box-shadow:0 0 0 5px rgba(58,170,110,0)}}
.now-label{position:absolute;bottom:8px;left:8px;font-size:var(--t-xs);color:var(--green);font-weight:var(--w-bold);letter-spacing:.5px;display:flex;align-items:center;gap:var(--sp-1);background:rgba(0,0,0,.6);padding:2px var(--sp-2);border-radius:var(--r-md);z-index:3}

/* ── Utilidades ── */

/* ══════════════════════════════════════════════════════
   EMPTY-STATE — componente vacío unificado
   Uso: todos los tabs cuando no hay contenido
   ─────────────────────────────────────────────────────
   .empty-state          → contenedor centrado
   .empty-state-icon     → ícono SVG 20px, amber-60
   .empty-state-title    → mensaje principal, white
   .empty-state-sub      → subtexto / acción, gray
══════════════════════════════════════════════════════ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:var(--sp-6) var(--sp-5);gap:var(--sp-2)}
.empty-state-icon{color:var(--amber-60);display:flex;align-items:center;justify-content:center;margin-bottom:var(--sp-1)}
.empty-state-icon svg{width:20px;height:20px}
.empty-state-title{font-size:var(--t-base);font-weight:var(--w-semi);color:var(--white);line-height:1.4}
.empty-state-sub{font-size:var(--t-sm);color:var(--gray);line-height:1.5;max-width:240px}

.empty{grid-column:1/-1}
.empty span{font-size:44px;display:block;margin-bottom:var(--sp-3)}
.ok{color:var(--orange)}
.conflict-label{color:var(--yellow)}
.dur-long{color:var(--yellow);font-size:var(--t-sm);font-weight:var(--w-semi)}
.travel-warn{font-size:var(--t-sm);color:var(--gray);display:flex;align-items:center;gap:var(--sp-1);padding:var(--sp-1) var(--sp-2);background:var(--amber-06);border:1px solid var(--bdr-l);border-radius:var(--r-sm);margin:2px 0}


/* ════════════════════════════════════════════════════════
   5 · VISTAS
   Estilos específicos de cada tab.
════════════════════════════════════════════════════════ */

/* ── CARTELERA ── */
.grid{padding:var(--sp-3) var(--sp-3) 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:var(--sp-3);overflow:visible;grid-auto-rows:minmax(210px,auto)}

/* Card */
.card{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;position:relative;cursor:pointer;transition:opacity var(--tr-smooth),border-color var(--tr-smooth),box-shadow var(--tr-smooth);align-self:stretch}
.card:nth-child(odd){background:var(--card-a)}
.card:nth-child(even){background:var(--card-b)}
@media(hover:hover){.card:not(.conflict):hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.6);border-color:rgba(245,158,11,.35)}}
.card:active{opacity:.85}
.card.program{background:var(--surf-2)!important}
.card.selected{border-color:var(--orange)!important;box-shadow:0 0 0 2px var(--orange),0 8px 28px var(--amber-20)!important}
.card.conflict{opacity:.22;filter:grayscale(.8);cursor:default;pointer-events:none}
.card.conflict::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 6px,rgba(0,0,0,.15) 6px,rgba(0,0,0,.15) 7px);border-radius:var(--r);pointer-events:none}
.card.apertura{border-color:rgba(245,158,11,.55);box-shadow:0 0 16px var(--amber-10)}
.card.in-wl{border-color:rgba(245,158,11,.4)}
.card.in-watched{border-color:var(--green-20)}
.card.past-card{opacity:.5}

/* Card actions */
.card-actions{position:absolute;top:9px;right:10px;display:flex;gap:var(--sp-1);z-index:4}
.action-btn{background:rgba(0,0,0,.35);border:none;cursor:pointer;font-size:var(--t-sm);line-height:1;padding:var(--sp-1) var(--sp-2);color:var(--gray2);border-radius:var(--r-md);transition:color var(--tr-base),background var(--tr-base);display:inline-flex;align-items:center;justify-content:center}
.action-btn:active{transform:scale(.85)}
.action-btn.wl-on{color:var(--orange)}
.action-btn.w-on{color:var(--green)}
.action-btn.prio-btn{font-size:var(--t-base)}
.action-btn.prio-on{color:var(--orange)}

/* Card body — layout de poster + contenido */
.c-body{display:flex;flex-direction:row;gap:0;padding:0;flex:1;overflow:hidden}
.c-divider{height:1px;background:var(--bdr);flex-shrink:0}
.c-poster{flex-shrink:0;width:calc(var(--poster-lg-w) + 26px);padding:var(--sp-4) var(--sp-3) var(--sp-4) var(--sp-4)}
.c-poster img{width:var(--poster-lg-w);height:var(--poster-lg-h);object-fit:cover;display:block;border-radius:var(--r-md)}
.c-poster.empty{visibility:visible}
.c-poster-none{width:var(--poster-lg-w);height:var(--poster-lg-h);border-radius:var(--r-md);background:var(--surf-2);display:flex;align-items:center;justify-content:center;font-size:var(--t-lg);opacity:.3;flex-shrink:0}
.c-content{flex:1;min-width:0;padding:var(--sp-3) var(--sp-3) 0 0;display:grid;grid-template-rows:34px 38px 24px 18px 18px 1fr;gap:0;overflow:hidden}
.c-slot-time{height:34px;overflow:hidden;display:flex;align-items:center}
.c-slot-title{height:38px;overflow:hidden;display:flex;align-items:flex-start;padding-top:2px}
.c-slot-flags{height:24px;overflow:hidden;display:flex;align-items:center}
.c-slot-dur{height:18px;overflow:hidden;display:flex;align-items:center}
.c-slot-venue{height:18px;overflow:hidden;display:flex;align-items:center}
.c-meta-ico{display:flex;align-items:center;gap:var(--sp-1);font-size:var(--t-sm);color:var(--gray2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.c-meta-ico svg{flex-shrink:0;opacity:.7}

/* Card tipografía */
.c-time{font-family:var(--font);font-size:var(--t-md);font-weight:var(--w-bold);color:var(--orange);letter-spacing:.06em;line-height:1;text-transform:uppercase}
.c-title{font-size:var(--t-base);font-weight:var(--w-semi);color:var(--white);line-height:1.3;padding-right:var(--sp-7);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.c-title-en{font-size:var(--t-sm);color:var(--gray);font-style:italic;line-height:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.c-flags{font-size:var(--flag-size);line-height:1}
.c-dur-long{color:var(--yellow);font-size:var(--t-sm);font-weight:var(--w-semi)}
.c-venue-name{font-size:var(--t-base);font-weight:var(--w-regular);color:var(--gray);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.c-expand{display:flex;align-items:center;gap:var(--sp-2);font-size:var(--t-sm);color:var(--gray);cursor:pointer;user-select:none;transition:color var(--tr-base);font-weight:var(--w-semi);letter-spacing:.2px;white-space:nowrap}
.c-expand:hover{color:var(--orange)}
.c-expand-arrow{font-size:var(--t-sm);transition:transform var(--tr-smooth);display:inline-block}
.c-expand-arrow.open{transform:rotate(180deg)}

/* Lista de cortometrajes */
.c-film-list{display:none;border-top:1px solid var(--bdr-l);padding:var(--sp-1) var(--sp-4) var(--sp-1) var(--sp-4)}
.c-film-list.visible{display:block}
.c-film-thumb{width:var(--poster-xs-w);height:var(--poster-xs-h);object-fit:cover;border-radius:var(--r-sm);flex-shrink:0;display:block}
.c-film-thumb-ph{width:var(--poster-xs-w);height:var(--poster-xs-h);border-radius:var(--r-sm);flex-shrink:0;background:var(--surf-2);display:flex;align-items:center;justify-content:center;font-size:var(--t-sm);opacity:.3}
.c-film-item{display:flex;align-items:flex-start;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--amber-06)}
.c-film-item:last-child{border-bottom:none}
.c-film-num{font-family:var(--font);font-size:var(--t-sm);font-weight:var(--w-semi);color:var(--gray2);flex-shrink:0;line-height:1;min-width:16px;padding-top:1px}
.c-film-info{flex:1;min-width:0}
.c-film-title{font-size:var(--t-base);color:var(--gray);line-height:1.4;font-weight:var(--w-semi)}
.c-film-meta{font-size:var(--t-sm);color:var(--gray2);margin-top:var(--sp-1)}
.c-film-dur{font-size:var(--t-sm);color:var(--gray2);flex-shrink:0;white-space:nowrap;padding-top:1px}
.c-film-lb{display:flex;align-items:center;flex-shrink:0;opacity:.45;transition:opacity var(--tr-base);line-height:1;align-self:flex-start;margin-top:2px}
.c-film-lb:hover{opacity:1}
.c-title-pills{display:none;border-top:1px solid var(--bdr-l);padding-top:var(--sp-2);margin-top:2px;flex-wrap:wrap;gap:var(--sp-1)}
.c-title-pills.visible{display:flex}
.c-title-pill{font-size:var(--t-sm);color:var(--gray2);background:var(--amber-06);border-radius:var(--r-sm);padding:var(--sp-1) var(--sp-2)}

/* Card footer */
.c-foot{display:flex;flex-direction:row;align-items:center;gap:0;padding:0 var(--sp-4);background:rgba(0,0,0,.15);height:38px;flex-shrink:0;overflow:hidden}
.c-foot-left{display:flex;align-items:center;gap:var(--sp-2);min-width:0;overflow:hidden;flex-shrink:1}
.c-foot-space{flex:1;min-width:8px}
.c-foot-right{display:flex;align-items:center;gap:var(--sp-2);flex-shrink:0;white-space:nowrap}
.c-sec{font-size:var(--t-sm);padding:var(--sp-1) var(--sp-2);border-radius:var(--r-pill);background:var(--surf);border:1px solid var(--bdr);color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:border-color var(--tr-base),color var(--tr-base);flex-shrink:1;min-width:0;max-width:150px}
.c-lb{flex-shrink:0!important}
.c-sec:hover{border-color:var(--orange);color:var(--orange)}
.c-sec.active-sec{border-color:var(--orange);color:var(--orange);background:var(--amber-08)}
.c-lb{display:inline-flex;align-items:center;gap:var(--sp-1);background:var(--surf-2);border:1px solid var(--bdr);border-radius:var(--r-pill);padding:var(--sp-1) var(--sp-2) var(--sp-1) var(--sp-2);cursor:pointer;transition:border-color var(--tr-base),transform var(--tr-base);line-height:1;flex-shrink:0;text-decoration:none}
.c-lb:hover{border-color:var(--gray);transform:scale(1.04)}
.c-lb-text{font-size:var(--t-sm);font-weight:var(--w-semi);color:var(--gray);letter-spacing:.2px;white-space:nowrap}
.c-dur{font-size:var(--t-sm);color:var(--gray);white-space:nowrap;flex-shrink:0}
.prog-badge{font-size:var(--t-sm);color:var(--gray2);font-weight:var(--w-semi);letter-spacing:.4px;white-space:nowrap}

/* ── SELECCIÓN ── */
.ag-section{margin-bottom:var(--sp-5)}
.ag-section-title{font-size:var(--t-xs);font-weight:var(--w-bold);color:var(--amber-60);letter-spacing:1px;text-transform:uppercase;margin-bottom:var(--sp-3);display:flex;align-items:center;gap:var(--sp-2)}
.ag-film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,130px));gap:var(--sp-2);margin-bottom:var(--sp-2);justify-content:start}
.ag-film-item{position:relative;border-radius:var(--r-md);overflow:hidden;background:var(--card-a);border:1px solid var(--bdr);cursor:default}
.ag-film-item.watched-item{opacity:.55}

.ag-watched-section{margin-top:var(--sp-3)}
.ag-watched-item{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-2) var(--sp-3);background:var(--card-p);border:1px solid var(--bdr-l);border-radius:var(--r-md);margin-bottom:var(--sp-2);opacity:.6}
.ag-wi-flag{font-size:var(--t-base);flex-shrink:0}

/* ── PLANEAR ── */

.av-pills{display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-bottom:var(--sp-2)}

.av-add-btn{background:var(--amber-10);border:1px solid var(--amber-30);border-radius:var(--r-md);color:var(--orange);font-size:var(--t-sm);font-weight:var(--w-semi);padding:var(--sp-2) var(--sp-3);cursor:pointer;font-family:var(--font);transition:background var(--tr-base)}

.av-full-btn.active{border-color:var(--red-08);color:var(--red);background:var(--red-06)}

/* ══════════════════════════════════════════════════════
   SISTEMA DE BOTONES — 4 niveles semánticos
   ─────────────────────────────────────────────────────
   PRIMARIO   .av-calc-btn .ag-save-btn
              fondo sólido, full-width, w-display, uppercase
   SECUNDARIO .av-add-btn .ctx-btn .checkin-btn
              fondo tintado/sólido, inline, w-semi
   TERCIARIO  .av-plus-btn .av-full-btn .ag-card-btn
              ghost (borde + transparent), w-regular, sp-2/sp-3
   ICONO      .ag-fi-btn .action-btn .film-switch
              sin texto, padding mínimo, bg contextual
══════════════════════════════════════════════════════ */
.av-calc-btn{width:100%;margin-top:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-radius:var(--r-md);background:var(--orange);border:none;color:var(--bg);font-size:var(--t-sm);font-weight:var(--w-display);letter-spacing:.12em;text-transform:uppercase;cursor:pointer;font-family:var(--font);transition:opacity var(--tr-base)}
.av-calc-btn:hover{opacity:.88}
.av-calc-btn:disabled{opacity:.35;cursor:default}

/* Resultados / Escenarios */
.ag-calc-prompt{text-align:center;padding:var(--sp-5) var(--sp-5);color:var(--gray);font-size:var(--t-sm);line-height:1.6;background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r)}
.ag-calc-prompt strong{color:var(--orange);font-size:var(--t-sm);font-weight:var(--w-bold);letter-spacing:.06em}

.ag-summary-title{font-family:var(--font);font-size:var(--t-lg);color:var(--white);letter-spacing:.5px;margin-bottom:var(--sp-2)}
.ag-summary-text{font-size:var(--t-sm);color:var(--gray);line-height:1.6}
.ag-summary-text b{color:var(--white)}
.ag-save-btn{width:100%;margin-top:var(--sp-3);padding:var(--sp-3);border-radius:var(--r-md);background:var(--green-12);border:1px solid rgba(58,170,110,.35);color:var(--green);font-size:var(--t-sm);font-weight:var(--w-display);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:var(--font);transition:background var(--tr-base)}
.ag-save-btn:hover{background:var(--green-20)}
.ag-nav{display:flex;align-items:center;justify-content:center;gap:var(--sp-3);margin-top:var(--sp-3)}
.ag-nav-btn{background:none;border:1px solid var(--bdr);color:var(--gray);border-radius:var(--r-pill);padding:var(--sp-2) var(--sp-4);font-size:var(--t-sm);cursor:pointer;font-family:var(--font);transition:color var(--tr-base),border-color var(--tr-base)}
.ag-nav-btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange)}
.ag-nav-btn:disabled{opacity:.3;cursor:default}
.ag-nav-pos{font-size:var(--t-sm);color:var(--gray)}
.ag-conflicts{background:var(--surf);border:1px solid #3a2020;border-radius:var(--r);padding:var(--sp-3);margin-bottom:var(--sp-4)}
.ag-conflicts-title{font-size:var(--t-xs);color:var(--yellow);text-transform:uppercase;letter-spacing:1px;font-weight:var(--w-semi);margin-bottom:var(--sp-2)}
.ag-conflict-item{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-2);font-size:var(--t-sm);color:var(--gray);line-height:1.5;padding:var(--sp-2) 0;border-bottom:1px solid rgba(255,255,255,.05)}

.ag-prioritize-btn{background:none;border:1px solid #555;border-radius:var(--r-pill);color:var(--gray);font-size:var(--t-sm);padding:var(--sp-2) var(--sp-3);cursor:pointer;white-space:nowrap;font-family:var(--font);transition:background var(--tr-base),color var(--tr-base);flex-shrink:0}
.ag-prioritize-btn:hover{border-color:var(--orange);color:var(--orange)}
.ag-prioritize-btn.active{border-color:var(--orange);color:var(--orange);background:var(--amber-10)}
.ag-day-label{font-family:var(--font);display:flex;align-items:flex-end;gap:var(--sp-2);margin:var(--sp-5) 0 var(--sp-2);padding-bottom:var(--sp-2);border-bottom:1px solid var(--bdr-l)}
.ag-day-name{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.ag-day-cnt{font-size:var(--t-sm);font-weight:400;color:var(--gray);letter-spacing:.02em;text-transform:none}
.ag-card{background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-1);display:flex;align-items:center;gap:var(--sp-3)}
.ag-time{font-family:var(--font);font-size:var(--t-md);color:var(--orange);letter-spacing:.5px;line-height:1;flex-shrink:0;min-width:40px}
.ag-info{flex:1;min-width:0}
.ag-title{font-size:var(--t-base);font-weight:var(--w-semi);color:var(--white);line-height:1.3}
.ag-venue{font-size:var(--t-sm);color:var(--gray);margin-top:2px}
.ag-alts{font-size:var(--t-sm);color:var(--orange);margin-left:var(--sp-1);font-weight:var(--w-semi)}
.ag-flags{font-size:var(--t-base);flex-shrink:0}
.ag-card-actions{display:flex;gap:var(--sp-1);flex-shrink:0}
.ag-card-btn{background:none;border:1px solid var(--bdr);border-radius:var(--r-md);cursor:pointer;font-size:var(--t-sm);padding:var(--sp-2) var(--sp-3);color:var(--gray2);transition:color var(--tr-base),border-color var(--tr-base);line-height:1}
.ag-card-btn:hover{border-color:var(--green);color:var(--green)}
.ag-warn{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1) var(--sp-2);margin-bottom:var(--sp-1);background:var(--yellow-08);border-radius:var(--r-md);font-size:var(--t-sm);color:var(--yellow)}

/* ── MI PLAN ── */
.saved-agenda{padding:0;margin-bottom:var(--sp-5)}
.saved-agenda-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3)}
.saved-agenda-clear{background:none;border:none;cursor:pointer;color:var(--gray2);font-size:var(--t-xs);font-weight:var(--w-bold);letter-spacing:.08em;text-transform:uppercase;padding:var(--sp-1) var(--sp-2);border:1px solid var(--bdr);border-radius:var(--r-pill);font-family:var(--font);transition:color var(--tr-base),border-color var(--tr-base)}

.share-menu-wrap{position:relative}

/* Calendario semanal */

.mplan-nav-labels{display:flex;flex:1}

.mplan-nav-day-name{font-size:var(--t-xs);font-weight:var(--w-bold);letter-spacing:.5px;text-transform:uppercase;color:var(--gray2)}
.mplan-nav-day-num{font-family:var(--font);font-size:var(--t-lg);line-height:1;color:var(--white);font-weight:var(--w-semi)}
.mplan-wk-col:last-child{border-right:none}
.mplan-wk-col:hover{background:var(--amber-06)}
.mplan-wk-col.wk-active{background:var(--amber-06)}
.mplan-wk-col-hdr{height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-bottom:1px solid var(--bdr);background:var(--surf);position:sticky;top:0;z-index:4}
.mplan-wk-col.wk-today .mplan-wk-col-hdr{background:var(--amber-08)}

.mplan-wk-col-day{display:flex;flex-direction:column;align-items:center;gap:1px}
.mplan-wk-day-name{font-size:var(--t-xs);font-weight:var(--w-bold);letter-spacing:.5px;text-transform:uppercase;color:var(--gray2)}
.mplan-wk-col.wk-today .mplan-wk-day-name{color:var(--orange)}

.mplan-wk-col-date{font-family:var(--font);font-size:var(--t-lg);line-height:1;color:var(--white);font-weight:var(--w-semi)}

.mplan-wk-col-dot{width:4px;height:4px;border-radius:50%;background:var(--orange);opacity:.7}
.mplan-wk-hline{position:absolute;left:0;right:0;height:0.5px;background:var(--bdr-l);pointer-events:none}
.mplan-wk-hline.mp-major{background:var(--bdr)}

.mplan-wk-block{position:absolute;left:5px;right:5px;border-radius:var(--r-md);overflow:hidden;padding:var(--sp-2) var(--sp-2) var(--sp-2) var(--sp-3);border-left:3px solid transparent;cursor:pointer;transition:opacity var(--tr-base)}
.mplan-wk-block:hover{opacity:.85}
.mplan-wk-block.mp-regular{background:var(--amber-10);border-left-color:rgba(245,158,11,.7)}

.mplan-wk-block.mp-program{background:var(--amber-06);border-left-color:rgba(245,158,11,.4)}
.mplan-wk-block.mp-past{filter:saturate(.2);opacity:.3}
.mplan-wk-block.mp-active{outline:2px solid var(--orange);outline-offset:-2px;opacity:1}
.mplan-wk-block.mp-now{opacity:1;border-left-color:var(--green);background:var(--green-12)}
.mplan-wk-badge{font-size:var(--t-xs);color:var(--orange);line-height:1;margin-bottom:2px}
.mplan-wk-time{font-size:var(--t-xs);color:var(--gray);line-height:1;margin-bottom:var(--sp-1)}
.mplan-wk-title{font-size:var(--t-sm);font-weight:var(--w-semi);color:var(--white);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.mplan-wk-venue{font-size:var(--t-xs);color:var(--gray);margin-top:var(--sp-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mplan-body{display:flex;position:relative}
.mplan-axis-detail{width:36px;flex-shrink:0;position:relative;border-right:1px solid var(--bdr-l);background:var(--surf)}
.mplan-axis-tick{position:absolute;right:4px;font-size:var(--t-xs);color:var(--gray2);line-height:1;transform:translateY(-50%);white-space:nowrap}
.mplan-tl{flex:1;position:relative;background:var(--bg)}
.mplan-hline{position:absolute;left:0;right:0;height:0.5px;background:var(--bdr-l);pointer-events:none}
.mplan-hline.mp-major{background:var(--bdr)}
.mplan-block{position:absolute;left:4px;right:3px;border-radius:var(--r-sm);overflow:hidden;padding:var(--sp-1) var(--sp-2) var(--sp-1) var(--sp-2);border-left:3px solid transparent}
.mplan-block.mp-regular{background:var(--amber-08);border-left-color:rgba(245,158,11,.55)}
.mplan-block.mp-priority{background:var(--amber-12);border-left-color:rgba(245,158,11,.85)}
.mplan-block.mp-program{background:var(--amber-06);border-left-color:rgba(245,158,11,.35)}
.mplan-block.mp-past{filter:saturate(.2);opacity:.35}
.mplan-block.mp-now{opacity:1;border-left-color:var(--green);background:var(--green-08)}
.mplan-block-badge{font-size:var(--t-xs);color:var(--orange);line-height:1;margin-bottom:1px;opacity:.8}
.mplan-block-time{font-size:var(--t-xs);color:var(--gray2);line-height:1;margin-bottom:2px}
.mplan-block-title{font-size:var(--t-sm);color:var(--white);font-weight:var(--w-semi);line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mplan-block-venue{font-size:var(--t-xs);color:var(--gray);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mplan-nowline-detail{position:absolute;left:0;right:0;height:2px;background:var(--green);z-index:10;pointer-events:none}
.mplan-nowdot-detail{position:absolute;left:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--orange)}

/* Lista de detalle */

     Se aplica a AMBOS lados (claves y título buscado).
     Previene mismatch entre U+2019 (tipográfico) y U+0027 (ASCII).

   REGLA: NUNCA acceder SHORT_IMGS/POSTERS/CUSTOM_POSTERS directamente
   en templates — siempre usar getPosterSrc(title, isCortos).
══════════════════════════════════════════════════════ */
const normKey = s => s.replace(/[\u2018\u2019\u201A\u201B\u2032\u02BC]/g, "'");

// Pre-normalizar claves de los tres diccionarios al cargar
const _CUSTOM_N  = Object.fromEntries(Object.entries(CUSTOM_POSTERS).map(([k,v])=>[normKey(k),v]));
const _SHORT_N   = Object.fromEntries(Object.entries(SHORT_IMGS).map(([k,v])=>[normKey(k),v]));
const _POSTERS_N = Object.fromEntries(Object.entries(POSTERS).map(([k,v])=>[normKey(k),v]));

function getPosterSrc(title, isCortos){
  const t = normKey(title);
  // 1. Custom manual
  if(_CUSTOM_N[t]) return _CUSTOM_N[t];
  // 2. Short film — FICCI URL o TMDB directo
  if(isCortos && _SHORT_N[t]) return _SHORT_N[t];
  // 3. Feature/corto — TMDB path
  if(_POSTERS_N[t]) return TMDB_IMG + _POSTERS_N[t];
  // 4. Fallback FICCI para programas/cortos sin poster
  if(isCortos) return FICCI_POSTER_URL;
  return null;
}

const FESTIVAL_DATES={

// Check if a screening has passed (with 10 min grace)

// ═══════════════════════════════════════════════════════════════
// 4 · UTILIDADES
//     Funciones puras: fechas, tiempo, conflictos, normalización
// ═══════════════════════════════════════════════════════════════
function screeningPassed(s){
  const dateStr=FESTIVAL_DATES[s.day];
  if(!dateStr) return false;
  const screeningTime=new Date(`${dateStr}T${s.time}:00`);
  screeningTime.setMinutes(screeningTime.getMinutes()+10); // 10 min grace
  return simNow()>screeningTime;
}
function dayFullyPassed(day){
  const dateStr=FESTIVAL_DATES[day];
  if(!dateStr) return false;
  // Day passed if last function of that day has passed
  const dayFilms=FILMS.filter(f=>f.day===day);
  if(!dayFilms.length) return false;
  const lastTime=dayFilms.reduce((max,f)=>f.time>max?f.time:max,'00:00');
  const lastScreen=new Date(`${dateStr}T${lastTime}:00`);
  lastScreen.setMinutes(lastScreen.getMinutes()+10);
  return simNow()>lastScreen;
}
function isNowShowing(f){
  const dateStr=FESTIVAL_DATES[f.day];if(!dateStr) return false;
  const now=simNow();
  const start=new Date(`${dateStr}T${f.time}:00`);
  const dur=f.duration?parseInt(f.duration):90;
  const end=new Date(start.getTime()+dur*60000);
  return now>=start&&now<=end;
}
function isToday(day){
  const dateStr=FESTIVAL_DATES[day];
  if(!dateStr) return false;
  const today=simTodayStr();
  return dateStr===today;
}

const VENUES={
  'Teatro Adolfo Mejía':{short:'Teatro Adolfo Mejía'},
  'CC Bocagrande':      {short:'CC Bocagrande'},
  'CC Caribe Plaza':    {short:'CC Caribe Plaza'},
  'Auditorio Nido':     {short:'Auditorio Nido'},
  'Plaza Proclamación': {short:'Plaza Proclamación'},
  'C. Convenciones':    {short:'C. de Convenciones'},
  'Unibac':             {short:'Unibac'},
  'AECID':              {short:'AECID'},
};
function vcfg(v){
  if(v.includes('Teatro Adolfo'))  return VENUES['Teatro Adolfo Mejía'];
  if(v.includes('Bocagrande'))     return VENUES['CC Bocagrande'];
  if(v.includes('Caribe Plaza'))   return VENUES['CC Caribe Plaza'];
  if(/nido/i.test(v))              return VENUES['Auditorio Nido'];
  if(v.includes('Proclamación'))   return VENUES['Plaza Proclamación'];
  if(/unibac/i.test(v))            return VENUES['Unibac'];
  if(/aecid/i.test(v))             return VENUES['AECID'];
  if(v.includes('Convenciones'))   return VENUES['C. Convenciones'];
  return VENUES['C. Convenciones'];
}
function sala(v){const m=v.match(/Sala\s*(\d+)/)||v.match(/Sal[oó]n\s*(\d+)/i);return m?'Sala '+m[1]:'';}
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function parseDur(d){const m=d&&d.replace('~','').match(/(\d+)/);return m?parseInt(m[1]):90;}
function minToStr(m){
  const h=Math.floor(((m%1440)+1440)%1440/60),mn=((m%1440)+1440)%1440%60;
  return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
}
function screensConflict(a,b){
  if(a.day!==b.day) return false;
  const aS=toMin(a.time)-10,aE=toMin(a.time)+parseDur(a.duration)+10;
  const bS=toMin(b.time)-10,bE=toMin(b.time)+parseDur(b.duration)+10;
  return aS<bE&&bS<aE;
}
function travelMins(venueA,venueB){
  const g=v=>v.includes('Bocagrande')?'bog':v.includes('Caribe Plaza')?'cp':'centro';
  const g1=g(venueA),g2=g(venueB);
  if(g1===g2) return 0;
  if((g1==='bog'&&g2==='cp')||(g1==='cp'&&g2==='bog')) return 13;
  if(g1==='centro'||g2==='centro') return g1==='cp'||g2==='cp'?16:12;
  return 0;
}
function travelWarn(s1,s2){
  if(s1.day!==s2.day) return null;
  const travel=travelMins(s1.venue,s2.venue);
  if(travel===0) return null;
  const gap=toMin(s2.time)-(toMin(s1.time)+parseDur(s1.duration));
  if(gap<travel+10) return`▲ ~${travel} min en carro entre estas sedes`;
  return null;
}

// Normalize text for accent-insensitive search
function normalize(str){
  return str.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
}

// ── Simulation clock (dev tool) ──
let _simTime=null; // null = real time
function simNow(){return _simTime?new Date(_simTime):new Date();}
function simTodayStr(){
  // Usa fecha LOCAL (no UTC) para consistencia con getHours()/getMinutes()
  // toISOString() devuelve UTC — en Colombia (UTC-5) esto da el día siguiente
  // después de las 7 PM, causando que la línea "ahora" aparezca en el día incorrecto
  const d=simNow();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

const MPLAN_START_H=10,MPLAN_END_H=24;
const MPLAN_TOTAL_MINS=(MPLAN_END_H-MPLAN_START_H)*60;
const MPLAN_PX_PER_MIN=52/60;
const MPLAN_DETAIL_H=MPLAN_TOTAL_MINS*MPLAN_PX_PER_MIN;

// 6 · MI PLAN — HELPERS & RENDER
//     mplanPx, mplanPct, renderMiPlanCalendar, selectMiPlanDay

function mplanPx(min){return(min-MPLAN_START_H*60)*MPLAN_PX_PER_MIN;}
function mplanPct(min){return((min-MPLAN_START_H*60)/MPLAN_TOTAL_MINS*100);}
function mplanEndStr(t,d){const m=toMin(t)+d;return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}

function mplanBlockType(s){
  if(prioritized.has(s._title)) return'mp-priority';
  const f=FILMS.find(fi=>fi.title===s._title);
  if(f&&f.is_cortos) return'mp-program';
  return'mp-regular';
}


function selectMiPlanDay(idx){
  activeMiPlanDay=idx;
  if(idx<miPlanViewStart||idx>=miPlanViewStart+2) miPlanViewStart=Math.min(idx,DAY_KEYS.length-2);
  renderAgenda();
  // Scroll to detail section below calendar
  setTimeout(()=>{
    const detail=document.getElementById('mplan-detail');
    if(detail) detail.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}
function miPlanNav(dir){
  miPlanViewStart=Math.max(0,Math.min(DAY_KEYS.length-2,miPlanViewStart+dir));
  if(activeMiPlanDay<miPlanViewStart||activeMiPlanDay>=miPlanViewStart+2) activeMiPlanDay=miPlanViewStart;
  _rerenderMiPlan();
}

function renderMiPlanCalendar(){
  if(!savedAgenda||!savedAgenda.schedule.length) return'';
  const schedule=savedAgenda.schedule;
  const todayStr=simTodayStr();
  const nowDayIdx=DAY_KEYS.findIndex(d=>FESTIVAL_DATES[d]===todayStr);
  const nowMin=simNow().getHours()*60+simNow().getMinutes();
  if(activeMiPlanDay===null){
    const firstDayWithFilm=DAY_KEYS.findIndex(d=>schedule.some(s=>s.day===d));
    activeMiPlanDay=nowDayIdx>=0?nowDayIdx:Math.max(0,firstDayWithFilm);
  }

  // ── Layout constants ──
  const PHDR=44;   // px for sticky day header
  const PPH=window.innerWidth<=600?40:64; // mobile: 46px/hr, desktop: 64px/hr
  const SH=9;      // start hour
  const EH=25;     // end hour (1am = 25 to show late-night films)
  const TOTAL=(EH-SH)*PPH;
  function toPx(min){return(min-SH*60)/60*PPH;}

  // ── Time axis labels (every hour, on the left) ──
  const axisHtml=Array.from({length:EH-SH+1},(_,k)=>{
    const h=SH+k;
    const top=PHDR+toPx(h*60);
    const lbl=(h%24)+':00';
    return`<div class="mplan-wk-htick" style="top:${top.toFixed(0)}px">${lbl}</div>`;
  }).join('');

  // ── Navigation header ──
  const vs=miPlanViewStart;
  const ve=vs+1; // show days vs and ve (2 days)
  const lbl1=dayLabel(DAY_KEYS[vs]); // 'MIÉ 15'
  const lbl2=dayLabel(DAY_KEYS[ve]); // 'MIÉ 15'
  const navHtml=`<div class="mplan-nav">
    <div class="mplan-nav-btn-wrap">
      <button class="mplan-nav-btn" aria-label="Día anterior" onclick="miPlanNav(-1)" ${vs===0?'disabled':''}>◀</button>
    </div>
    <div class="mplan-nav-labels">
      <div class="mplan-nav-day" onclick="selectMiPlanDay(${vs})">
        <div class="mplan-nav-day-name">${DAYS[vs].lbl}</div>
        <div class="mplan-nav-day-num${vs===activeMiPlanDay?' wk-active-num':''}">${DAYS[vs].d}</div>
      </div>
      <div class="mplan-nav-day" onclick="selectMiPlanDay(${ve})">
        <div class="mplan-nav-day-name">${DAYS[ve].lbl}</div>
        <div class="mplan-nav-day-num${ve===activeMiPlanDay?' wk-active-num':''}">${DAYS[ve].d}</div>
      </div>
    </div>
    <div class="mplan-nav-btn-wrap right">
      <button class="mplan-nav-btn" onclick="miPlanNav(1)" ${ve>=DAY_KEYS.length-1?'disabled':''}>${ICONS.chevronR}</button>
    </div>
  </div>`;

  // ── Desktop: all 6 columns; Mobile: 2 columns via nav ──
  const renderCol=(i,extraClass='')=>{
    const day=DAY_KEYS[i];
    const dayFilms=schedule.filter(s=>s.day===day).sort((a,b)=>toMin(a.time)-toMin(b.time));
    const isPastDay=nowDayIdx>=0&&i<nowDayIdx;
    const isToday=i===nowDayIdx;
    const isActive=i===activeMiPlanDay;

    // Hour grid lines
    let gridHtml='';
    for(let h=SH;h<EH;h++){
      const top=PHDR+toPx(h*60);
      gridHtml+=`<div class="mplan-wk-hline mp-major" style="top:${top.toFixed(0)}px"></div>`;
      gridHtml+=`<div class="mplan-wk-hline" style="top:${(top+PPH/2).toFixed(0)}px"></div>`;
    }

    // Now line
    let nowHtml='';
    if(isToday&&nowMin>=SH*60&&nowMin<EH*60){
      const top=PHDR+toPx(nowMin);
      nowHtml=`<div class="mplan-wk-nowline" style="top:${top.toFixed(0)}px"><div class="mplan-wk-nowdot"></div></div>`;
    }

    // Film blocks
    const blocksHtml=dayFilms.map(s=>{
      const fMin=toMin(s.time),dur=parseDur(s.duration);
      const top=PHDR+toPx(fMin);
      const blockH=Math.max(dur/60*PPH-4,20);
      const isPast=isPastDay||(isToday&&fMin+dur<nowMin);
      const isNow=isToday&&fMin<=nowMin&&fMin+dur>nowMin;
      const type=mplanBlockType(s);
      const filmKey=(s._title||'')+s.time;
      const isActive=filmKey===_activeMiPlanFilm;
      const stateClass=isPast?' mp-past':isNow?' mp-now':isActive?' mp-active':'';
      const{displayTitle}=parseProgramTitle(s._title||'');
      const isPrio=type==='mp-priority';
      const showVenue=blockH>44;
      const vc2=vcfg(s.venue);
      return`<div class="mplan-wk-block ${type}${stateClass}" style="top:${top.toFixed(0)}px;height:${blockH.toFixed(0)}px" data-fkey="${(s._title||'')}${s.time}" onclick="setActivePlanFilm(this);selectMiPlanDay(${i});event.stopPropagation()" title="${(s._title||'').replace(/"/g,'&quot;')}">
        ${isPrio?`<div class="mplan-wk-badge">${ICONS.star}</div>`:''}
        <div class="mplan-wk-time">${s.time}</div>
        <div class="mplan-wk-title">${displayTitle}</div>
        ${showVenue?`<div class="mplan-wk-venue">${ICONS.pin} ${vc2.short}</div>`:''}

    const colClass=['mplan-wk-col',isToday?'wk-today':'',isActive?'wk-active':'',extraClass].filter(Boolean).join(' ');

      </div>
      ${gridHtml}${nowHtml}${blocksHtml}
    </div>`;
  };
  const desktopCols=DAY_KEYS.map((_,i)=>renderCol(i,'mplan-col-desktop')).join('');
  const mobileCols=[vs,ve].map(i=>renderCol(i,'mplan-col-mobile')).join('');
  const colsHtml=desktopCols+mobileCols;

  // ── Detail list for active day ──
  const activeKey=DAY_KEYS[activeMiPlanDay];
  const dayFilms=schedule.filter(s=>s.day===activeKey).sort((a,b)=>toMin(a.time)-toMin(b.time));
  const isPastDay=nowDayIdx>=0&&activeMiPlanDay<nowDayIdx;

  let listHtml=`<div class="mplan-list" id="mplan-detail"><div class="mplan-list-hdr">${dayChip(activeKey)}</div>`;
  if(!dayFilms.length){
    listHtml+=`<div class="mplan-empty">D\u00eda libre \u2014 sin funciones planificadas</div>`;
  } else {
    dayFilms.forEach((s,idx)=>{

      listHtml+=`<div class="mplan-row${_rowKey===_activeMiPlanFilm?' active':''}" style="cursor:pointer" data-rkey="${_safeRowKey}" onclick="selectFromDetail(this)">
        ${_mph}
        <div class="mplan-tc">
          <div class="mplan-t1${isPast?' mp-past':''}">${s.time}</div>
          <div class="mplan-t2">${mplanEndStr(s.time,dur)}${isNow?` <span style="color:var(--green);font-weight:600">en curso</span>`:''}</div>
        </div>
        <div class="mplan-ri">
          <div class="mplan-rtitle">${prioritized.has(s._title)?`<span style="color:var(--orange);margin-right:4px">${ICONS.starFill}</span>`:''} ${s._title||''}</div>
          <div class="mplan-rvenue">${ICONS.pin} ${vcfg(s.venue).short}${sala(s.venue)?' \u00b7 '+sala(s.venue):''}</div>
          ${(()=>{const _mf=FILMS.find(fi=>fi.title===s._title&&fi.day===s.day&&fi.time===s.time);if(!_mf||!_mf.is_cortos||!_mf.film_list||!_mf.film_list.length) return'';return`<button class="mplan-prog-toggle" onclick="toggleMplanProg(this,event)">▸ Ver programa</button>`;})()}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <div class="mplan-dur">${s.duration||''}</div>
          <div style="display:flex;gap:4px">
            ${!isPast?`<button class="film-switch${_expandedFilm===(s._title||'')+(s.day||'')+(s.time||'')?' open':''}" onclick="toggleFilmAlternatives('${(s._title||'')+(s.day||'')+(s.time||'')}','${safeT}','${s.day||''}','${s.time||''}');event.stopPropagation()" title="Ver alternativas">${ICONS.switch}</button>`:''}
            <button class="ag-fi-btn${watched.has(s._title)?' w-on':''}" data-wt="${safeT}" onclick="toggleWatched(this.dataset.wt,event)" title="${watched.has(s._title)?'Desmarcar':'Marcar como vista'}">${watched.has(s._title)?'\u21a9':'\u2713'}</button>
            <button class="ag-fi-btn del" data-rmt="${safeT}" onclick="removeFromAgenda(this.dataset.rmt);event.stopPropagation()" title="Quitar">\u2715</button>
          </div>
        </div>
      </div>${_expandedFilm===(s._title||'')+(s.day||'')+(s.time||'')?`<div class="film-alts">${renderFilmAlternatives(s._title,s.day,s.time)}</div>`:''}${(()=>{const _mf=FILMS.find(fi=>fi.title===s._title&&fi.day===s.day&&fi.time===s.time);if(!_mf||!_mf.is_cortos||!_mf.film_list||!_mf.film_list.length) return'';return`<div class="mplan-prog-list">${_mf.film_list.map((item,n)=>{const _mt=getPosterSrc(item.title,item.is_cortos!==false);const _mth=_mt?`<img src="${_mt}" class="c-film-thumb" loading="lazy" onerror="this.outerHTML='<div class=c-film-thumb-ph>🎬</div>'" alt="">`:'<div class="c-film-thumb-ph">🎬</div>';return`<div class="mplan-prog-item">${_mth}<div class="mplan-prog-num">${n+1}</div><div class="mplan-prog-title">${item.title}</div><div class="mplan-prog-dur">${item.duration}</div></div>`;}).join('')}</div>`;})()}`;
    });
  }
  listHtml+='</div>';

  return `<div class="mplan-wrap">
    ${navHtml}
    <div class="mplan-wk-outer">
      <div class="mplan-wk-inner" style="height:${PHDR+TOTAL}px">
        <div class="mplan-wk-axis" style="height:${PHDR+TOTAL}px">${axisHtml}</div>
        <div class="mplan-wk-cols">${colsHtml}</div>
      </div>
    </div>
    ${listHtml}
  </div>`;
}

function loadState(){
  try{
    const wl=localStorage.getItem('ficci65_wl'); if(wl) watchlist=new Set(JSON.parse(wl));
    const wt=localStorage.getItem('ficci65_watched'); if(wt) watched=new Set(JSON.parse(wt));
    const av=localStorage.getItem('ficci65_av3'); if(av){const p=JSON.parse(av);DAY_KEYS.forEach(d=>{if(p[d]) availability[d]=p[d];});}
    const sa=localStorage.getItem('ficci65_saved'); if(sa) savedAgenda=JSON.parse(sa);
    const pr=localStorage.getItem('ficci65_prio'); if(pr) prioritized=new Set(JSON.parse(pr));
    // Heal: garantiza que todo lo que está en prioritized esté en watchlist
    prioritized.forEach(t=>{if(!watchlist.has(t)){watchlist.add(t);}});
    saveWL();
    // Restore reserved slot — persists across refresh, button shows "＋ Añadir" (not "← Restaurar")
    const rs=localStorage.getItem('ficci65_lastslot');if(rs){try{const p=JSON.parse(rs);lastRemovedSlots=Array.isArray(p)?p:(p?[p]:[]);}catch(e){}}
  }catch(e){}
}
function saveWL(){try{localStorage.setItem('ficci65_wl',JSON.stringify([...watchlist]));}catch(e){}}
function saveWatched(){try{localStorage.setItem('ficci65_watched',JSON.stringify([...watched]));}catch(e){}}
function saveAV(){try{localStorage.setItem('ficci65_av3',JSON.stringify(availability));}catch(e){}}
function saveSavedAgenda(){try{localStorage.setItem('ficci65_saved',JSON.stringify(savedAgenda));}catch(e){}}
function savePrio(){try{localStorage.setItem('ficci65_prio',JSON.stringify([...prioritized]));}catch(e){}}
function saveLastSlot(){try{localStorage.setItem('ficci65_lastslot',JSON.stringify(lastRemovedSlots));}catch(e){}}
/* ── saveState — batching de localStorage ── */
function saveState(...keys){
  const all=!keys.length;
  if(all||keys.includes('wl'))      saveWL();
  if(all||keys.includes('watched')) saveWatched();
  if(all||keys.includes('prio'))    savePrio();
  if(all||keys.includes('agenda'))  saveSavedAgenda();
  if(all||keys.includes('av'))      saveAV();
  if(all||keys.includes('lastslot'))saveLastSlot();
}

function toggleWL(title,e){
  if(e) e.stopPropagation();
  if(watchlist.has(title)){
    // If film is in saved agenda, ask first
    if(savedAgenda&&savedAgenda.schedule.some(s=>s._title===title)){
      showActionModal(`${ICONS.x} Quitar de Selección`,
        `<b>${title.length>36?title.slice(0,34)+'…':title}</b> está en tu plan.<br><br>¿Quitarla también del plan guardado?`,
        'Sí, quitar de todo',()=>{
          savedAgenda.schedule=savedAgenda.schedule.filter(s=>s._title!==title);
          if(!savedAgenda.schedule.length)savedAgenda=null;
          saveSavedAgenda();
          watchlist.delete(title);watched.delete(title);prioritized.delete(title);
          saveState('wl','watched');updateCardState(title);updateAgTab();
          if(activeView==='agenda'){cachedResult=null;renderAgenda();}
        });return;
    }
    // Now safe to remove from watchlist
    watchlist.delete(title);watched.delete(title);prioritized.delete(title);

  else{
    watchlist.add(title);watched.delete(title);
    showToast(`${ICONS.heart} Añadida a Selección`,'info');
  }
  saveState('wl','watched');updateCardState(title);updateAgTab();
  if(activeView==='agenda'){cachedResult=null;renderAgenda();}
}
function toggleWatched(title,e){

// ── FUZZY SEARCH — accent insensitive ──
function fuzzyMatch(query,title){
  const q=normalize(query),t=normalize(title);
  if(t.includes(q)) return{match:true,score:100+q.length};
  let qi=0;for(let i=0;i<t.length&&qi<q.length;i++) if(t[i]===q[qi]) qi++;
  if(qi===q.length) return{match:true,score:qi};
  return{match:false,score:0};
}
function searchFilms(query){
  if(!query||query.length<2) return[];
  const seen=new Set();
  return FILMS
    .map(f=>{
      const r1=fuzzyMatch(query,f.title);
      const r2=f.title_en?fuzzyMatch(query,f.title_en):{match:false,score:0};
      let r3={match:false,score:0};
      if(f.film_list&&f.film_list.length){
        for(const item of f.film_list){
          const r=fuzzyMatch(query,item.title);
          if(r.match&&r.score>r3.score) r3=r;
        }
      }
      return{...f,score:Math.max(r1.score,r2.score,r3.score),match:r1.match||r2.match||r3.match};
    })
    .filter(f=>f.match)
    .filter(f=>{if(seen.has(f.title)) return false;seen.add(f.title);return true;})
    .sort((a,b)=>b.score-a.score)
    .slice(0,8);
}
function onSearchInput(){
  const q=document.getElementById('ag-search-input').value.trim();
  const res=document.getElementById('ag-search-results');
  if(!q||q.length<2){res.classList.remove('open');return;}
  const films=searchFilms(q);
  if(!films.length){res.innerHTML=emptyState(ICONS.search,'Sin resultados.');res.classList.add('open');return;}
  res.innerHTML=films.map(f=>{
    const inWL=watchlist.has(f.title);
    return`<div class="ag-sr-item">
      <div>
        <div class="ag-sr-title">${f.title}</div>
        <div class="ag-sr-meta">${f.flags||''} ${f.duration||''}${f.is_cortos?' · Programa':''}${inWL?' · <span style="color:var(--orange)">${ICONS.heartFill}</span>':''}</div>
      </div>
      <button class="ag-sr-add${inWL?' added':''}" data-title="${f.title.replace(/"/g,'&quot;')}" onclick="addFromSearch(this.dataset.title)">
        ${inWL?`${ICONS.check} Añadida`:`${ICONS.plus} Añadir`}
      </button>
    </div>`;
  }).join('');
  res.classList.add('open');
}
function addFromSearch(title){
  if(!watchlist.has(title)){watchlist.add(title);watched.delete(title);saveState('wl','watched');updateCardState(title);updateAgTab();}
  onSearchInput();

function removeFromAgenda(title){
  if(!savedAgenda) return;
  const _s=title.length>36?title.slice(0,34)+'…':title;
  showActionModal(`${ICONS.x} Quitar del plan`,`<b>${_s}</b><br><br>Podrás restaurarla desde Sugerencias.`,'Quitar',()=>{
    const rem=savedAgenda.schedule.find(s=>s._title===title);
    if(rem){lastRemovedSlots=lastRemovedSlots.filter(r=>r._title!==rem._title);lastRemovedSlots.unshift({...rem,_isRestored:true});if(lastRemovedSlots.length>MAX_REMEMBERED_SLOTS)lastRemovedSlots.length=MAX_REMEMBERED_SLOTS;saveLastSlot();}
    savedAgenda.schedule=savedAgenda.schedule.filter(s=>s._title!==title);
    if(!savedAgenda.schedule.length)savedAgenda=null;
    saveSavedAgenda();renderAgenda();showToast('Quitada de Mi Plan','info');
  });return;
  // Guardar el slot exacto antes de borrar
  const removed=savedAgenda.schedule.find(s=>s._title===title);
  if(removed){
    lastRemovedSlots=lastRemovedSlots.filter(r=>r._title!==removed._title);
    lastRemovedSlots.unshift({...removed,_isRestored:true});
    if(lastRemovedSlots.length>MAX_REMEMBERED_SLOTS) lastRemovedSlots.length=MAX_REMEMBERED_SLOTS;
    saveLastSlot();
  }
  savedAgenda.schedule=savedAgenda.schedule.filter(s=>s._title!==title);
  if(!savedAgenda.schedule.length) savedAgenda=null;
  saveSavedAgenda();
  renderAgenda();
  showToast('Quitada de Mi Plan','info');
}
function addSuggestion(title,day,time){
  // 1. Add to watchlist if not already there
  if(!watchlist.has(title)){watchlist.add(title);watched.delete(title);saveState('wl','watched');updateCardState(title);updateAgTab();}
  // 2. Add specific screening to saved agenda
  const screen=FILMS.find(f=>f.title===title&&f.day===day&&f.time===time);
  if(screen){
    if(!savedAgenda) savedAgenda={schedule:[]};
    // Avoid duplicates
    if(!savedAgenda.schedule.some(s=>s._title===title)){
      // No se re-valida conflicto aquí: getSuggestions ya garantizó que la función
      // cabe en el hueco (los slots ya incluyen el buffer ±10). screensConflict
      // añadiría ±10 adicional sobre ambos lados → falso positivo sistemático
      // en funciones que empiezan exactamente en el borde del slot.
      savedAgenda.schedule.push({...screen,_title:title});
      savedAgenda.schedule.sort((a,b)=>a.day_order!==b.day_order?a.day_order-b.day_order:toMin(a.time)-toMin(b.time));
      saveSavedAgenda();
    }
  }
  // 3. Quitar de lista de restaurables
  lastRemovedSlots=lastRemovedSlots.filter(r=>r._title!==title);
  saveLastSlot();
  // 4. Saltar al día de la sugerencia en el calendario
  const jumpIdx=DAY_KEYS.indexOf(day);
  if(jumpIdx>=0) activeMiPlanDay=jumpIdx;
  // 5. Re-render
  renderAgenda();
}

// ⚠️  FIX CRÍTICO — NO REMOVER (Apr 2026)
// DAY_KEYS debe estar declarada aquí, antes de cualquier función que la use.
// Sin esta declaración, Planear lanza "Can't find variable: DAY_KEYS" y
// la pestaña entera no renderiza.
// ─────────────────────────────────────────────────────────────────────────────
/* ══════════════════════════════════════════════════════
   SISTEMA DE FORMATO DE DÍAS — dos niveles semánticos
   ─────────────────────────────────────────────────────
   NIVEL 1 — COMPACT (apilado, 2 líneas)
     Uso: tabs, calendarios, grids de navegación
     Abrev: DAY_ABBR[key] → 'MAR'   (var(--t-xs), gray2, arriba)
     Núm:   DAY_NUM[key]  → 14      (var(--t-lg), white, abajo)
     Contextos: dtab, mplan-wk-col, av-row-lbl, mplan-nav

   NIVEL 2 — LABEL (inline, 1 línea)
     Uso: separadores de lista, etiquetas de sección
     Corto: DAY_SHORT[key] → 'MAR 14'    (.saved-day-lbl, .ag-day-name, .suggestion-day-lbl)
     Largo: DAY_LONG[key]  → 'Martes 14' (.mplan-list-hdr — header primario únicamente)

   FUENTE: todo deriva de DAYS[] (definido en el bloque de render de tabs)
══════════════════════════════════════════════════════ */
const DAY_KEYS =['Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const DAY_LONG ={Martes:'Martes 14', Miércoles:'Miércoles 15', Jueves:'Jueves 16',
                 Viernes:'Viernes 17', Sábado:'Sábado 18',  Domingo:'Domingo 19'};
const DAY_SHORT={Martes:'MAR 14',    Miércoles:'MIÉ 15',    Jueves:'JUE 16',
                 Viernes:'VIE 17',   Sábado:'SÁB 18',       Domingo:'DOM 19'};

/* dayChip(key) — componente apilado: ABREV arriba / NÚMERO abajo — FORMATO ÚNICO */
const dayChip = key => {
  const abr = DAY_ABBR[key] || (DAY_SHORT[key]||'').split(' ')[0] || key;
  const num = DAY_NUM[key]  || (DAY_SHORT[key]||'').split(' ')[1] || '';
  return `<span class="day-chip-abr">${abr}</span><span class="day-chip-num">${num}</span>`;
};
/* dayLabel/dayHeader — mantenidos para compatibilidad, internamente usan dayChip */
const dayLabel  = key => DAY_SHORT[key] || key;
const dayHeader = key => DAY_LONG[key]  || key;

/* ══════════════════════════════════════════════════════
   emptyState(icon, title, sub) — componente vacío unificado
   Usa siempre este helper para estados vacíos — nunca inline styles ni emojis
   icon: ICONS.* | title: string | sub: string (opcional)
══════════════════════════════════════════════════════ */
const emptyState = (icon, title, sub='') =>

/* ── Sistema de modales de confirmación ── */
function showDestructiveModal(title,body,label,cb){_showModal(title,body,label,cb,'destructive');}
function showActionModal(title,body,label,cb){_showModal(title,body,label,cb,'confirm');}
function _showModal(title,body,label,cb,cls){
  const p=document.getElementById('conflict-modal');if(p)p.remove();
  const m=document.createElement('div');m.id='conflict-modal';m.className='conflict-modal';
  m.innerHTML=`<div class="conflict-modal-box">
    <div class="conflict-modal-hdr">${title}</div>
    <div class="conflict-modal-body">${body}</div>
    <div class="conflict-modal-btns">
      <button class="conflict-modal-btn cancel" id="cm-c">Cancelar</button>
      <button class="conflict-modal-btn ${cls}" id="cm-ok">${label}</button>
    </div></div>`;
  document.body.appendChild(m);
  document.getElementById('cm-c').onclick=()=>m.remove();
  document.getElementById('cm-ok').onclick=()=>{m.remove();cb();};
  m.addEventListener('click',e=>{if(e.target===m)m.remove();});
}

function isFullDayBlocked(day){return availability[day].blocks.some(b=>toMin(b.from)<=0&&toMin(b.to)>=toMin('23:59'));}
function checkPlanConflictsWithBlock(day, fromStr, toStr){
  if(!savedAgenda||!savedAgenda.schedule.length) return[];
  const bFrom=toMin(fromStr), bTo=toMin(toStr);
  return savedAgenda.schedule.filter(s=>{
    if(s.day!==day) return false;
    const sStart=toMin(s.time), sEnd=sStart+parseDur(s.duration);
    return sStart<bTo&&sEnd>bFrom;
  });
}
function _removePlanItem(title){
  if(!savedAgenda) return;
  const removed=savedAgenda.schedule.find(s=>s._title===title);
  if(removed){
    lastRemovedSlots=lastRemovedSlots.filter(r=>r._title!==removed._title);
    lastRemovedSlots.unshift({...removed,_isRestored:true});
    if(lastRemovedSlots.length>MAX_REMEMBERED_SLOTS) lastRemovedSlots.length=MAX_REMEMBERED_SLOTS;
    saveLastSlot();
  }
  savedAgenda.schedule=savedAgenda.schedule.filter(s=>s._title!==title);
  if(!savedAgenda.schedule.length) savedAgenda=null;
  saveSavedAgenda();
}

function showConflictModal(conflicts, onConfirm){
  const existing=document.getElementById('conflict-modal');if(existing) existing.remove();
  const names=conflicts.map(s=>{
    const{displayTitle}=parseProgramTitle(s._title||'');
    return`<b>${s.time} ${displayTitle.length>30?displayTitle.slice(0,28)+'…':displayTitle}</b>`;
  }).join('<br>');
  const modal=document.createElement('div');
  modal.id='conflict-modal';modal.className='conflict-modal';
  modal.innerHTML=`<div class="conflict-modal-box">
    <div class="conflict-modal-hdr">${ICONS.alert} Conflicto con tu plan</div>
    <div class="conflict-modal-body">
      Este horario choca con:<br>${names}<br><br>
      ¿Continuar y quitar ${conflicts.length===1?'esa función':'esas funciones'} del plan?
    </div>
    <div class="conflict-modal-btns">
      <button class="conflict-modal-btn cancel" id="conflict-cancel">Cancelar</button>
      <button class="conflict-modal-btn confirm" id="conflict-ok">Quitar y continuar</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  document.getElementById('conflict-cancel').onclick=()=>modal.remove();
  document.getElementById('conflict-ok').onclick=()=>{
    modal.remove();
    onConfirm();
  };
}
function toggleFullDay(day){
  if(isFullDayBlocked(day)){
    availability[day].blocks=[];
    cachedResult=null;saveAV();renderAvDay(day);invalidateCalcResult();
    return;
  }
  const _conflicts=checkPlanConflictsWithBlock(day,'00:00','23:59');
  const _doBlock=()=>{
    _conflicts.forEach(s=>_removePlanItem(s._title));
    availability[day].blocks=[{from:'00:00',to:'23:59'}];avAddOpen[day]=false;
    cachedResult=null;saveAV();renderAvDay(day);invalidateCalcResult();
  };
  if(_conflicts.length) setTimeout(()=>showConflictModal(_conflicts,_doBlock),50);
  else _doBlock();
}
function addBlock(day){
  const f=document.getElementById(`av-from-${day}`).value;
  const t=document.getElementById(`av-to-${day}`).value;
