<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FICCI 65 — Programación</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1C1C1C;--surf:#222;--card-a:#242424;--card-b:#262626;
  --card-p:#1E1E1E;--bdr:#333;--bdr-l:#2C2C2C;
  --orange:#E85A1E;--white:#F2F2F2;--gray:#888;--gray2:#555;--r:11px;
  --green:#3aaa6e;
}
html{-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--white);font-family:"DM Sans",sans-serif;min-height:100vh}
.hdr{padding:22px 18px 0}
.hdr-logo{height:56px;width:auto;object-fit:contain;object-position:left;display:block}
.hdr-fallback{display:none;font-family:"Bebas Neue",sans-serif;font-size:52px;line-height:.9;color:var(--white)}
.hdr-fallback em{color:var(--orange);font-style:normal}
.hdr-dates{font-size:12px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-top:7px}
.hdr-line{height:1px;background:var(--bdr);margin-top:14px}
.nav-tabs{display:flex;overflow-x:auto;gap:0;padding:12px 18px 0;scrollbar-width:none;border-bottom:1px solid var(--bdr);margin-top:6px;-webkit-overflow-scrolling:touch}
.nav-tabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:8px 14px 10px;cursor:pointer;color:var(--gray);font-family:"DM Sans",sans-serif;transition:color .15s;text-align:center;min-width:70px}
.dtab-name{font-family:"Bebas Neue",sans-serif;font-size:23px;letter-spacing:.5px;display:block;line-height:1}
.dtab-date{font-size:11px;display:block;margin-top:2px}
.dtab-cnt{font-size:9px;background:var(--bdr);border-radius:10px;padding:1px 6px;margin-top:4px;display:inline-block}
.dtab:hover{color:var(--white)}
.dtab.on{color:var(--orange);border-bottom-color:var(--orange)}
.dtab.on .dtab-cnt{background:var(--orange);color:#fff;font-weight:600}
.dtab.past{opacity:.4}
.fbar-wrap{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bdr);-webkit-overflow-scrolling:touch}
.fbar-wrap::-webkit-scrollbar{display:none}
.fbar{display:flex;gap:7px;padding:9px 18px;width:max-content;min-width:100%;align-items:center}
.fbar-lbl{font-size:11px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;flex-shrink:0;min-width:58px;font-weight:500}
.fbtn{padding:6px 13px;border-radius:20px;border:1px solid var(--bdr);background:none;color:var(--gray);font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;min-height:34px}
.fbtn:active{opacity:.7}
.fbtn.on{border-color:var(--orange);color:var(--orange);background:rgba(232,90,30,.08)}
.agbar{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bdr);-webkit-overflow-scrolling:touch}
.agbar-inner{display:flex;gap:7px;padding:9px 18px;align-items:center}
.agbar-lbl{font-size:11px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;flex-shrink:0;min-width:58px;font-weight:500}
.agbar-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--bdr);background:none;color:var(--gray);font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s;white-space:nowrap;min-height:34px;display:inline-flex;align-items:center;gap:6px}
.agbar-btn.on{border-color:var(--orange);color:var(--orange);background:rgba(232,90,30,.08)}
.agbar-cnt{font-size:10px;background:var(--bdr);border-radius:10px;padding:1px 6px;font-weight:600}
.agbar-btn.on .agbar-cnt{background:var(--orange);color:#fff}
.hint{padding:8px 18px;font-size:11px;color:var(--gray);min-height:30px}
.hint.active{color:var(--orange)}
.cnt-line{padding:2px 18px 6px;font-size:11px;color:var(--gray)}
.cnt-line b{color:var(--white)}
.grid{padding:10px 12px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:10px;overflow:visible}
.card{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;position:relative;cursor:pointer;transition:opacity .2s,border-color .2s,box-shadow .2s}
.card:nth-child(odd){background:var(--card-a)}
.card:nth-child(even){background:var(--card-b)}
@media(hover:hover){.card:not(.conflict):hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.6);border-color:rgba(232,90,30,.35)}}
.card:active{opacity:.85}
.card.program{background:#1C2028!important;border-color:var(--bdr-l);border-left:3px solid rgba(255,255,255,.3);
  box-shadow:3px 3px 0 1px #232830,6px 6px 0 1px #1e2228;
  margin-right:7px;margin-bottom:7px}
.card.selected{border-color:var(--orange)!important;box-shadow:0 0 0 2px var(--orange),0 8px 28px rgba(232,90,30,.2)!important}
.card.conflict{opacity:.22;filter:grayscale(.8);cursor:default;pointer-events:none}
.card.conflict::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 6px,rgba(0,0,0,.15) 6px,rgba(0,0,0,.15) 7px);border-radius:var(--r);pointer-events:none}
.card.apertura{border-color:rgba(232,90,30,.55);box-shadow:0 0 16px rgba(232,90,30,.1)}
.card.in-wl{border-color:rgba(232,90,30,.4)}
.card.in-watched{border-color:rgba(58,170,110,.4)}
.card.past-card{opacity:.5}
.card-actions{position:absolute;top:9px;right:10px;display:flex;gap:3px;z-index:4}
.action-btn{background:rgba(0,0,0,.35);border:none;cursor:pointer;font-size:15px;line-height:1;padding:4px 6px;color:var(--gray2);border-radius:6px;transition:color .15s,background .15s}
.action-btn:active{transform:scale(.85)}
.action-btn.wl-on{color:var(--orange)}
.action-btn.w-on{color:var(--green)}
.action-btn.prio-btn{font-size:13px}
.action-btn.prio-on{color:var(--orange)}
.ag-fi-prio-badge{position:absolute;top:5px;left:5px;font-size:11px;color:var(--orange);background:rgba(0,0,0,.6);border-radius:4px;padding:1px 4px;font-weight:700;pointer-events:none;z-index:3}
.prio-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2a2a2a;border:1px solid #444;color:var(--white);font-size:12px;padding:8px 16px;border-radius:8px;z-index:9999;transition:opacity .4s;max-width:320px;text-align:center;pointer-events:none}
.prio-toast.warn{border-color:rgba(229,160,32,.6);color:#e5a020}
.apertura-badge{position:absolute;top:9px;left:10px;font-size:9px;background:var(--orange);color:#fff;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:8px;font-family:"Bebas Neue",sans-serif;z-index:2}
.past-badge{position:absolute;bottom:8px;right:10px;font-size:9px;color:var(--gray2);font-weight:600;letter-spacing:.5px;z-index:2;background:rgba(0,0,0,.5);padding:1px 5px;border-radius:5px}
.c-body{padding:18px 16px 16px;display:flex;flex-direction:column;gap:16px}
.c-body.has-poster{flex-direction:row;gap:0;padding:0}
/* Poster: fixed 90x135, rounded, internal margin */
.c-poster{flex-shrink:0;width:104px;padding:14px 12px 14px 14px}.c-poster img{width:78px;height:117px;object-fit:cover;display:block;border-radius:8px}
.c-poster-none{width:90px;height:135px;background:#1a1a1a;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:24px;opacity:.2}
.c-collage{width:78px;height:117px;display:grid;gap:2px;border-radius:8px;overflow:hidden}
.c-collage.two{grid-template-columns:1fr 1fr}
.c-collage.three{grid-template-columns:1fr 1fr 1fr}
.c-collage img{width:100%;height:100%;object-fit:cover;display:block}
/* Content: fills space, padding from top, elements stack naturally */
.c-content{flex:1;min-width:0;padding:16px 16px 16px 14px;
  display:flex;flex-direction:column;gap:0}
.c-content .c-film{gap:7px}
.c-content .c-venue{margin-top:auto;padding-top:12px}
.c-film{display:flex;flex-direction:column;gap:8px}
.c-time{font-family:"Bebas Neue",sans-serif;font-size:28px;color:var(--orange);letter-spacing:2px;line-height:1}
.c-title{font-size:16px;font-weight:600;color:var(--white);line-height:1.4;padding-right:60px}
/* In poster cards: smaller size, no padding-right (actions are top-right, not overlapping content) */
.has-poster .c-title{font-size:13px;line-height:1.35;padding-right:0}
.has-poster .c-title-en{font-size:10px}
.has-poster .c-flags{font-size:16px}
.has-poster .c-time{font-size:24px}
.has-poster .c-venue-name{font-size:12px}
.has-poster .c-venue-sub{font-size:10.5px}
.c-title-en{font-size:11.5px;color:var(--gray);font-style:italic;line-height:1.35;margin-top:1px}
.c-flags{font-size:20px;line-height:1;margin-top:2px}
.c-div{height:1px;background:var(--bdr-l)}
.has-poster .c-div{margin:8px 0 6px}
.c-venue{display:flex;flex-direction:column;gap:5px}
.c-venue-name{font-size:13px;font-weight:500;color:#aaa}
.c-venue-sub{font-size:11px;color:var(--gray2)}
.c-expand{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--gray);cursor:pointer;user-select:none;padding-top:2px;transition:color .15s}
.c-expand:hover{color:var(--orange)}
.c-expand-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.c-expand-arrow.open{transform:rotate(180deg)}
.c-film-list{display:none;border-top:1px solid var(--bdr-l);padding-top:10px;margin-top:2px}
.c-film-list.visible{display:block}
.c-film-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.c-film-item:last-child{border-bottom:none}
.c-film-thumb{width:32px;height:48px;object-fit:cover;border-radius:4px;flex-shrink:0;display:block}
.c-film-thumb-ph{width:32px;height:48px;border-radius:4px;flex-shrink:0;background:#1a1a1a}

.c-film-item:last-child{border-bottom:none}
.c-film-num{font-family:"Bebas Neue",sans-serif;font-size:15px;color:var(--gray2);flex-shrink:0;line-height:1.2;min-width:16px}
.c-film-info{flex:1;min-width:0}
.c-film-title{font-size:12.5px;color:#ccc;line-height:1.35;font-weight:500}
.c-film-meta{font-size:11px;color:var(--gray2);margin-top:2px}
.c-film-dur{font-size:11px;color:var(--gray2);flex-shrink:0;white-space:nowrap;padding-top:1px}
.c-title-pills{display:none;border-top:1px solid var(--bdr-l);padding-top:8px;margin-top:2px;flex-wrap:wrap;gap:4px}
.c-title-pills.visible{display:flex}
.c-title-pill{font-size:11px;color:var(--gray2);background:rgba(255,255,255,.04);border-radius:5px;padding:3px 7px}
.c-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 14px;border-top:1px solid var(--bdr);background:rgba(0,0,0,.15);flex-wrap:nowrap}
/* foot-l: never wraps, section truncates */
.c-foot-l{display:flex;align-items:center;gap:6px;min-width:0;flex:1;overflow:hidden;flex-wrap:nowrap}
.c-sec{font-size:10px;padding:3px 8px;border-radius:20px;background:var(--surf);border:1px solid var(--bdr);color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:border-color .15s,color .15s;flex-shrink:1;min-width:0;max-width:150px}
/* LB pill never shrinks off line */
.c-lb{flex-shrink:0!important}
.c-sec:hover{border-color:var(--orange);color:var(--orange)}
.c-sec.active-sec{border-color:var(--orange);color:var(--orange);background:rgba(232,90,30,.08)}
.c-lb{display:inline-flex;align-items:center;gap:4px;background:#222;border:1px solid var(--bdr);border-radius:20px;padding:3px 8px 3px 5px;cursor:pointer;transition:border-color .15s,transform .15s;line-height:1;flex-shrink:0;text-decoration:none}
.c-lb:hover{border-color:var(--gray);transform:scale(1.04)}
.c-lb-text{font-size:10px;font-weight:600;color:var(--gray);letter-spacing:.2px;white-space:nowrap}
.c-dur{font-size:11px;color:var(--gray);white-space:nowrap;flex-shrink:0}
.prog-badge{font-size:10px;color:var(--gray2);font-weight:600;letter-spacing:.4px;white-space:nowrap}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray)}
.empty span{font-size:44px;display:block;margin-bottom:10px}
/* AGENDA VIEW */
.ag-view{padding:14px 16px 60px;display:none}
.ag-view.visible{display:block}
.ag-section{margin-bottom:20px}
.ag-section-title{font-family:"Bebas Neue",sans-serif;font-size:19px;color:var(--white);letter-spacing:.5px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bdr)}
/* Saved agenda */
.saved-agenda{background:rgba(58,170,110,.07);border:1px solid rgba(58,170,110,.25);border-radius:var(--r);padding:14px;margin-bottom:20px}
.saved-agenda-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.saved-agenda-title{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--green);letter-spacing:.5px}
.saved-agenda-clear{background:none;border:none;cursor:pointer;color:var(--gray2);font-size:11px;padding:3px 8px;border:1px solid var(--bdr);border-radius:20px;font-family:"DM Sans",sans-serif;transition:all .15s}
.saved-agenda-clear:hover{border-color:#e05050;color:#e05050}
/* Archive section */
.archive-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:8px;cursor:pointer;margin-bottom:6px;user-select:none}
.archive-toggle-lbl{font-size:11px;color:var(--gray);font-weight:500}
.archive-body{display:none}
.archive-body.open{display:block}
/* Today section */
.today-banner{background:rgba(232,90,30,.1);border:1px solid rgba(232,90,30,.3);border-radius:8px;padding:7px 12px;margin-bottom:8px;font-size:11px;color:var(--orange);font-weight:600;letter-spacing:.5px}
/* Saved items */
.saved-day-lbl{font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin:8px 0 4px}
.saved-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(58,170,110,.08)}
.saved-item:last-child{border-bottom:none}
.saved-item.done{opacity:.5}
.saved-time{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--orange);letter-spacing:1px;flex-shrink:0;min-width:46px}
.saved-item.done .saved-time{color:var(--green)}
.saved-info{flex:1;min-width:0}
.saved-title{font-size:12px;font-weight:600;color:var(--white);line-height:1.3}
.saved-venue{font-size:10px;color:var(--gray);margin-top:1px}
.saved-check{background:none;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;font-size:12px;padding:3px 6px;color:var(--gray2);transition:all .15s;flex-shrink:0;font-family:"DM Sans",sans-serif}
.saved-check.done{color:var(--green);border-color:rgba(58,170,110,.4)}
.saved-check:hover{border-color:var(--orange);color:var(--orange)}
.travel-warn{font-size:10px;color:#e5a020;display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(229,160,32,.07);border-radius:5px;margin:2px 0}
/* Suggestions */
.suggestion-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,.03);border:1px solid var(--bdr-l);border-radius:8px;margin-bottom:5px;opacity:.7}
.suggestion-item:hover{opacity:1}
.suggestion-time{font-family:"Bebas Neue",sans-serif;font-size:16px;color:var(--gray);letter-spacing:1px;flex-shrink:0;min-width:46px}
.suggestion-info{flex:1;min-width:0}
.suggestion-title{font-size:12px;color:var(--gray);font-weight:500}
.suggestion-meta{font-size:10px;color:var(--gray2);margin-top:1px}
.suggestion-add{background:none;border:1px solid var(--gray2);border-radius:20px;color:var(--gray2);font-size:10px;padding:2px 8px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0}
.suggestion-add:hover{border-color:var(--orange);color:var(--orange)}
/* Search */
.ag-search-wrap{position:relative;margin-bottom:10px}
.ag-search{width:100%;background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r);color:var(--white);font-size:14px;padding:11px 14px 11px 38px;font-family:"DM Sans",sans-serif;transition:border-color .15s}
.ag-search::placeholder{color:var(--gray2)}
.ag-search:focus{outline:none;border-color:var(--orange)}
.ag-search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--gray2);pointer-events:none}
.ag-search-results{background:var(--card-b);border:1px solid var(--bdr);border-radius:var(--r);margin-top:4px;overflow:hidden;display:none}
.ag-search-results.open{display:block}
.ag-sr-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr-l)}
.ag-sr-item:last-child{border-bottom:none}
.ag-sr-item:hover{background:var(--card-a)}
.ag-sr-title{font-size:13px;color:var(--white);font-weight:500;flex:1;min-width:0}
.ag-sr-meta{font-size:10px;color:var(--gray)}
.ag-sr-add{background:none;border:1px solid var(--bdr);border-radius:20px;color:var(--gray);font-size:11px;padding:3px 9px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0}
.ag-sr-add:hover{border-color:var(--orange);color:var(--orange)}
.ag-sr-add.added{border-color:var(--orange);color:var(--orange);background:rgba(232,90,30,.08)}
.ag-sr-empty{padding:14px;text-align:center;font-size:12px;color:var(--gray)}
/* Film list */
/* Film grid — poster cards */
.ag-film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,130px));gap:8px;margin-bottom:8px;justify-content:start}
.ag-film-item{position:relative;border-radius:8px;overflow:hidden;background:var(--card-a);border:1px solid var(--bdr);cursor:default}
.ag-film-item.watched-item{opacity:.55}
.ag-fi-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a1a}
.ag-fi-poster-ph{width:100%;aspect-ratio:2/3;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.3}
.ag-fi-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.0) 50%);pointer-events:none}
.ag-fi-actions{position:absolute;top:5px;right:5px;display:flex;gap:3px;pointer-events:all}
.ag-fi-btn{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);border-radius:5px;cursor:pointer;font-size:12px;padding:3px 5px;color:rgba(255,255,255,.6);line-height:1;backdrop-filter:blur(4px);transition:all .15s}
.ag-fi-btn:hover{border-color:var(--orange);color:var(--orange)}
.ag-fi-btn.w-on{color:var(--green);border-color:rgba(58,170,110,.5)}
.ag-fi-btn.del:hover{border-color:#e05050;color:#e05050}
.ag-fi-bottom{position:absolute;bottom:0;left:0;right:0;padding:6px 7px 7px;pointer-events:none}
.ag-fi-flags{font-size:12px;line-height:1;margin-bottom:2px}
.ag-fi-title{font-size:10.5px;font-weight:600;color:var(--white);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Watched section pills (non-grid) */
.ag-watched-section{margin-top:12px}
.ag-watched-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card-p);border:1px solid var(--bdr-l);border-radius:7px;margin-bottom:5px;opacity:.6}
.ag-wi-flag{font-size:13px;flex-shrink:0}
.ag-wi-title{flex:1;font-size:11.5px;font-weight:500;color:var(--gray);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ag-wi-actions{display:flex;gap:3px;flex-shrink:0}
/* Availability */
.av-day{border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.av-day-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;background:var(--card-a);user-select:none}
.av-day-header:hover{background:var(--card-b)}
.av-day-left{display:flex;align-items:center;gap:8px}
.av-arrow{font-size:10px;color:var(--gray);transition:transform .2s;display:inline-block}
.av-arrow.open{transform:rotate(90deg)}
.av-day-name{font-size:13px;font-weight:500;color:var(--white)}
.av-summary{font-size:11px;color:var(--gray)}
.av-summary.has-blocks{color:var(--orange)}
.av-day-body{padding:12px 14px;background:var(--card-p);border-top:1px solid var(--bdr-l)}
.av-blocks-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.av-block-pill{display:flex;align-items:center;justify-content:space-between;background:rgba(232,90,30,.08);border:1px solid rgba(232,90,30,.25);border-radius:7px;padding:6px 10px}
.av-block-text{font-size:12px;color:var(--white);font-weight:500}
.av-block-remove{background:none;border:none;cursor:pointer;color:var(--gray2);font-size:14px;padding:0 2px;transition:color .15s;line-height:1}
.av-block-remove:hover{color:#e05050}
.av-add-form{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.av-time-input{background:var(--surf);border:1px solid var(--bdr);border-radius:7px;color:var(--white);font-size:13px;padding:6px 9px;font-family:"DM Sans",sans-serif;width:95px;cursor:pointer}
.av-time-input:focus{outline:none;border-color:var(--orange)}
.av-sep{font-size:12px;color:var(--gray)}
.av-add-btn{background:rgba(232,90,30,.1);border:1px solid rgba(232,90,30,.3);border-radius:7px;color:var(--orange);font-size:12px;font-weight:600;padding:6px 11px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s}
.av-add-btn:hover{background:rgba(232,90,30,.2)}
.av-day-block-btn{width:100%;background:none;border:1px solid var(--bdr);border-radius:7px;color:var(--gray);font-size:12px;padding:6px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s}
.av-day-block-btn:hover{border-color:#e05050;color:#e05050}
.av-day-block-btn.blocked{border-color:rgba(224,80,80,.4);color:#e05050;background:rgba(224,80,80,.08)}
.av-calc-btn{width:100%;margin-top:10px;padding:13px;border-radius:var(--r);background:var(--orange);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;letter-spacing:.3px;transition:opacity .15s}
.av-calc-btn:hover{opacity:.88}
.av-calc-btn:disabled{opacity:.35;cursor:default}
/* Results */
.ag-calc-prompt{text-align:center;padding:28px 20px;color:var(--gray);font-size:13px;line-height:1.6;background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r)}
.ag-calc-prompt strong{color:var(--orange)}
.ag-summary{background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:14px}
.ag-summary-title{font-family:"Bebas Neue",sans-serif;font-size:20px;color:var(--white);letter-spacing:.5px;margin-bottom:5px}
.ag-summary-text{font-size:13px;color:var(--gray);line-height:1.6}
.ag-summary-text b{color:var(--white)}
.ok{color:var(--orange)}.conflict-label{color:#e05050}
.ag-save-btn{width:100%;margin-top:10px;padding:10px;border-radius:8px;background:rgba(58,170,110,.12);border:1px solid rgba(58,170,110,.35);color:var(--green);font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s}
.ag-save-btn:hover{background:rgba(58,170,110,.2)}
.ag-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px}
.ag-nav-btn{background:none;border:1px solid var(--bdr);color:var(--gray);border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s}
.ag-nav-btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange)}
.ag-nav-btn:disabled{opacity:.3;cursor:default}
.ag-nav-pos{font-size:11px;color:var(--gray)}
.ag-conflicts{background:#1a1212;border:1px solid #3a2020;border-radius:var(--r);padding:12px;margin-bottom:14px}
.ag-conflicts-title{font-size:10px;color:#e05050;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px}
.ag-conflict-item{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;font-size:12px;color:#aaa;line-height:1.5;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ag-conflict-item:last-child{border-bottom:none}
.ag-conflict-info{flex:1;min-width:0}
.ag-conflict-item strong{color:var(--white)}
.ag-prioritize-btn{background:none;border:1px solid #555;border-radius:20px;color:#888;font-size:10px;padding:3px 9px;cursor:pointer;white-space:nowrap;font-family:"DM Sans",sans-serif;transition:all .15s;flex-shrink:0}
.ag-prioritize-btn:hover{border-color:var(--orange);color:var(--orange)}
.ag-prioritize-btn.active{border-color:var(--orange);color:var(--orange);background:rgba(232,90,30,.1)}
.ag-day-label{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gray);letter-spacing:1px;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.ag-day-label span{color:var(--orange);margin-right:5px}
.ag-card{background:var(--card-a);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.ag-time{font-family:"Bebas Neue",sans-serif;font-size:22px;color:var(--orange);letter-spacing:1.5px;line-height:1;flex-shrink:0;min-width:50px}
.ag-info{flex:1;min-width:0}
.ag-title{font-size:13px;font-weight:600;color:var(--white);line-height:1.3}
.ag-venue{font-size:11px;color:var(--gray);margin-top:2px}
.ag-alts{font-size:10px;color:var(--orange);margin-left:4px;font-weight:500}
.ag-flags{font-size:14px;flex-shrink:0}
.ag-card-actions{display:flex;gap:4px;flex-shrink:0}
.ag-card-btn{background:none;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;font-size:13px;padding:4px 6px;color:var(--gray2);transition:all .15s;line-height:1}
.ag-card-btn:hover{border-color:var(--green);color:var(--green)}

.lb-poster{width:40px;height:60px;object-fit:cover;border-radius:5px;flex-shrink:0;display:block;background:#1a1a1a}
.lb-poster-ph{width:40px;height:60px;border-radius:5px;flex-shrink:0;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.3}
.ag-empty{text-align:center;padding:40px 20px;color:var(--gray)}
.ag-empty span{font-size:40px;display:block;margin-bottom:10px}
.ag-empty p{font-size:13px;line-height:1.6}

/* ── Priority strip (A) ── */
.prio-strip{margin-bottom:12px}
.prio-strip-title{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.prio-strip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.prio-chip{flex-shrink:0;width:72px;position:relative;cursor:pointer}
.prio-chip-poster{width:72px;height:108px;object-fit:cover;border-radius:6px;display:block;background:#1a1a1a}
.prio-chip-ph{width:72px;height:108px;border-radius:6px;background:#222;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.4}
.prio-chip-rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.prio-chip-title{font-size:9px;color:var(--gray2);margin-top:4px;line-height:1.2;text-align:center;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
/* ── Priority reminder (B) ── */
.prio-reminder{background:rgba(232,90,30,.07);border:1px solid rgba(232,90,30,.2);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.prio-reminder-title{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.prio-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(232,90,30,.12);border:1px solid rgba(232,90,30,.3);border-radius:12px;padding:2px 8px 2px 6px;font-size:10.5px;color:var(--white);margin:2px;cursor:pointer}
.prio-pill:hover{background:rgba(232,90,30,.2)}
.prio-pill-rm{color:var(--orange);font-size:9px;margin-left:2px}
/* ── Now showing pulse (3) ── */
.now-pulse{display:inline-block;width:7px;height:7px;background:#e05050;border-radius:50%;margin-right:4px;animation:pulse-red 1.4s ease infinite;flex-shrink:0}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(224,80,80,.5)}60%{box-shadow:0 0 0 5px rgba(224,80,80,0)}}
.now-label{position:absolute;bottom:8px;left:8px;font-size:9px;color:#e05050;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.6);padding:2px 6px;border-radius:8px;z-index:3}
/* ── Long film duration highlight (2) ── */
.dur-long{color:var(--orange);font-size:10px;font-weight:600}
/* ── Progress bar (6) ── */
.festival-progress{padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:12px}
.festival-progress-text{font-size:11px;color:var(--gray2);margin-bottom:6px;display:flex;justify-content:space-between}
.festival-progress-bar{height:3px;background:#333;border-radius:2px;overflow:hidden}
.festival-progress-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .4s}
</style>

// Festival date map
const FESTIVAL_DATES={
  'Martes':'2026-04-14','Miércoles':'2026-04-15','Jueves':'2026-04-16',
  'Viernes':'2026-04-17','Sábado':'2026-04-18','Domingo':'2026-04-19'

// Check if a screening has passed (with 10 min grace)
function screeningPassed(s){
  const dateStr=FESTIVAL_DATES[s.day];
  if(!dateStr) return false;
  const screeningTime=new Date(`${dateStr}T${s.time}:00`);
  screeningTime.setMinutes(screeningTime.getMinutes()+10); // 10 min grace
  return new Date()>screeningTime;
}
function dayFullyPassed(day){
  const dateStr=FESTIVAL_DATES[day];
  if(!dateStr) return false;
  // Day passed if last function of that day has passed
  const dayFilms=FILMS.filter(f=>f.day===day);
  if(!dayFilms.length) return false;
  const lastTime=dayFilms.reduce((max,f)=>f.time>max?f.time:max,'00:00');
  const lastScreen=new Date(`${dateStr}T${lastTime}:00`);
  lastScreen.setMinutes(lastScreen.getMinutes()+10);
  return new Date()>lastScreen;
}
function isNowShowing(f){
  const dateStr=FESTIVAL_DATES[f.day];if(!dateStr) return false;
  const now=new Date();
  const start=new Date(`${dateStr}T${f.time}:00`);
  const dur=f.duration?parseInt(f.duration):90;
  const end=new Date(start.getTime()+dur*60000);
  return now>=start&&now<=end;
}
function isToday(day){
  const dateStr=FESTIVAL_DATES[day];
  if(!dateStr) return false;
  const today=new Date().toISOString().slice(0,10);
  return dateStr===today;
}

  'CC Bocagrande':      {ico:'🎬',short:'CC Bocagrande'},
  'CC Caribe Plaza':    {ico:'🍿',short:'CC Caribe Plaza'},
  'Auditorio nido':     {ico:'🪺',short:'Auditorio nido'},
  'Plaza Proclamación': {ico:'🌟',short:'Plaza Proclamación'},
  'C. Convenciones':    {ico:'🏟️',short:'C. de Convenciones'},
};
function vcfg(v){
  if(v.includes('Teatro Adolfo'))  return VENUES['Teatro Adolfo Mejía'];
  if(v.includes('Bocagrande'))     return VENUES['CC Bocagrande'];
  if(v.includes('Caribe Plaza'))   return VENUES['CC Caribe Plaza'];
  if(/nido/i.test(v))              return VENUES['Auditorio nido'];
  if(v.includes('Proclamación'))   return VENUES['Plaza Proclamación'];
  return VENUES['C. Convenciones'];
}
function sala(v){const m=v.match(/Sala\s*(\d+)/);return m?'Sala '+m[1]:'';}
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function parseDur(d){const m=d&&d.replace('~','').match(/(\d+)/);return m?parseInt(m[1]):90;}
function minToStr(m){
  const h=Math.floor(((m%1440)+1440)%1440/60),mn=((m%1440)+1440)%1440%60;
  return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
}
function screensConflict(a,b){
  if(a.day!==b.day) return false;
  const aS=toMin(a.time)-10,aE=toMin(a.time)+parseDur(a.duration)+10;
  const bS=toMin(b.time)-10,bE=toMin(b.time)+parseDur(b.duration)+10;
  return aS<bE&&bS<aE;
}
function travelMins(venueA,venueB){
  const g=v=>v.includes('Bocagrande')?'bog':v.includes('Caribe Plaza')?'cp':'centro';
  const g1=g(venueA),g2=g(venueB);
  if(g1===g2) return 0;
  if((g1==='bog'&&g2==='cp')||(g1==='cp'&&g2==='bog')) return 13;
  if(g1==='centro'||g2==='centro') return g1==='cp'||g2==='cp'?16:12;
  return 0;
}
function travelWarn(s1,s2){
  if(s1.day!==s2.day) return null;
  const travel=travelMins(s1.venue,s2.venue);
  if(travel===0) return null;
  const gap=toMin(s2.time)-(toMin(s1.time)+parseDur(s1.duration));
  if(gap<travel+10) return`⚠️ ~${travel} min en carro entre estas sedes`;
  return null;
}

// Normalize text for accent-insensitive search
function normalize(str){
  return str.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
}

function toggleWL(title,e){
  if(e) e.stopPropagation();
  if(watchlist.has(title)){watchlist.delete(title);watched.delete(title);prioritized.delete(title);}
  else{
    watchlist.add(title);watched.delete(title);
    // Check conflicts with existing watchlist
    const newScreenings=FILMS.filter(f=>f.title===title);
    const conflicts=[];
    [...watchlist].filter(t=>t!==title).forEach(t=>{
      const existing=FILMS.filter(f=>f.title===t);
      newScreenings.forEach(ns=>{ existing.forEach(es=>{ if(screensConflict(ns,es)&&!conflicts.includes(t)) conflicts.push(t); }); });
    });
    if(conflicts.length) showToast(`⚠️ Se superpone con: ${conflicts.slice(0,2).join(', ')}${conflicts.length>2?' y más':''}`, 'warn');
  }
  saveWL();saveWatched();updateCardState(title);updateAgTab();
  if(activeView==='agenda'){cachedResult=null;renderAgenda();}
}

// ── FUZZY SEARCH — accent insensitive ──
function fuzzyMatch(query,title){
  const q=normalize(query),t=normalize(title);
  if(t.includes(q)) return{match:true,score:100+q.length};
  let qi=0;for(let i=0;i<t.length&&qi<q.length;i++) if(t[i]===q[qi]) qi++;
  if(qi===q.length) return{match:true,score:qi};
  return{match:false,score:0};
}
function searchFilms(query){
  if(!query||query.length<2) return[];
  const seen=new Set();
  return FILMS
    .map(f=>{
      const r1=fuzzyMatch(query,f.title);
      const r2=f.title_en?fuzzyMatch(query,f.title_en):{match:false,score:0};
      let r3={match:false,score:0};
      if(f.film_list&&f.film_list.length){
        for(const item of f.film_list){
          const r=fuzzyMatch(query,item.title);
          if(r.match&&r.score>r3.score) r3=r;
        }
      }
      return{...f,score:Math.max(r1.score,r2.score,r3.score),match:r1.match||r2.match||r3.match};
    })
    .filter(f=>f.match)
    .filter(f=>{if(seen.has(f.title)) return false;seen.add(f.title);return true;})
    .sort((a,b)=>b.score-a.score)
    .slice(0,8);
}
function onSearchInput(){
  const q=document.getElementById('ag-search-input').value.trim();

  if(!q||q.length<2){res.classList.remove('open');return;}
  const films=searchFilms(q);
  if(!films.length){res.innerHTML='<div class="ag-sr-empty">Sin resultados</div>';res.classList.add('open');return;}

  res.classList.add('open');
}

function addBlock(day){

function isScreeningBlocked(s){
  const av=availability[s.day];if(!av) return false;
  return av.blocks.some(b=>toMin(s.time)>=toMin(b.from)&&toMin(s.time)<toMin(b.to));
}

// ── ALGORITHM — exhaustive max + MRV + random restarts ──
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function computeScenarios(titles){
  const pending=titles.filter(t=>!watched.has(t));
  const baseGroups=pending.map(t=>{
    const screens=FILMS.filter(f=>f.title===t&&!isScreeningBlocked(f)&&!screeningPassed(f));
    return{title:t,screens,priority:prioritized.has(t)};
  }).filter(g=>g.screens.length>0);
  if(!baseGroups.length) return[];

  // ── Find max achievable for a given set of groups (with or without priority constraint) ──
  function findMax(groups, mustIncludeAll){
    // mustIncludeAll: if true, ALL groups marked priority must appear in result
    let best=0;
    function bb(idx,chosen){
      const remaining=groups.length-idx;
      if(chosen.length+remaining<=best) return;
      if(idx===groups.length){
        if(!mustIncludeAll){
          if(chosen.length>best) best=chosen.length;
        } else {
          // Only count if all priority groups are represented
          const chosenTitles=new Set(chosen.map(s=>s._title));
          const allPrioritiesIn=groups.every(g=>!g.priority||chosenTitles.has(g.title));
          if(allPrioritiesIn&&chosen.length>best) best=chosen.length;
        }
        return;
      }
      const g=groups[idx];
      for(const s of g.screens){
        if(!chosen.some(c=>screensConflict(c,s))){
          chosen.push({...s,_title:g.title});bb(idx+1,chosen);chosen.pop();
        }
      }
      // Can skip non-priority films; must attempt to include priority films
      if(!g.priority) bb(idx+1,chosen);
      else if(mustIncludeAll){
        // For priority films in mustInclude mode: still try skipping
        // but only if we've already explored including — the loop above did that
        // We allow skipping even priority films to find max (they might all conflict)
        bb(idx+1,chosen);
      }
    }
    bb(0,[]);
    return best;
  }

  const mrvGroups=[...baseGroups].sort((a,b)=>a.screens.length-b.screens.length);
  const trueMax=findMax(mrvGroups,false);
  const hasPriorities=baseGroups.some(g=>g.priority);
  // Max achievable while GUARANTEEING all priorities appear
  const maxWithPriorities=hasPriorities?findMax(mrvGroups,true):trueMax;
  const priorityCost=trueMax-maxWithPriorities; // how many films you "lose" for the priority

  const seenKeys=new Set();const allScenarios=[];
  let incompatiblePriorities=false;

  function collectAt(groups,targetCount,enforcePriority){
    function backtrack(idx,chosen){
      if(allScenarios.length>=8) return;
      if(chosen.length+(groups.length-idx)<targetCount) return;
      if(idx===groups.length){
        if(chosen.length===targetCount){
          if(enforcePriority){
            // Verify all priorities are in this scenario
            const ct=new Set(chosen.map(s=>s._title));
            if(!groups.every(g=>!g.priority||ct.has(g.title))) return;
          }
          const key=chosen.map(s=>s._title+'@'+s.day+s.time).sort().join('|');
          if(!seenKeys.has(key)){seenKeys.add(key);allScenarios.push(chosen.map(c=>({...c})));}
        }
        return;
      }
      const g=groups[idx];
      for(const s of g.screens){
        if(!chosen.some(c=>screensConflict(c,s))){
          chosen.push({...s,_title:g.title});backtrack(idx+1,chosen);chosen.pop();
          if(allScenarios.length>=8) return;
        }
      }
      if(!enforcePriority||!g.priority) backtrack(idx+1,chosen);
    }
    backtrack(0,[]);
  }

  const prioritySorted=[...baseGroups].sort((a,b)=>{
    if(a.priority&&!b.priority) return -1;
    if(!a.priority&&b.priority) return 1;
    return a.screens.length-b.screens.length;
  });

  // Phase 1: scenarios WITH priorities at their correct (possibly lower) max
  if(hasPriorities&&maxWithPriorities>0){
    collectAt(prioritySorted,maxWithPriorities,true);
    for(let i=0;i<20&&allScenarios.length<8;i++) collectAt(shuffle(baseGroups),maxWithPriorities,true);
  }

  // Phase 2: if still no scenarios (priorities all conflict with each other), fall back
  if(!allScenarios.length&&hasPriorities){
    incompatiblePriorities=true;
    collectAt(prioritySorted,trueMax,false);
    for(let i=0;i<20&&allScenarios.length<8;i++) collectAt(shuffle(baseGroups),trueMax,false);
  }

  // Phase 3: fill remaining with no-priority scenarios at trueMax for diversity
  for(let i=0;i<20&&allScenarios.length<8;i++) collectAt(shuffle(baseGroups),trueMax,false);

  allScenarios.forEach(sc=>sc.sort((a,b)=>a.day_order!==b.day_order?a.day_order-b.day_order:toMin(a.time)-toMin(b.time)));

  return allScenarios.map(sc=>{
    const included=new Set(sc.map(s=>s._title));
    return{
      schedule:sc,
      excluded:pending.filter(t=>!included.has(t)),
      incompatiblePriorities,
      trueMax,
      maxWithPriorities,
      priorityCost
    };
  });
}

// ── SUGGESTIONS after saved agenda ──
function minToStr(m){const h=Math.floor(m/60),mn=m%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');}
function getSuggestions(){
  if(!savedAgenda||!savedAgenda.schedule.length) return{};
  const saved=savedAgenda.schedule.filter(s=>!screeningPassed(s));
  const seen=new Set([...watchlist]);
  const byDay={};
  const savedByDay={};
  saved.forEach(s=>{if(!savedByDay[s.day]) savedByDay[s.day]=[];savedByDay[s.day].push(s);});
  const festivalDays=['Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  festivalDays.forEach(day=>{
    const dayFilms=savedByDay[day]||[];
    const slots=[];
    if(dayFilms.length===0){
      slots.push({start:0,end:24*60,ctx:'Día libre'});
    } else {
      slots.push({start:0,end:toMin(dayFilms[0].time)-10,ctx:`Antes de ${dayFilms[0]._title||'primera función'}`});
      for(let i=0;i<dayFilms.length-1;i++){
        const a=dayFilms[i],b=dayFilms[i+1];
        const aEnd=toMin(a.time)+parseDur(a.duration);
        const aEndStr=minToStr(aEnd);
        const at=a._title||a.title||'';
        const bt=b._title||b.title||'';
        slots.push({start:aEnd+10,end:toMin(b.time)-10,ctx:`Entre ${at.split(' ').slice(0,3).join(' ')}… (termina ${aEndStr}) y ${bt.split(' ').slice(0,3).join(' ')}… (${b.time})`});
      }
      const last=dayFilms[dayFilms.length-1];
      slots.push({start:toMin(last.time)+parseDur(last.duration)+10,end:23*60,ctx:`Después de ${last._title||'última función'}`});
    }
    FILMS.forEach(f=>{
      if(seen.has(f.title)||f.is_cortos||screeningPassed(f)||f.day!==day) return;
      const fStart=toMin(f.time),fEnd=fStart+parseDur(f.duration);
      const slot=slots.find(s=>fEnd-fStart>=25&&fStart>=s.start&&fEnd<=s.end+10);
      if(slot){seen.add(f.title);if(!byDay[day]) byDay[day]=[];byDay[day].push({...f,gapCtx:slot.ctx});}
    });
  });
  return byDay;
}

function renderPrioStrip(){
  if(!prioritized.size) return'';
  const chips=[...prioritized].map(t=>{
    const p=CUSTOM_POSTERS[t]||(POSTERS[t]?TMDB_IMG+POSTERS[t]:null);
    const img=p?`<img class="prio-chip-poster" src="${p}" loading="lazy" onerror="this.outerHTML='<div class=prio-chip-ph>★</div>'" alt="">`:'<div class="prio-chip-ph">★</div>';
    const short=t.length>18?t.slice(0,16)+'…':t;
    return`<div class="prio-chip">
      ${img}
      <button class="prio-chip-rm" data-prio-title="${t.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();togglePriority(this.dataset.prioTitle)" title="Quitar prioridad">✕</button>
      <div class="prio-chip-title">${short}</div>
    </div>`;
  }).join('');
  return`<div class="prio-strip">
    <div class="prio-strip-title">★ Prioridades ${prioritized.size}/${PRIO_LIMIT}</div>
    <div class="prio-strip-row">${chips}</div>
  </div>`;
}
function renderFilmListHTML(){
  const allPending=[...watchlist].filter(t=>!watched.has(t));
  // C — Prioritized films first
  const pending=[...allPending].sort((a,b)=>{const pa=prioritized.has(a),pb=prioritized.has(b);return pa===pb?0:pa?-1:1;});
  const watchedList=[...watched];
  let html=renderPrioStrip();
  if(pending.length){
    html+='<div class="ag-film-grid">';
    html+=pending.map(t=>{
      const f=FILMS.find(fi=>fi.title===t);
      const hasFuture=FILMS.some(fi=>fi.title===t&&!screeningPassed(fi));
      const posterSrcFl=f?(CUSTOM_POSTERS[t]||(POSTERS[t]?TMDB_IMG+POSTERS[t]:null)):null;
      const posterHtmlFl=posterSrcFl?`<img class="ag-fi-poster" src="${posterSrcFl}" loading="lazy" onerror="this.className='ag-fi-poster-ph';this.innerHTML='🎬'" alt="">`:`<div class="ag-fi-poster-ph">🎬</div>`;

function exportICS(){
  if(!savedAgenda||!savedAgenda.schedule.length){showToast('No hay agenda guardada','warn');return;}
  const pad=n=>String(n).padStart(2,'0');
  const fmt=dt=>`${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//FICCI65//ES','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  savedAgenda.schedule.forEach(s=>{
    const dateStr=FESTIVAL_DATES[s.day];if(!dateStr) return;
    const start=new Date(`${dateStr}T${s.time}:00`);
    const dur=s.duration?parseInt(s.duration):90;
    const end=new Date(start.getTime()+dur*60000);
    const vc=VENUES[s.venue]||{};
    lines.push('BEGIN:VEVENT',
      `DTSTART:${fmt(start)}`,`DTEND:${fmt(end)}`,
      `SUMMARY:${s._title}`,
      `LOCATION:${s.venue}`,
      `DESCRIPTION:FICCI 65 · ${s.section||''} · ${s.duration||''}`,
      'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='FICCI65_agenda.ics';a.click();
  showToast('📅 Calendario exportado','info');
}

let cachedResult=null;

function buildResultHTML(scenarios){
  if(!scenarios||!scenarios.length)
    return`<div class="ag-calc-prompt">No hay combinaciones posibles. Ajusta disponibilidad o añade más películas.</div>`;
  const{currentIdx}=cachedResult;
  const sc=scenarios[currentIdx],n=scenarios.length;
  const pending=[...watchlist].filter(t=>!watched.has(t)&&FILMS.some(f=>f.title===t&&!screeningPassed(f)));
  const total=pending.length,ok=sc.schedule.length,bad=sc.excluded.length;

  let html=`<div class="ag-summary">
    <div class="ag-summary-title">Escenario ${currentIdx+1} de ${n}</div>
    <div class="ag-summary-text">
      Puedes ver <span class="ok"><b>${ok}</b></span> de <b>${total}</b> pendientes con funciones futuras.
      ${bad?`<span class="conflict-label"> · <b>${bad}</b> no entra${bad!==1?'n':''} en este escenario.</span>`:''}
      ${sc.priorityCost>0?`<div style="margin-top:6px;font-size:11px;color:#e5a020">⭐ Prioridad activa · Máximo con prioridad: <b>${sc.maxWithPriorities}</b> películas (sin prioridad llegarías a <b>${sc.trueMax}</b>)</div>`:''}
      ${sc.incompatiblePriorities?`<div style="margin-top:6px;font-size:11px;color:#e05050">⚠️ Las películas priorizadas se solapan entre sí — escenarios calculados sin forzar prioridades.</div>`:''}
    </div>
    ${n>1?`<div class="ag-nav">
      <button class="ag-nav-btn" onclick="changeScenario(-1)" ${currentIdx===0?'disabled':''}>← Anterior</button>
      <span class="ag-nav-pos">${currentIdx+1} / ${n}</span>
      <button class="ag-nav-btn" onclick="changeScenario(1)" ${currentIdx===n-1?'disabled':''}>Siguiente →</button>
    </div>`:''}
    ${(()=>{if(currentIdx===0||n<=1) return '';
      const prev=scenarios[currentIdx-1].schedule;
      const curr=sc.schedule;
      const prevMap=new Map(prev.map(s=>[s._title,s]));
      const diffs=curr.filter(s=>{const p=prevMap.get(s._title);return p&&(p.day!==s.day||p.time!==s.time);})
        .map(s=>{const p=prevMap.get(s._title);return s._title.split(' ').slice(0,3).join(' ')+'… '+p.time+'→'+s.time;});
      return diffs.length?`<div style="font-size:10px;color:var(--gray);margin-top:4px;padding:4px 8px;background:rgba(255,255,255,.03);border-radius:5px">vs anterior: ${diffs.join(' · ')}</div>`:'';
    })()}
    <button class="ag-save-btn" onclick="saveCurrentScenario()">📌 Guardar esta agenda</button>
  </div>`;

  if(sc.excluded.length){
    html+=`<div class="ag-conflicts"><div class="ag-conflicts-title">↩ No incluidas en este escenario</div>
      ${sc.excluded.map(t=>{
        const screens=FILMS.filter(f=>f.title===t&&!isScreeningBlocked(f)&&!screeningPassed(f));
        const opts=screens.length?screens.map(s=>`${s.day} ${s.time}`).join(' · '):'Sin funciones futuras disponibles';
        const isPrio=prioritized.has(t);
        const prioCount=prioritized.size;
        const atLimit=!isPrio&&prioCount>=PRIO_LIMIT;
        const prioLabel=isPrio?'✕ Sin prioridad':atLimit?`★ ${PRIO_LIMIT}/${PRIO_LIMIT}`:'⭐ Priorizar';
        const prioAction=isPrio?`togglePriority('${t.replace(/'/g,"\'")}')`:atLimit?`showToast('Máximo ${PRIO_LIMIT} prioridades activas','warn')`:`togglePriority('${t.replace(/'/g,"\'")}')`;
        return`<div class="ag-conflict-item">
          <div class="ag-conflict-info">
            ${isPrio?'<span style="color:var(--orange);font-size:10px;font-weight:700">★ PRIORIDAD · </span>':''}
            <strong>${t}</strong><br>
            <span style="color:var(--gray2);font-size:11px">${opts}</span>
          </div>
          <button class="ag-prioritize-btn${isPrio?' active':''}${atLimit?' disabled':''}" onclick="${prioAction}">
            ${prioLabel}
          </button>
        </div>`;
      }).join('')}
    </div>`;
  }

  const byDay={};
  sc.schedule.forEach(s=>{if(!byDay[s.day])byDay[s.day]=[];byDay[s.day].push(s);});
  DAY_KEYS.forEach(day=>{
    const films=byDay[day];if(!films||!films.length) return;
    html+=`<div class="ag-day-label"><span>${DAY_SHORT[day]}</span>${films.length} película${films.length!==1?'s':''}</div>`;
    films.forEach((s,i)=>{
      if(i>0){const warn=travelWarn(films[i-1],s);if(warn) html+=`<div class="ag-warn">${warn}</div>`;}
      const vc2=vcfg(s.venue),sl=sala(s.venue);
      const alts=FILMS.filter(f=>f.title===s._title&&!isScreeningBlocked(f)&&!screeningPassed(f)&&!(f.day===s.day&&f.time===s.time));
      {const t=s._title;const _p=CUSTOM_POSTERS[t]||(POSTERS[t]?TMDB_IMG+POSTERS[t]:null);
      const _ph=_p?`<img class="lb-poster" src="${_p}" loading="lazy" onerror="this.outerHTML='<div class=lb-poster-ph>🎬</div>'" alt="">`:'<div class="lb-poster-ph">🎬</div>';
      html+=`<div class="ag-card">
        ${_ph}
        <div class="ag-time">${s.time}</div>
        <div class="ag-info">
          <div class="ag-title">${s._title}</div>
          <div class="ag-venue">${vc2.ico} ${vc2.short}${sl?' · '+sl:''}${s.duration?' · '+s.duration:''}${alts.length?`<span class="ag-alts">${alts.length} alt.</span>`:''}</div>
        </div>
        <div class="ag-card-actions">
          <button class="ag-card-btn" onclick="toggleWatched('${s._title.replace(/'/g,"\'")}',event)" title="Marcar como vista">✓</button>
          <button class="ag-card-btn" onclick="toggleWL('${s._title.replace(/'/g,"\'")}',event)" title="Quitar">✕</button>
        </div>
      </div>`;}
    });
  });
  return html;
}

function togglePriority(title,cost){
  if(prioritized.has(title)){
    prioritized.delete(title);
    savePrio();updateCardState(title);updateAgTab();runCalc();
  } else {
    if(prioritized.size>=PRIO_LIMIT){
      showToast(`Máximo ${PRIO_LIMIT} prioridades activas. Quita una para cambiar.`,'warn');return;
    }
    prioritized.add(title);
    savePrio();updateCardState(title);updateAgTab();
    if(cost&&cost>0) showToast(`⭐ Prioridad activada · Tu máximo baja de ${cost+watchlist.size-prioritized.size+1} a ${cost} películas`,'info');
    runCalc();
  }
}
function showToast(msg,type='info'){

}

});

function addFbtn(bar,label,val,activeVal,fn){
  const b=document.createElement('button');b.className='fbtn'+(activeVal===val?' on':'');b.textContent=label;b.onclick=fn;bar.appendChild(b);
}
function renderVbar(){
  const bar=document.getElementById('vbar');bar.querySelectorAll('.fbtn').forEach(b=>b.remove());
  const vs=[...new Set(FILMS.filter(f=>f.day===activeDay).map(f=>vcfg(f.venue).short))];
  addFbtn(bar,'Todas','all',activeVenue,()=>{activeVenue='all';selectedIdx=null;setHint(null);render();});
  vs.forEach(vk=>{
    const cfg=Object.values(VENUES).find(c=>c.short===vk)||VENUES['C. Convenciones'];
    addFbtn(bar,`${cfg.ico} ${vk}`,vk,activeVenue,()=>{activeVenue=activeVenue===vk?'all':vk;selectedIdx=null;setHint(null);render();});
  });
}
function renderSbar(){
  const bar=document.getElementById('sbar');bar.querySelectorAll('.fbtn').forEach(b=>b.remove());
  let dayF=FILMS.filter(f=>f.day===activeDay);
  if(activeVenue!=='all') dayF=dayF.filter(f=>vcfg(f.venue).short===activeVenue);
  const secs=[...new Set(dayF.map(f=>f.section))].sort();
  addFbtn(bar,'Todas','all',activeSec,()=>{activeSec='all';selectedIdx=null;setHint(null);render();});
  secs.forEach(sec=>{addFbtn(bar,sec,sec,activeSec,()=>{activeSec=activeSec===sec?'all':sec;selectedIdx=null;setHint(null);render();});});
}
function setHint(film){
  const el=document.getElementById('hint');
  if(!film){el.textContent='Toca una película para ver qué otras se solapan';el.classList.remove('active');return;}
  const end=toMin(film.time)+parseDur(film.duration)+10;
  el.textContent=`⏱ Bloque: ${minToStr(toMin(film.time)-10)} – ${minToStr(end)} · Toca de nuevo para deseleccionar`;
  el.classList.add('active');
}
function onCardClick(idx,vis){
  if(selectedIdx===idx){selectedIdx=null;setHint(null);}else{selectedIdx=idx;setHint(vis[idx]);}
  applyStates(vis);
}
function applyStates(vis){
  document.querySelectorAll('.card').forEach((card,i)=>{
    card.classList.remove('selected','conflict');
    if(selectedIdx===null) return;
    if(i===selectedIdx) card.classList.add('selected');
    else{
      const fStart=toMin(vis[i].time),sel=vis[selectedIdx];
      const s=toMin(sel.time)-10,e=toMin(sel.time)+parseDur(sel.duration)+10;
      if(fStart>s&&fStart<e) card.classList.add('conflict');
    }
  });
}
const expandedProgs=new Set(JSON.parse(sessionStorage.getItem('ficci65_exp')||'[]'));
function toggleExpand(el,e){
  e.stopPropagation();
  const card=el.closest('.card');
  const listEl=card.querySelector('.c-film-list,.c-title-pills');
  const arrow=el.querySelector('.c-expand-arrow');
  if(!listEl) return;
  listEl.classList.toggle('visible');arrow.classList.toggle('open');
  const open=listEl.classList.contains('visible');
  el.querySelector('span:first-child').textContent=open?'Ocultar programa':'Ver programa';
  const title=card.dataset.title;
  if(title){if(open) expandedProgs.add(title);else expandedProgs.delete(title);}
  try{sessionStorage.setItem('ficci65_exp',JSON.stringify([...expandedProgs]));}catch(er){}
}
function restoreExpand(){
  if(!expandedProgs.size) return;
  document.querySelectorAll('.card.program[data-title]').forEach(card=>{
    if(!expandedProgs.has(card.dataset.title)) return;
    const listEl=card.querySelector('.c-film-list,.c-title-pills');
    const arrow=card.querySelector('.c-expand-arrow');
    const lbl=card.querySelector('.c-expand span:first-child');
    if(listEl){listEl.classList.add('visible');if(arrow) arrow.classList.add('open');if(lbl) lbl.textContent='Ocultar programa';}
  });
}

function render(){
  if(activeView==='agenda') return;
  renderVbar();renderSbar();
  let films=FILMS.filter(f=>f.day===activeDay);
  if(activeVenue!=='all') films=films.filter(f=>vcfg(f.venue).short===activeVenue);
  if(activeSec!=='all') films=films.filter(f=>f.section===activeSec);
  restoreExpand();
  document.getElementById('cnt').innerHTML=`<b>${films.length}</b> función${films.length!==1?'es':''}`;
  const grid=document.getElementById('grid');
  if(!films.length){grid.innerHTML='<div class="empty"><span>🎞️</span>Sin funciones para este filtro.</div>';return;}
  grid.innerHTML=films.map((f,i)=>{
    const vc=vcfg(f.venue),sl=sala(f.venue);
    const isAp=f.section==='🎬 Apertura',isMid=f.section==='🌙 Medianoche',isProg=f.is_cortos;
    const passed=screeningPassed(f);
    const flags=f.flags||'🎬';
    const tEn=!isProg&&f.title_en&&f.title_en!==f.title&&!f.title_en.includes('·')?f.title_en:'';
    const durMin=f.duration?parseInt(f.duration):0;
    const durLong=!isProg&&durMin>150?`<span class='dur-long'>⏱ ${Math.floor(durMin/60)}h ${durMin%60}min</span>`:'';
    const secActive=activeSec===f.section?' active-sec':'';
    const inWL=watchlist.has(f.title),inW=watched.has(f.title);
    let filmBlock='';
    if(isProg){
      const list=f.film_list||[];
      if(list.length) filmBlock=`<div class="c-film-list">${list.map((item,n)=>{const thumb=SHORT_IMGS[item.title];const thumbHtml=thumb?`<img src="${thumb}" class="c-film-thumb" loading="lazy" onerror="this.style.display='none'" alt="">`:'<div class="c-film-thumb-ph"></div>';return`<div class="c-film-item">${thumbHtml}<div class="c-film-num">${n+1}</div><div class="c-film-info"><div class="c-film-title">${item.title}</div><div class="c-film-meta">${item.country}</div></div><div class="c-film-dur">${item.duration}</div></div>`}).join('')}</div>`;
      else{const titles=(f.title_en||'').split('·').map(t=>t.trim()).filter(Boolean);if(titles.length) filmBlock=`<div class="c-title-pills">${titles.map(t=>`<span class="c-title-pill">${t}</span>`).join('')}</div>`;}
    }
    const expandBtn=isProg&&filmBlock?`<div class="c-expand" onclick="toggleExpand(this,event)"><span>Ver programa</span><span class="c-expand-arrow">▼</span></div>`:'';
    const safe=f.title.replace(/"/g,'&quot;').replace(/'/g,"\'");
    const inPrio=prioritized.has(f.title);
    const prioBtn=!isProg?`<button class="action-btn prio-btn${inPrio?' prio-on':''}" onclick="togglePriority('${safe}')" title="${inPrio?'Quitar prioridad':'Priorizar'}">★</button>`:'';
    const actBtns=`<div class="card-actions">
      <button class="action-btn wl-btn${inWL?' wl-on':''}" onclick="toggleWL('${safe}',event)" title="${inWL?'Quitar de Mi agenda':'Añadir a Mi agenda'}">${inWL?'♥':'♡'}</button>
      <button class="action-btn w-btn${inW?' w-on':''}" onclick="toggleWatched('${safe}',event)" title="${inW?'Marcar como pendiente':'Marcar como vista'}">✓</button>
      ${prioBtn}
    </div>`;
    const apBadge=isAp?'<div class="apertura-badge">✦ APERTURA</div>':'';
    const nowBadge=isNowShowing(f)?'<div class="now-label"><span class="now-pulse"></span>AHORA</div>':'';
    const pastBadge=passed?'<div class="past-badge">ya pasó</div>':'';
    const lbPill=isProg?'':`<a class="c-lb" href="https://letterboxd.com/search/films/${encodeURIComponent(f.title)}/" target="_blank" rel="noopener" onclick="event.stopPropagation()">${LB_SVG}<span class="c-lb-text">Letterboxd</span></a>`;
    const posterSrc=!isProg?(CUSTOM_POSTERS[f.title]||(POSTERS[f.title]?TMDB_IMG+POSTERS[f.title]:null)):null;
    // Programs: no poster in collapsed state — thumbnails only shown on expand
    const posterHtml=posterSrc?`<div class="c-poster"><img src="${posterSrc}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=c-poster-none><span>🎬</span></div>'"></div>`:'';
    const hasPoster=!!posterSrc;
    return`<div class="card${isAp?' apertura':isProg?' program':''}${inWL&&!inW?' in-wl':inW?' in-watched':''}${passed?' past-card':''}" data-idx="${i}" data-title="${f.title.replace(/"/g,'&quot;')}">
      ${apBadge}${pastBadge}${nowBadge}${actBtns}
      <div class="c-body${hasPoster?' has-poster':''}">
        ${posterHtml}
        <div${hasPoster?' class="c-content"':''}>
        <div class="c-film">
          <div class="c-time" style="${passed?'color:var(--gray2)':''}">${f.time}</div>
          <div class="c-title">${f.title}${isMid?' 🌙':''}</div>
          ${tEn?`<div class="c-title-en">${tEn}</div>`:''}
          ${durLong?`<div style="margin-top:2px">${durLong}</div>`:''}
          <div class="c-flags">${flags}</div>
        </div>
        <div class="c-div"></div>
        <div class="c-venue"><div class="c-venue-name">${vc.ico} ${vc.short}</div>${sl?`<div class="c-venue-sub">${sl}</div>`:''}</div>
        ${expandBtn}${filmBlock}
        </div>
      </div>
      <div class="c-foot">
        <div class="c-foot-l">
          <span class="c-sec${secActive}" data-sec="${f.section.replace(/"/g,'&quot;')}">${f.section}</span>
          ${isProg?'<span class="prog-badge">● PROGRAMA</span>':''}${lbPill}
        </div>
        <span class="c-dur">🕐 ${f.duration}</span>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('.card-actions')||e.target.closest('.c-expand')||e.target.closest('.c-lb')) return;
      if(e.target.closest('.c-sec')){const sec=e.target.closest('.c-sec').dataset.sec;activeSec=activeSec===sec?'all':sec;selectedIdx=null;setHint(null);render();return;}
      onCardClick(parseInt(card.dataset.idx),films);
    });
  });
  if(selectedIdx!==null&&selectedIdx<films.length) applyStates(films);
}

loadState();updateAgTab();render();
</script>
</body>
</html>
