function isScreeningBlocked(s){
  const av=availability[s.day];if(!av) return false;
  const sStart=toMin(s.time),sEnd=sStart+parseDur(s.duration);
  // Chequeo de solapamiento completo: excluye funciones que ocurran durante el bloque
  return av.blocks.some(b=>sStart<toMin(b.to)&&sEnd>toMin(b.from));
}

// ── ALGORITHM — exhaustive max + MRV + random restarts ──
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── Mejora 1: Scoring por película ──
// Pondera cuánto vale incluir una película según rareza, sección y duración
function scoreFilm(title, screens, isPriority, allTitles){
  let score=0;
  // Prioridad explícita: peso máximo
  if(isPriority) score+=100;
  // Unicidad: menos funciones = más difícil de ver = mayor peso
  const n=screens.length;
  if(n===1) score+=40;
  else if(n===2) score+=20;
  else score+=5;
  // Sección única: si es la única película de su sección en la watchlist
  const mySection=screens[0]?.section||'';
  const siblingsInSection=allTitles.filter(t=>{
    if(t===title) return false;
    return FILMS.some(f=>f.title===t&&f.section===mySection);
  });
  if(siblingsInSection.length===0) score+=15;
  // Duración larga: película de >150 min es un compromiso grande, priorizar
  const dur=parseInt(screens[0]?.duration)||0;
  if(dur>150) score+=10;
  return score;
}

// ── Mejora 2: Interval Scheduling — ordenar funciones por conflictos mínimos + fin temprano ──
// Para cada película con múltiples funciones, prioriza la que:
// 1. Conflicta con menos otras funciones de la watchlist (menos bloqueos)
// 2. Termina más temprano (earliest-finish-time: principio clásico de interval scheduling)
function sortScreensByStrategy(screens, allGroups){
  // Precalcular todas las funciones de todas las otras películas
  const allOtherScreenings=allGroups.flatMap(g=>g.screens);
  return [...screens].sort((a,b)=>{
    // Contar cuántas funciones ajenas conflictan con cada opción
    const conflA=allOtherScreenings.filter(s=>s!==a&&screensConflict(a,s)).length;
    const conflB=allOtherScreenings.filter(s=>s!==b&&screensConflict(b,s)).length;
    if(conflA!==conflB) return conflA-conflB; // menos conflictos primero
    // Si empatan, earliest finish time (termina antes = deja más espacio)
    const endA=toMin(a.time)+parseDur(a.duration);
    const endB=toMin(b.time)+parseDur(b.duration);
    return endA-endB;
  });
}


// ═══════════════════════════════════════════════════════════════
// 10 · LÓGICA DE NEGOCIO
//      computeScenarios (MRV+backtracking), getSuggestions
// ═══════════════════════════════════════════════════════════════
function computeScenarios(titles){
  const pending=titles.filter(t=>!watched.has(t));
  const allPendingTitles=pending; // for section uniqueness check
  const baseGroups=pending.map(t=>{
    const screens=FILMS.filter(f=>f.title===t&&!isScreeningBlocked(f)&&!screeningPassed(f));
    const isPrio=prioritized.has(t);
    const sc=scoreFilm(t,screens,isPrio,allPendingTitles);
    return{title:t,screens,priority:isPrio,score:sc};
  }).filter(g=>g.screens.length>0);
  if(!baseGroups.length) return[];

  // Aplicar Mejora 2: ordenar las funciones de cada película por estrategia
  baseGroups.forEach(g=>{
    if(g.screens.length>1) g.screens=sortScreensByStrategy(g.screens,baseGroups);
  });

  // MRV + Score: restaurado (DP con grupos requiere formulación diferente)
  const mrvGroups=[...baseGroups].sort((a,b)=>{
    if(b.score!==a.score) return b.score-a.score;
    return a.screens.length-b.screens.length;
  });

  // ─────────────────────────────────────────────────────────────────────────
  // ⚠️  FIX CRÍTICO — NO REMOVER (Apr 2026)
  // MAX_NODES_PER_CALL debe aplicarse a AMBAS funciones: findMax/bb y collectAt
  // Sin este límite en findMax, el motor JS de mobile corta la recursión antes
  // que desktop → trueMax diferente entre dispositivos → escenarios inconsistentes
  // (ej: desktop muestra 8 películas por escenario, mobile solo 2)
  // Valor 80000: suficiente para watchlists de hasta ~25 películas en mobile.
  // DEBE declararse ANTES de findMax — const tiene zona muerta temporal (TDZ).
  // ─────────────────────────────────────────────────────────────────────────
  const MAX_NODES_PER_CALL=80000;

  function findMax(groups, mustIncludeAll){
    let best=0;
    let nodes=0;
    function bb(idx,chosen){
      if(++nodes>MAX_NODES_PER_CALL) return;
      const remaining=groups.length-idx;
      if(chosen.length+remaining<=best) return;
      if(idx===groups.length){
        if(!mustIncludeAll){
          if(chosen.length>best) best=chosen.length;
        } else {
          const chosenTitles=new Set(chosen.map(s=>s._title));
          const allPrioritiesIn=groups.every(g=>!g.priority||chosenTitles.has(g.title));
          if(allPrioritiesIn&&chosen.length>best) best=chosen.length;
        }
        return;
      }
      const g=groups[idx];
      for(const s of g.screens){
        if(!chosen.some(c=>screensConflict(c,s))){
          chosen.push({...s,_title:g.title});bb(idx+1,chosen);chosen.pop();
        }
      }
      if(!g.priority) bb(idx+1,chosen);
      else bb(idx+1,chosen);
    }
    bb(0,[]);
    return best;
  }

  const trueMax=findMax(mrvGroups,false);
  const hasPriorities=baseGroups.some(g=>g.priority);
  const maxWithPriorities=hasPriorities?findMax(mrvGroups,true):trueMax;
  const priorityCost=trueMax-maxWithPriorities;

  const seenKeys=new Set();const allScenarios=[];
  let incompatiblePriorities=false;

  function collectAt(groups,targetCount,enforcePriority){
    let nodes=0;
    function backtrack(idx,chosen){
      if(allScenarios.length>=8) return;
      if(++nodes>MAX_NODES_PER_CALL) return; // mismo límite en todos los dispositivos
      if(chosen.length+(groups.length-idx)<targetCount) return;
      if(idx===groups.length){
        if(chosen.length===targetCount){
          if(enforcePriority){
            const ct=new Set(chosen.map(s=>s._title));
            if(!groups.every(g=>!g.priority||ct.has(g.title))) return;
          }
          const key=chosen.map(s=>s._title+'@'+s.day+s.time).sort().join('|');
          if(!seenKeys.has(key)){seenKeys.add(key);allScenarios.push(chosen.map(c=>({...c})));}
        }
        return;
      }
      const g=groups[idx];
      for(const s of g.screens){
        if(!chosen.some(c=>screensConflict(c,s))){
          chosen.push({...s,_title:g.title});backtrack(idx+1,chosen);chosen.pop();
          if(allScenarios.length>=8) return;
        }
      }
      if(!enforcePriority||!g.priority) backtrack(idx+1,chosen);
    }
    backtrack(0,[]);
  }

  const prioritySorted=[...baseGroups].sort((a,b)=>{
    if(a.priority&&!b.priority) return -1;
    if(!a.priority&&b.priority) return 1;
    return a.screens.length-b.screens.length;
  });

  // Phase 1: scenarios WITH priorities — max 4 slots to leave room for diversity
  if(hasPriorities&&maxWithPriorities>0){
    collectAt(prioritySorted,maxWithPriorities,true);
    for(let i=0;i<20&&allScenarios.length<4;i++) collectAt(shuffle(baseGroups),maxWithPriorities,true);
  }

  // Phase 2: if still no scenarios (priorities all conflict with each other), fall back
  if(!allScenarios.length&&hasPriorities){
    incompatiblePriorities=true;
    collectAt(prioritySorted,trueMax,false);
    for(let i=0;i<20&&allScenarios.length<4;i++) collectAt(shuffle(baseGroups),trueMax,false);
  }

  // Phase 3: fill remaining slots with diverse no-priority scenarios
  for(let i=0;i<30&&allScenarios.length<8;i++) collectAt(shuffle(baseGroups),trueMax,false);

  allScenarios.forEach(sc=>sc.sort((a,b)=>a.day_order!==b.day_order?a.day_order-b.day_order:toMin(a.time)-toMin(b.time)));

  // ── Mejora 3: Balanceo por día ──
  // Calcular desviación estándar de películas por día — menor = más balanceado
  function dayBalance(sc){
    const counts={};
    sc.forEach(s=>{counts[s.day]=(counts[s.day]||0)+1;});
    const vals=Object.values(counts);
    if(vals.length<=1) return 0;
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    const variance=vals.reduce((a,v)=>a+Math.pow(v-mean,2),0)/vals.length;
    return Math.sqrt(variance); // 0 = perfectamente balanceado
  }
  // Ordenar: primero los más balanceados (menor desviación estándar)
  allScenarios.sort((a,b)=>dayBalance(a)-dayBalance(b));

  return allScenarios.map(sc=>{
    const included=new Set(sc.map(s=>s._title));
    return{
      schedule:sc,
      excluded:pending.filter(t=>!included.has(t)),
      incompatiblePriorities,
      trueMax,
      maxWithPriorities,
      priorityCost,
      dayBalance:Math.round(dayBalance(sc)*10)/10
    };
  });
}

// ── SUGGESTIONS after saved agenda ──
function getSuggestions(){
  if(!savedAgenda||!savedAgenda.schedule.length) return{};
  const saved=savedAgenda.schedule.filter(s=>!screeningPassed(s));
  if(!saved.length) return{};

  const savedTitles=new Set(saved.map(s=>s._title));
  const byDay={};

  // Excluir siempre: ya en agenda o ya vistas
  const hardExclude=new Set([...savedTitles,...watched]);
  // Para descubrimiento (Bloque 1): también excluir watchlist (ya las conoces)
  const seenDiscover=new Set([...hardExclude,...watchlist]);
  // Para recuperación (Bloque 2): solo excluir hardExclude
  const seenRecovery=new Set([...hardExclude]);

  // ── Slots reservados: todas las películas recientemente quitadas ──
  // Solo muestra "← Restaurar" si el slot original está libre (sin conflicto)
  // Si el slot está ocupado, la película cae a Bloque 2 para buscar slot alternativo
  const currentSaved=savedAgenda?savedAgenda.schedule:[];
  lastRemovedSlots.forEach(rs=>{
    if(savedTitles.has(rs._title)||screeningPassed(rs)) return;
    const slotFree=!currentSaved.some(s=>screensConflict(s,rs));
    if(!slotFree) return; // slot ocupado — cae a Bloque 2
    const day=rs.day;
    if(!byDay[day]) byDay[day]=[];
    byDay[day].push({...rs,gapCtx:'← Restaurar al mismo horario',_isRestored:true});
    hardExclude.add(rs._title);
    seenDiscover.add(rs._title);
    seenRecovery.add(rs._title);
  });

  DAY_KEYS.forEach(day=>{
    const dayItems=saved.filter(s=>s.day===day).sort((a,b)=>toMin(a.time)-toMin(b.time));

    // Calcular huecos del día
    const slots=[];
    if(dayItems.length===0){
      // Día completamente libre — cubre hasta la 1am
      slots.push({start:0,end:25*60,ctx:'Día libre en tu Plan'});
    } else {
      // Antes de la primera
      if(toMin(dayItems[0].time)>60)
        slots.push({start:0,end:toMin(dayItems[0].time)-5,ctx:`Antes de ${(dayItems[0]._title||'').split(' ').slice(0,3).join(' ')}…`});
      // Entre funciones — cualquier hueco positivo (el chequeo fStart/fEnd filtra lo imposible)
      for(let i=0;i<dayItems.length-1;i++){
        const a=dayItems[i],b=dayItems[i+1];
        const aEnd=toMin(a.time)+parseDur(a.duration)+5;
        const bStart=toMin(b.time)-5;
        if(bStart>aEnd)
          slots.push({start:aEnd,end:bStart,ctx:`Entre ${(a._title||'').split(' ').slice(0,3).join(' ')}… y ${(b._title||'').split(' ').slice(0,3).join(' ')}…`});
      }
      // Después de la última — siempre se crea, extiende hasta la 1am
      // Bug fix: el if(lastEnd<22*60) cortaba noches con película tardía (ej: 20:00+90min=22:10 → sin slot)
      const last=dayItems[dayItems.length-1];
      const lastEnd=toMin(last.time)+parseDur(last.duration)+5;
      slots.push({start:lastEnd,end:25*60,ctx:`Después de ${(last._title||'').split(' ').slice(0,3).join(' ')}…`});
    }

    // Bloque 1 — Descubrimiento: películas del festival que quepan en huecos
    if(slots.length){
      FILMS.forEach(f=>{
        if(seenDiscover.has(f.title)||screeningPassed(f)||f.day!==day||isScreeningBlocked(f)) return;
        const fStart=toMin(f.time),fEnd=fStart+parseDur(f.duration);
        const slot=slots.find(sl=>fStart>=sl.start&&fEnd<=sl.end&&fEnd-fStart>=20);
        if(slot){
          seenDiscover.add(f.title);seenRecovery.add(f.title);
          if(!byDay[day]) byDay[day]=[];
          byDay[day].push({...f,gapCtx:slot.ctx});
        }
      });
    }

    // Bloque 2 — Recuperación: watchlist no en agenda
    // Usa screensConflict (±10 min) — mismo criterio que el algoritmo de planificación
    // Solo aparece si genuinamente cabe sin conflicto en el plan actual
    [...watchlist].filter(t=>!seenRecovery.has(t)).forEach(t=>{
      FILMS.filter(f=>f.title===t&&f.day===day&&!screeningPassed(f)&&!isScreeningBlocked(f)).forEach(f=>{
        if(seenRecovery.has(f.title)) return;
        const noConflict=!saved.some(s=>screensConflict(s,f));
        if(noConflict){
          seenRecovery.add(f.title);seenDiscover.add(f.title);
          if(!byDay[day]) byDay[day]=[];
          byDay[day].push({...f,gapCtx:'De tu lista · cabe en tu agenda'});
        }
      });
    });
  });
  // ── Ordenar cronológicamente dentro de cada día ──
  Object.keys(byDay).forEach(d=>{
    byDay[d].sort((a,b)=>toMin(a.time)-toMin(b.time));
  });
  return byDay;
}

// Utility: extraer displayTitle y progSuffix de cualquier título de programa
function parseProgramTitle(t){
  let displayTitle=t, progSuffix='';
  const f=FILMS.find(fi=>fi.title===t);
  if(f?.is_cortos){
    if(t.startsWith('Prog.')){
      const m=t.match(/^(Prog\.[^—–]+)\s*[—–]\s*(.+)$/);
      if(m){displayTitle=m[2].trim();progSuffix=m[1].trim();}
    } else {
      const m=t.match(/^(.+?)\s*[—–]\s*(Prog\..*)$/);
      if(m){displayTitle=m[1];progSuffix=m[2];}
    }
    if(progSuffix&&!/\d/.test(progSuffix)) progSuffix='';
  }
  return{displayTitle,progSuffix};
}

function renderPrioStrip(){
  if(!prioritized.size) return emptyState(ICONS.star,'No hay prioridades aún.','Añádelas desde Selección. Máximo 3 activas.');
  const chips=[...prioritized].map(t=>{
    const f=FILMS.find(fi=>fi.title===t);
    const p=f?.is_cortos?FICCI_POSTER_URL:getPosterSrc(t,false);
    const img=p?`<img class="prio-chip-poster" src="${p}" loading="lazy" style="${f?.is_cortos?'object-fit:contain;background:#111':''}" onerror="this.outerHTML='<div class=prio-chip-ph>🎬</div>'" alt="">`:`<div class="prio-chip-ph">${ICONS.star}</div>`;
    const{displayTitle,progSuffix}=parseProgramTitle(t);
    const short=displayTitle.length>16?displayTitle.slice(0,14)+'…':displayTitle;
    return`<div class="prio-chip">
      ${img}
      <button class="prio-chip-rm" data-prio-title="${t.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();togglePriority(this.dataset.prioTitle)" title="Quitar prioridad">${ICONS.x}</button>
      <div class="prio-chip-title">${short}${progSuffix?`<span style="color:var(--orange);display:block;font-size:9px;margin-top:1px">${progSuffix}</span>`:''}</div>
    </div>`;
  }).join('');
  return`<div class="prio-strip">
    <div class="prio-strip-title">${ICONS.star} Prioridades ${prioritized.size}/${PRIO_LIMIT}</div>
    <div class="prio-strip-row">${chips}</div>
  </div>`;
}
function renderFilmListHTML(){
  const prioList=[...prioritized].filter(t=>!watched.has(t));
  const nonPrioList=[...watchlist].filter(t=>!watched.has(t)&&!prioritized.has(t));
  const allPending=[...new Set([...prioList,...nonPrioList])];
  const watchedList=[...watched];

function renderNextStrip(schedule){
  if(!schedule||!schedule.length) return'';
  const now=simNow();
  const upcoming=schedule
    .filter(s=>!watched.has(s._title))
    .map(s=>{
      const dateStr=FESTIVAL_DATES[s.day];if(!dateStr) return null;
      const start=new Date(`${dateStr}T${s.time}:00`);
      const dur=parseDur(s.duration);
      const end=new Date(start.getTime()+dur*60000);
      return{...s,start,end,startMin:toMin(s.time),endMin:toMin(s.time)+dur};
    })
    .filter(Boolean)
    .sort((a,b)=>a.start-b.start);
  const nowMs=now.getTime();
  const nowMin=now.getHours()*60+now.getMinutes();
  const inProg=upcoming.find(s=>s.start<=now&&s.end>now);
  const next=upcoming.find(s=>s.start>now);
  const item=inProg||next;
  if(!item) return'';
  // Only show strip if within 59 min of next film (or in progress)
  if(!inProg){
    const minsAway=Math.ceil((item.start-now)/60000);
    if(minsAway>59) return'';
  }
  const{displayTitle}=parseProgramTitle(item._title||'');
  const short=displayTitle.length>30?displayTitle.slice(0,28)+'…':displayTitle;
  const vc2=vcfg(item.venue),sl=sala(item.venue);
  let label,ico;
  if(inProg){
    const leftMin=item.endMin-nowMin;
    label=`En curso · termina en ${leftMin} min`;ico=ICONS.play;
  } else {
    const mins=Math.ceil((item.start-now)/60000);
    label=mins<60?`En ${mins} min`:`En ${Math.floor(mins/60)}h${mins%60?` ${mins%60}min`:''}`;ico=ICONS.clock;
  }
  return`<div class="next-film-strip${inProg?' now':''}">
    <div class="next-film-ico">${ico}</div>
    <div class="next-film-info">
      <div class="next-film-countdown">${label}</div>
      <div class="next-film-title">${short}</div>
      <div class="next-film-venue">${ICONS.pin} ${vc2.short}${sl?' · '+sl:''}</div>
    </div>
  </div>`;
}

function renderUnconfirmed(schedule){

    const da=new Date(`${FESTIVAL_DATES[a.day]}T${a.time}:00`);
    const db=new Date(`${FESTIVAL_DATES[b.day]}T${b.time}:00`);
    return db-da;

  if(!past.length) return'';
  const nowMin=now.getHours()*60+now.getMinutes();

        return`<div class="checkin-item">

        onclick="const el=document.getElementById('ctx-older');el.style.display=el.style.display==='none'?'block':'none'">
        + ${older.length} anterior${older.length>1?'es':''} sin confirmar
      </button>
    </div>`:'';
  return`<div class="checkin-wrap">
    <div class="checkin-hdr">Funciones sin confirmar</div>

function toggleFilmAlternatives(key,title,day,time){
  if(_expandedFilm===key){_expandedFilm='';renderAgenda();return;}
  _expandedFilm=key;
  renderAgenda();
}

function renderFilmAlternatives(title,day,time){
  const fStart=toMin(time);
  const safeT=title.replace(/'/g,"\'");
  const plannedTitles=new Set(savedAgenda?savedAgenda.schedule.map(s=>s._title):[]);
  // ±15 min window — direct competition in the same slot
  const WINDOW=15;
  const opts=FILMS.filter(f=>{
    if(f.day!==day) return false;
    if(f.title===title) return false;
    if(plannedTitles.has(f.title)) return false;
    if(watched.has(f.title)) return false;
    if(isScreeningBlocked(f)) return false;
    return Math.abs(toMin(f.time)-fStart)<=WINDOW;
  }).sort((a,b)=>toMin(a.time)-toMin(b.time));

  const optsHtml=opts.map(f=>{
    const vc2=vcfg(f.venue);
    const{displayTitle}=parseProgramTitle(f.title);
    const short=displayTitle.length>28?displayTitle.slice(0,26)+'…':displayTitle;
    const safeTNew=f.title.replace(/'/g,"\'");
    return`<div class="checkin-opt" onclick="confirmReplace('${safeT}','${safeTNew}','${f.day}','${f.time}')">
      <div class="checkin-opt-info">
        <div class="checkin-opt-time">${f.time} · ${f.duration}</div>
        <div class="checkin-opt-title">${short}</div>
        <div class="checkin-opt-venue">${ICONS.pin} ${vc2.short}</div>
      </div>
      <div class="checkin-opt-add">${ICONS.plus}</div>
    </div>`;
  }).join('');

  return`<div class="film-alts">
    ${optsHtml||`<div style="padding:10px 14px;font-size:11px;color:var(--gray)">No hay alternativas en este horario — revisa Sugerencias.</div>`}
    <div style="padding:4px 14px 10px">
      <button class="checkin-result-btn secondary" style="width:100%;font-size:11px" onclick="_expandedFilm='';renderAgenda()">Cerrar</button>
    </div>
  </div>`;
}

function confirmReplaceWithNext(removedTitle,nextTitle,newTitle,day,time){
  const{displayTitle:dn}=parseProgramTitle(nextTitle);
  const{displayTitle:dt}=parseProgramTitle(newTitle);
  const shortNext=dn.length>22?dn.slice(0,20)+'…':dn;
  const shortNew=dt.length>22?dt.slice(0,20)+'…':dt;
  const{displayTitle:dr}=parseProgramTitle(removedTitle);
  const shortRem=dr.length>22?dr.slice(0,20)+'…':dr;
  const existing=document.getElementById('conflict-modal');if(existing) existing.remove();
  const modal=document.createElement('div');
  modal.id='conflict-modal';modal.className='conflict-modal';
  modal.innerHTML=`<div class="conflict-modal-box">
    <div class="conflict-modal-hdr">${ICONS.alert} Se cancela la siguiente</div>
    <div class="conflict-modal-body">Reemplazar <b>${shortRem}</b> por <b>${shortNew}</b> y cancelar <b>${shortNext}</b> del plan.</div>
    <div class="conflict-modal-btns">
      <button class="conflict-modal-btn cancel" onclick="document.getElementById('conflict-modal').remove()">Cancelar</button>
      <button class="conflict-modal-btn confirm" id="replace-next-ok">Confirmar</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>{
    const btn=document.getElementById('replace-next-ok');
    if(btn) btn.onclick=()=>{
      modal.remove();
      _removePlanItem(removedTitle);
      _removePlanItem(nextTitle);
      const screen=FILMS.find(f=>f.title===newTitle&&f.day===day&&f.time===time);
      if(screen){
        if(!savedAgenda) savedAgenda={schedule:[]};
        if(!watchlist.has(newTitle)){watchlist.add(newTitle);saveWL();}
        savedAgenda.schedule=savedAgenda.schedule.filter(s=>s._title!==newTitle);
        savedAgenda.schedule.push({...screen,_title:newTitle});
        savedAgenda.schedule.sort((a,b)=>DAY_KEYS.indexOf(a.day)-DAY_KEYS.indexOf(b.day)||toMin(a.time)-toMin(b.time));
        saveSavedAgenda();
      }
      _expandedFilm='';
      const{displayTitle:dNew}=parseProgramTitle(newTitle);
      showToast(`Reemplazada · ${dNew.length>25?dNew.slice(0,23)+'…':dNew}`,'info');
      renderAgenda();
    };
  },50);
}

function confirmReplace(removedTitle,newTitle,day,time){
  const{displayTitle:dt}=parseProgramTitle(newTitle);
  const shortNew=dt.length>22?dt.slice(0,20)+'…':dt;
  const{displayTitle:dr}=parseProgramTitle(removedTitle||'');
  const shortRem=dr.length>22?dr.slice(0,20)+'…':dr;
  const existing=document.getElementById('conflict-modal');if(existing) existing.remove();
  const modal=document.createElement('div');
  modal.id='conflict-modal';modal.className='conflict-modal';
  modal.innerHTML=`<div class="conflict-modal-box">
    <div class="conflict-modal-hdr">${removedTitle?'¿Reemplazar función?':'¿Añadir al plan?'}</div>
    <div class="conflict-modal-body">${removedTitle?`Quitar <b>${shortRem}</b> y añadir`:'Añadir'} <b>${shortNew}</b> a tu plan.</div>
    <div class="conflict-modal-btns">
      <button class="conflict-modal-btn cancel" onclick="document.getElementById('conflict-modal').remove()">Cancelar</button>
      <button class="conflict-modal-btn confirm" id="replace-ok">Sí${removedTitle?', reemplazar':', añadir'}</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>{
    const btn=document.getElementById('replace-ok');
    if(btn) btn.onclick=()=>{
      modal.remove();
      if(removedTitle) _removePlanItem(removedTitle);
      const screen=FILMS.find(f=>f.title===newTitle&&f.day===day&&f.time===time);
      if(screen){
        if(!savedAgenda) savedAgenda={schedule:[]};
        if(!watchlist.has(newTitle)){watchlist.add(newTitle);saveWL();}
        savedAgenda.schedule=savedAgenda.schedule.filter(s=>s._title!==newTitle);
        savedAgenda.schedule.push({...screen,_title:newTitle});
        savedAgenda.schedule.sort((a,b)=>DAY_KEYS.indexOf(a.day)-DAY_KEYS.indexOf(b.day)||toMin(a.time)-toMin(b.time));
        saveSavedAgenda();
      }
      _expandedFilm='';
      showToast(removedTitle?`Reemplazada por ${shortNew}`:`${shortNew} añadida al plan`,'info');
      renderAgenda();
    };
  },50);
}

function renderGapOptions(gapStartMin,gapEndMin,todayKey,removedTitle){
  removedTitle=removedTitle||'';
  const plannedTitles=new Set(savedAgenda?savedAgenda.schedule.map(s=>s._title):[]);
  const now=simNow();const nowMin=now.getHours()*60+now.getMinutes();
  // Only apply in-progress logic if todayKey matches the actual current festival day
  const realTodayKey=DAY_KEYS.find(d=>FESTIVAL_DATES[d]===simTodayStr());
  const isLiveDay=realTodayKey===todayKey;
  const MIN_REMAINING=20;
  const safeRem=removedTitle.replace(/'/g,"\'");
  const opts=FILMS.filter(f=>{
    if(f.day!==todayKey) return false;
    if(isScreeningBlocked(f)) return false;
    if(plannedTitles.has(f.title)&&f.title!==removedTitle) return false;
    if(f.title===removedTitle) return false;
    if(watched.has(f.title)) return false;
    const fStart=toMin(f.time),fEnd=fStart+parseDur(f.duration);
    const inProgress=isLiveDay&&fStart<nowMin&&fEnd>nowMin;
    if(inProgress) return (fEnd-nowMin)>=MIN_REMAINING&&fEnd<=gapEndMin;
    return fStart>=gapStartMin&&fEnd<=gapEndMin;
  }).sort((a,b)=>{
    const aStart=toMin(a.time),bStart=toMin(b.time);
    const aFuture=!isLiveDay||aStart>=nowMin,bFuture=!isLiveDay||bStart>=nowMin;
    if(aFuture&&!bFuture) return -1;
    if(!aFuture&&bFuture) return 1;
    if(aFuture&&bFuture) return aStart-bStart;
    return(bStart+parseDur(b.duration))-(aStart+parseDur(a.duration));
  }).slice(0,4);
  if(!opts.length) return`<div style="padding:8px 14px 4px;font-size:11px;color:var(--gray)">No hay funciones disponibles para este hueco.</div>`;
  return opts.map(f=>{
    const vc2=vcfg(f.venue);const{displayTitle}=parseProgramTitle(f.title);
    const short=displayTitle.length>26?displayTitle.slice(0,24)+'…':displayTitle;
    const safeT=f.title.replace(/'/g,"\'");
    const fStart=toMin(f.time);const inProg=isLiveDay&&fStart<nowMin;
    const minsIn=inProg?nowMin-fStart:0;
    const badge=inProg?`<span style="font-size:9px;color:var(--green);font-weight:700;display:block;margin-bottom:2px">EN CURSO · entró hace ${minsIn} min</span>`:'';
    return`<div class="checkin-opt" onclick="confirmReplace('${safeRem}','${safeT}','${f.day}','${f.time}')">
      <div class="checkin-opt-info">${badge}<div class="checkin-opt-time">${f.time} · ${f.duration}</div><div class="checkin-opt-title">${short}</div><div class="checkin-opt-venue">${ICONS.pin} ${vc2.short}</div></div>
      <div class="checkin-opt-add">${ICONS.plus}</div>
    </div>`;
  }).join('');
}

function _buildAgendaCanvas(){
  const DPR=Math.min(window.devicePixelRatio||2,3);
  const DAYS=['Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const DS=['MAR','MIÉ','JUE','VIE','SÁB','DOM'];
  const DN=['14','15','16','17','18','19'];
  const byDay={};
  DAYS.forEach(d=>{byDay[d]=[];});
  (savedAgenda.schedule||[]).forEach(s=>{if(byDay[s.day])byDay[s.day].push(s);});
  DAYS.forEach(d=>{byDay[d].sort((a,b)=>a.time.localeCompare(b.time));});
  const active=DAYS.filter(d=>byDay[d].length>0);
  const nC=active.length||1;
  const cleanDur=s=>(s.duration||'').replace(/\s*min\s*min/i,'min').trim();
  const PAD=24,HDR=72,COL_HDR=46,CW=190,CGAP=10,CARD_PAD=12,CARD_R=8,CARD_GAP=8;
  const FONT_T=12,LINE_T=16,MAX_TL=3,CARD_MIN=90;
  const cv0=document.createElement('canvas');
  const c0=cv0.getContext('2d');
  c0.font=`600 ${FONT_T}px system-ui,-apple-system,sans-serif`;
  const cHts={};
  active.forEach(day=>{
    cHts[day]=byDay[day].map(s=>{
      const tl=_measureLines(c0,s._title||'',CW-CARD_PAD*2-6,MAX_TL);
      return Math.max(CARD_PAD+18+4+tl*LINE_T+4+14+CARD_PAD,CARD_MIN);
    });
  });
  const maxColH=active.reduce((mx,day)=>{
    const h=cHts[day].reduce((s,h)=>s+h+CARD_GAP,0)-CARD_GAP;
    return Math.max(mx,h);
  },0);
  const W=PAD*2+nC*CW+(nC-1)*CGAP;
  const H=HDR+PAD+COL_HDR+CARD_GAP+maxColH+PAD*2;
  const cv=document.createElement('canvas');
  cv.width=W*DPR;cv.height=H*DPR;
  const c=cv.getContext('2d');
  c.scale(DPR,DPR);
  c.fillStyle='#0A0A0A';c.fillRect(0,0,W,H);
  c.fillStyle='#D4900A';c.fillRect(0,0,W,HDR);
  c.fillStyle='#0A0A0A';
  c.font='700 20px system-ui,-apple-system,sans-serif';
  c.textBaseline='alphabetic';
  c.fillText('Mi Plan · FICCI 65',PAD,HDR/2+2);
  c.fillStyle='rgba(0,0,0,0.5)';
  c.font='400 11px system-ui,-apple-system,sans-serif';
  c.fillText('Otrofestiv — '+active.length+' día'+(active.length!==1?'s':''),PAD,HDR/2+18);
  active.forEach((day,ci)=>{
    const x=PAD+ci*(CW+CGAP);
    const di=DAYS.indexOf(day);
    const films=byDay[day];
    const hy=HDR+PAD;
    c.fillStyle='rgba(212,144,10,0.12)';_rr(c,x,hy,CW,COL_HDR,8);c.fill();
    c.fillStyle='rgba(212,144,10,0.5)';c.fillRect(x,hy+COL_HDR-1,CW,1);
    c.fillStyle='#D4900A';
    c.font='700 9px system-ui,-apple-system,sans-serif';
    c.textBaseline='top';c.fillText(DS[di],x+12,hy+9);
    c.fillStyle='#FFFFFF';
    c.font='700 20px system-ui,-apple-system,sans-serif';
    c.fillText(DN[di],x+12,hy+20);
    let cardY=hy+COL_HDR+CARD_GAP;
    films.forEach((s,fi)=>{
      const ch=cHts[day][fi];
      const prio=prioritized&&prioritized.has&&prioritized.has(s._title);
      const dur=cleanDur(s);
      c.fillStyle=prio?'rgba(212,144,10,0.18)':'rgba(255,255,255,0.06)';
      _rr(c,x,cardY,CW,ch,CARD_R);c.fill();
      c.fillStyle=prio?'#D4900A':'rgba(212,144,10,0.35)';
      _rr(c,x,cardY,4,ch,CARD_R);c.fill();
      const tx=x+CARD_PAD+6;let ty=cardY+CARD_PAD;
      c.fillStyle='#D4900A';
      c.font='700 14px system-ui,-apple-system,sans-serif';
      c.textBaseline='top';c.fillText(s.time,tx,ty);
      if(dur){const hw=c.measureText(s.time).width;c.fillStyle='#666';c.font='400 10px system-ui,-apple-system,sans-serif';c.fillText(' · '+dur,tx+hw,ty+2);}
      ty+=22;
      c.fillStyle='#FFF';c.font=`600 ${FONT_T}px system-ui,-apple-system,sans-serif`;
      ty=_drawWrapped(c,s._title||'',tx,ty,CW-CARD_PAD*2-6,LINE_T,MAX_TL);
      if(s.venue){const v=s.venue.length>30?s.venue.slice(0,28)+'…':s.venue;c.fillStyle='#5A5A5A';c.font='400 10px system-ui,-apple-system,sans-serif';c.textBaseline='top';c.fillText(v,tx,cardY+ch-CARD_PAD-11);}
      cardY+=ch+CARD_GAP;
    });
  });
  c.fillStyle='rgba(212,144,10,0.2)';c.fillRect(0,H-1,W,1);
  return cv;
}

function _measureLines(c,text,maxW,maxLines){
  const words=text.split(' ');let line='',lines=1;
  for(let i=0;i<words.length;i++){
    const t=line?line+' '+words[i]:words[i];
    if(c.measureText(t).width>maxW&&line){if(lines>=maxLines)return maxLines;lines++;line=words[i];}
    else{line=t;}
  }
  return lines;
}

function _drawWrapped(c,text,x,y,maxW,lh,maxLines){
  c.textBaseline='top';
  const words=text.split(' ');let line='',ln=0;
  for(let i=0;i<words.length;i++){
    const t=line?line+' '+words[i]:words[i];
    if(c.measureText(t).width>maxW&&line){
      if(ln>=maxLines-1){c.fillText(line+'…',x,y+ln*lh);return y+ln*lh+lh;}
      c.fillText(line,x,y+ln*lh);line=words[i];ln++;
    }else{line=t;}
  }
  if(line)c.fillText(line,x,y+ln*lh);
  return y+ln*lh+lh;
}

function _rr(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function exportICS(){
  if(!savedAgenda||!savedAgenda.schedule.length){showToast('No tienes un Plan guardado','warn');return;}
  const pad=n=>String(n).padStart(2,'0');
  const fmt=dt=>`${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//FICCI65//ES','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  savedAgenda.schedule.forEach(s=>{
    const dateStr=FESTIVAL_DATES[s.day];if(!dateStr) return;
    const start=new Date(`${dateStr}T${s.time}:00`);
    const dur=s.duration?parseInt(s.duration):90;
    const end=new Date(start.getTime()+dur*60000);
    const vc=VENUES[s.venue]||{};
    lines.push('BEGIN:VEVENT',
      `DTSTART:${fmt(start)}`,`DTEND:${fmt(end)}`,
      `SUMMARY:${s._title}`,
      `LOCATION:${s.venue}`,
      `DESCRIPTION:FICCI 65 · ${s.section||''} · ${s.duration||''}`,
      'END:VEVENT');

let cachedResult=null;

function buildResultHTML(scenarios){
  if(!scenarios||!scenarios.length)
    return`<div class="ag-calc-prompt">No hay combinaciones posibles. Ajusta disponibilidad o añade más películas.</div>`;
  const{currentIdx}=cachedResult;
  const sc=scenarios[currentIdx],n=scenarios.length;
  const pending=[...watchlist].filter(t=>!watched.has(t)&&FILMS.some(f=>f.title===t&&!screeningPassed(f)));
  const total=pending.length,ok=sc.schedule.length,bad=sc.excluded.length;
  const isOptimo=currentIdx===0;

  // ── Header: Plan óptimo vs Variación ──
  const planLabel=isOptimo?`${ICONS.calendar} Plan óptimo`:`Variación ${currentIdx}`;

  // ── Navigation ──
  let navHtml='';
  if(n>1){
    const prevLabel=currentIdx<=1?`${ICONS.calendar} Plan óptimo`:`Variación ${currentIdx-1}`;
    const nextLabel=currentIdx===0?'Variación 1':`Variación ${currentIdx+1}`;
    navHtml=`<div class="ag-nav" style="margin-top:8px">
      <button class="ag-nav-btn" onclick="changeScenario(-1)" ${currentIdx===0?'disabled':''}>‹ ${prevLabel}</button>
      <button class="ag-nav-btn" onclick="changeScenario(1)" ${currentIdx===n-1?'disabled':''}>${nextLabel} ›</button>
    </div>`;
  }

  let html=`<div class="ag-summary">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <div>
        <div class="ag-summary-title" style="font-size:${isOptimo?'15px':'13px'};color:${isOptimo?'var(--white)':'var(--gray)'}">${planLabel}</div>
        <div class="ag-summary-text" style="margin-top:3px">
          <span class="ok"><b>${ok}</b></span> de <b>${total}</b> películas
          ${bad?`<span class="conflict-label"> · <b>${bad}</b> con ajustes</span>`:''}
        </div>
        ${sc.incompatiblePriorities?`<div style="margin-top:5px;font-size:11px;color:var(--red)">Las prioridades se solapan entre sí — plan calculado sin forzarlas.</div>`:''}
      </div>
      <button class="ag-save-btn" onclick="saveCurrentScenario()" style="flex-shrink:0">${ICONS.calendar} Elegir Plan</button>
    </div>
    ${navHtml}
  </div>`;

  // ── Film list by day ──
  const byDay={};
  sc.schedule.forEach(s=>{if(!byDay[s.day])byDay[s.day]=[];byDay[s.day].push(s);});
  DAY_KEYS.forEach(day=>{
    const films=byDay[day];if(!films||!films.length) return;
    html+=`<div class="ag-day-label"><span class="ag-day-name">${dayChip(day)}</span><span class="ag-day-cnt">${films.length} película${films.length!==1?'s':''}</span></div>`;
    films.forEach((s,i)=>{
      if(i>0){const warn=travelWarn(films[i-1],s);if(warn) html+=`<div class="ag-warn">${warn}</div>`;}
      html+=mkAgendaRow(s,'scenario');
    });
  });

  // ── Con ajustes ──
  if(sc.excluded.length){
    html+=`<div class="ag-conflicts">
      <div class="ag-conflicts-title" style="color:var(--yellow);font-size:9px;letter-spacing:.8px">CON AJUSTES · ${sc.excluded.length} película${sc.excluded.length!==1?'s':''}</div>
      ${sc.excluded.map(t=>{
        const screens=FILMS.filter(f=>f.title===t&&!isScreeningBlocked(f)&&!screeningPassed(f));
        const swapOptions=screens.map(s=>{
          const displaced=sc.schedule.filter(chosen=>screensConflict(chosen,s)).map(c=>c._title);
          return{screen:s,displaced};
        }).filter(o=>o.displaced.length>=1&&o.displaced.length<=2);
        let fitsHtml='';
        if(swapOptions.length){
          fitsHtml=`<div style="margin-top:5px;font-size:9px">
            <span style="color:var(--gray2);display:block;margin-bottom:3px">Incluirla desplaza:</span>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${swapOptions.map(o=>o.displaced.map(d=>`<button data-ex="${encodeURIComponent(t)}" data-day="${o.screen.day}" data-time="${o.screen.time}" data-dis="${encodeURIComponent(d)}" onclick="swapFilm(decodeURIComponent(this.dataset.ex),this.dataset.day,this.dataset.time,decodeURIComponent(this.dataset.dis));event.stopPropagation()" style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--orange);font-size:9px;padding:3px 8px;border-radius:5px;cursor:pointer;line-height:1.3">${ICONS.switch} ${d.length>20?d.slice(0,18)+'…':d}</button>`).join('')).join('')}
            </div>
          </div>`;
        } else if(screens.length){
          fitsHtml=`<div style="margin-top:3px;font-size:9px;color:var(--gray2)">Solapa con todas las funciones de este plan</div>`;
        } else {
          fitsHtml=`<div style="margin-top:3px;font-size:9px;color:var(--gray2)">Sin funciones futuras disponibles</div>`;
        }
        const isPrio=prioritized.has(t);
        const atLimit=!isPrio&&prioritized.size>=PRIO_LIMIT;
        const prioLabel=isPrio?`${ICONS.x} Sin prioridad`:atLimit?`${ICONS.star} ${PRIO_LIMIT}/${PRIO_LIMIT}`:`${ICONS.star} Priorizar`;
        const prioAction=isPrio?`togglePriority('${t.replace(/'/g,"\\'")}')`:atLimit?`showToast('Máximo ${PRIO_LIMIT} prioridades activas','warn')`:`togglePriority('${t.replace(/'/g,"\\'")}')`;
        const _ic2=FILMS.find(f=>f.title===t)?.is_cortos;
        const _ep=getPosterSrc(t,_ic2);
        const _eph=_ep?`<img class="lb-poster" src="${_ep}" loading="lazy" onerror="this.outerHTML='<div class=lb-poster-ph>🎬</div>'" alt="">`:'<div class="lb-poster-ph">🎬</div>';
        return`<div class="ag-conflict-item">
          ${_eph}
          <div class="ag-conflict-info">
            ${isPrio?`<span style="color:var(--orange);font-size:9px;font-weight:700">${ICONS.star} PRIORIDAD · </span>`:''}
            <strong>${(()=>{const{displayTitle,progSuffix}=parseProgramTitle(t);return displayTitle+(progSuffix?` <span style="color:var(--orange);font-size:9px;font-weight:700">${progSuffix}</span>`:'');})()}</strong>
            ${fitsHtml}
          </div>
          <button class="ag-prioritize-btn${isPrio?' active':''}${atLimit?' disabled':''}" onclick="${prioAction}">
            ${prioLabel}
          </button>
        </div>`;
      }).join('')}
    </div>`;
  }

  return html;
}

function togglePriority(title,cost){
  if(prioritized.has(title)){
    // Si estamos en Planear, confirmar antes de quitar
    if(activeMNav==='mnav-planner'){
      const short=title.length>40?title.slice(0,38)+'…':title;
      showActionModal(`${ICONS.star} Quitar prioridad`,
        `<b>${short}</b><br><br>Sigue en tu Selección, deja de ser prioritaria.`,
        'Quitar prioridad',()=>{
          prioritized.delete(title);savePrio();updateCardState(title);updateAgTab();runCalc();
          showToast('Prioridad eliminada','info');
        });return;
    }
    prioritized.delete(title);
    savePrio();updateCardState(title);updateAgTab();runCalc();
    showToast('Prioridad eliminada','info');
  } else {
    if(prioritized.size>=PRIO_LIMIT){
      showToast(`Máximo ${PRIO_LIMIT} prioridades activas. Quita una para cambiar.`,'warn');return;
    }
    prioritized.add(title);
    if(!watchlist.has(title)){watchlist.add(title);watched.delete(title);saveWL();saveWatched();}
    savePrio();updateCardState(title);updateAgTab();
    showToast(`${ICONS.star} Prioridad activada · ${prioritized.size}/${PRIO_LIMIT}`,'info');
    runCalc();
  }
  if(activeView==='agenda') renderAgenda();
}
function showToast(msg,type='info'){

  if(!t){t=document.createElement('div');t.id='prio-toast';document.body.appendChild(t);}

function swapFilm(excludedTitle, screenDay, screenTime, displacedTitle){
  if(!cachedResult) return;
  const sc=cachedResult.scenarios[cachedResult.currentIdx];
  const newScreen=FILMS.find(f=>f.title===excludedTitle&&f.day===screenDay&&f.time===screenTime);
  if(!newScreen) return;

  // Build the resulting schedule after the swap
  const newSchedule=[...sc.schedule.filter(s=>s._title!==displacedTitle),{...newScreen,_title:excludedTitle}];
  newSchedule.sort((a,b)=>a.day_order!==b.day_order?a.day_order-b.day_order:toMin(a.time)-toMin(b.time));
  const newKey=newSchedule.map(s=>s._title+'@'+s.day+s.time).sort().join('|');

  // Check if this exact schedule already exists in one of the calculated scenarios
  const existingIdx=cachedResult.scenarios.findIndex(s=>{
    const k=s.schedule.map(x=>x._title+'@'+x.day+x.time).sort().join('|');
    return k===newKey;
  });

  if(existingIdx>=0){
    // Jump to the existing scenario
    cachedResult.currentIdx=existingIdx;
    const lbl=existingIdx===0?`${ICONS.calendar} Plan óptimo`:`Variación ${existingIdx}`;
    showToast(`${lbl} — ya tenías esta combinación`,'info');
  } else {
    // Create a new custom scenario
    const pending=[...watchlist].filter(t=>!watched.has(t)&&FILMS.some(f=>f.title===t&&!screeningPassed(f)));
    const included=new Set(newSchedule.map(s=>s._title));
    cachedResult.scenarios.push({
      ...sc,
      schedule:newSchedule,
      excluded:pending.filter(t=>!included.has(t))
    });
    cachedResult.currentIdx=cachedResult.scenarios.length-1;
    showToast(`Variación ${cachedResult.currentIdx} — intercambio personalizado`,'info');
  }

  const res=document.getElementById('ag-result');
  if(res) res.innerHTML=buildResultHTML(cachedResult.scenarios);
}
// ── POST-SELECTION SQUEEZE ──
// Tras elegir un escenario, intenta insertar películas excluidas de la watchlist
// que quepan en los huecos reales del plan elegido (usando screensConflict ±10 min).
// Puede superar trueMax porque ese era el máximo dentro del árbol explorado,
// no el máximo real del calendario.
function squeezeExcluded(schedule, excludedTitles){
  const result=[...schedule];
  // Ordenar excluidas por score descendente — misma lógica que el algoritmo
  const scored=excludedTitles.map(t=>{
    const screens=FILMS.filter(f=>f.title===t&&!screeningPassed(f)&&!isScreeningBlocked(f));
    return{title:t,screens,score:scoreFilm(t,screens,prioritized.has(t),[...watchlist])};
  }).filter(g=>g.screens.length>0).sort((a,b)=>b.score-a.score);

  scored.forEach(({title,screens})=>{
    // Ordenar funciones por estrategia — menos conflictos + fin temprano
    const sorted=sortScreensByStrategy(screens,[...scored]);
    for(const s of sorted){
      if(!result.some(c=>screensConflict(c,s))){
        result.push({...s,_title:title,_squeezed:true});
        break; // encontró slot, pasar al siguiente título
      }
    }
  });
  return result;
}

function runCalc(){
  cachedResult=null;
  const btn=document.querySelector('.av-calc-btn');
  const res=document.getElementById('ag-result');
  // ── Loading state: mostrar siempre aunque el resultado sea idéntico ──
  if(btn){btn.disabled=true;btn.textContent='Calculando…';}
  if(res) res.innerHTML=`<div class="ag-calc-prompt" style="opacity:.6">◌ Calculando escenarios…</div>`;
  // Defer computation to allow browser to paint loading state first
  setTimeout(()=>{
    try{
      const scenarios=computeScenarios([...watchlist]);
      cachedResult={scenarios,currentIdx:0};
      if(res) res.innerHTML=buildResultHTML(scenarios);
    }catch(err){
      if(res) res.innerHTML=`<div class="ag-calc-prompt" style="color:var(--red)"><strong>Error al calcular:</strong><br><code style="font-size:9px">${err.message}</code></div>`;
      /* runCalc error — silent in production */
    }finally{
      if(btn){btn.disabled=false;btn.textContent='CALCULAR ESCENARIOS';}
    }
  },80);
}

  const shortSec=activeSec==='all'?'Categoría':(activeSec.length>18?activeSec.slice(0,16)+'…':activeSec);
  if(lbl) lbl.textContent=shortSec;
  if(trigBtn) trigBtn.classList.toggle('active',activeSec!=='all');
}
function setHint(film){
  const el=document.getElementById('hint');
  if(!film){el.textContent='';el.classList.remove('active');el.style.padding='0 18px';return;}
  const end=toMin(film.time)+parseDur(film.duration)+10;
  el.innerHTML=`${ICONS.clock} Horario: ${minToStr(toMin(film.time)-10)} – ${minToStr(end)} · Toca de nuevo para deseleccionar`;
  el.style.padding='8px 18px';
  el.classList.add('active');
}
function onCardClick(idx,vis){
  if(selectedIdx===idx){selectedIdx=null;setHint(null);}else{selectedIdx=idx;setHint(vis[idx]);}
  applyStates(vis);
}
function applyStates(vis){
  document.querySelectorAll('.card').forEach((card,i)=>{
    card.classList.remove('selected','conflict');
    if(selectedIdx===null) return;
    if(i===selectedIdx) card.classList.add('selected');
    else{
      const fStart=toMin(vis[i].time),sel=vis[selectedIdx];
      const s=toMin(sel.time)-10,e=toMin(sel.time)+parseDur(sel.duration)+10;
      if(fStart>s&&fStart<e) card.classList.add('conflict');
    }
  });
}
const expandedProgs=new Set(JSON.parse(sessionStorage.getItem('ficci65_exp')||'[]'));
function toggleExpand(el,e){
  e.stopPropagation();
  const card=el.closest('.card');
  const listEl=card.querySelector('.c-film-list,.c-title-pills');
  const arrow=el.querySelector('.c-expand-arrow');
  if(!listEl) return;
  listEl.classList.toggle('visible');arrow.classList.toggle('open');
  const open=listEl.classList.contains('visible');
  el.querySelector('span:first-child').textContent=open?'Ocultar programa':'Ver programa';
  const title=card.dataset.title;
  if(title){if(open) expandedProgs.add(title);else expandedProgs.delete(title);}
  try{sessionStorage.setItem('ficci65_exp',JSON.stringify([...expandedProgs]));}catch(er){}
}
function restoreExpand(){
  if(!expandedProgs.size) return;
  document.querySelectorAll('.card.program[data-title]').forEach(card=>{
    if(!expandedProgs.has(card.dataset.title)) return;
    const listEl=card.querySelector('.c-film-list,.c-title-pills');
    const arrow=card.querySelector('.c-expand-arrow');
    const lbl=card.querySelector('.c-expand span:first-child');
    if(listEl){listEl.classList.add('visible');if(arrow) arrow.classList.add('open');if(lbl) lbl.textContent='Ocultar programa';}
  });
}

function render(){
  if(activeView==='agenda') return;
  renderVbar();renderSbar();
  let films=FILMS.filter(f=>f.day===activeDay);
  if(activeVenue!=='all') films=films.filter(f=>vcfg(f.venue).short===activeVenue);
  if(activeSec!=='all') films=films.filter(f=>f.section===activeSec);
  restoreExpand();
  const cntEl=document.getElementById('cnt');
  if(activeVenue!=='all'||activeSec!=='all'){
    cntEl.innerHTML=`<b>${films.length}</b> función${films.length!==1?'es':''}`;
  } else {
    cntEl.innerHTML='';
  }
  const grid=document.getElementById('grid');
  if(!films.length){grid.innerHTML=emptyState(ICONS.search,'Sin funciones para este filtro.','Ajusta los filtros de sección o sede.');return;}
  grid.innerHTML=films.map((f,i)=>{
    const vc=vcfg(f.venue),sl=sala(f.venue);
    const isAp=f.section==='🎬 Apertura',isMid=f.section==='🌙 Medianoche',isProg=f.is_cortos;
    const passed=screeningPassed(f);
    const flags=f.flags||'🎬';
    const tEn=!isProg&&f.title_en&&f.title_en!==f.title&&!f.title_en.includes('·')?f.title_en:'';
    const durMin=f.duration?parseInt(f.duration):0;
    const secActive=activeSec===f.section?' active-sec':'';
    const inWL=watchlist.has(f.title),inW=watched.has(f.title);
    let filmBlock='';
    if(isProg){
      const list=f.film_list||[];
      if(list.length) filmBlock=`<div class="c-film-list">${list.map((item,n)=>{const thumb=getPosterSrc(item.title,item.is_cortos!==false);const thumbHtml=thumb?`<img src="${thumb}" class="c-film-thumb" loading="lazy" onerror="this.outerHTML='<div class=c-film-thumb-ph>🎬</div>'" alt="">`:'<div class="c-film-thumb-ph">🎬</div>';return`<div class="c-film-item">${thumbHtml}<div class="c-film-num">${n+1}</div><div class="c-film-info"><div class="c-film-title">${item.title}</div><div class="c-film-meta">${item.country}${item.duration?" · "+item.duration:""}</div></div><a class="c-film-lb" href="https://letterboxd.com/search/films/${encodeURIComponent(item.title)}/" target="_blank" rel="noopener" onclick="event.stopPropagation()">${LB_SVG}</a></div>`;}).join('')}</div>`;
      else{const titles=(f.title_en||'').split('·').map(t=>t.trim()).filter(Boolean);if(titles.length) filmBlock=`<div class="c-title-pills">${titles.map(t=>`<span class="c-title-pill">${t}</span>`).join('')}</div>`;}
    }
    const expandBtn=isProg&&filmBlock?`<div class="c-expand" onclick="toggleExpand(this,event)"><span>Ver programa</span><span class="c-expand-arrow">▼</span></div>`:'';
    const safe=f.title.replace(/"/g,'&quot;').replace(/'/g,"\'");
    const inPrio=prioritized.has(f.title);
    const prioBtn=`<button class="action-btn prio-btn${inPrio?' prio-on':''}" onclick="togglePriority('${safe}')" title="${inPrio?'Quitar prioridad':'Priorizar'}">${ICONS.star}</button>`;
    const actBtns=`<div class="card-actions">
      <button class="action-btn wl-btn${inWL?' wl-on':''}" onclick="toggleWL('${safe}',event)" title="${inWL?'Quitar de Selección':'Añadir a Selección'}">${inWL?ICONS.heartFill:ICONS.heart}</button>
      <button class="action-btn w-btn${inW?' w-on':''}" onclick="toggleWatched('${safe}',event)" title="${inW?'Marcar como pendiente':'Marcar como vista'}">${ICONS.check}</button>
      ${prioBtn}
    </div>`;
    const apBadge=isAp?'<div class="apertura-badge">✦ APERTURA</div>':'';
    const nowBadge=isNowShowing(f)?'<div class="now-label"><span class="now-pulse"></span>AHORA</div>':'';
    const pastBadge=passed?'<div class="past-badge">ya pasó</div>':'';
    const lbPill=isProg?'':`<a class="c-lb" href="https://letterboxd.com/search/films/${encodeURIComponent(f.title)}/" target="_blank" rel="noopener" onclick="event.stopPropagation()">${LB_SVG}<span class="c-lb-text">Letterboxd</span></a>`;
    // Poster: films use getPosterSrc; programs use official FICCI 65 festival poster
    const FICCI_POSTER='https://ficcifestival.com/sites/default/files/2026-02/logo-ficci65_2.png';
    let posterSrc=null, posterHtml='';
    if(!isProg){
      posterSrc=getPosterSrc(f.title,false);
      if(posterSrc) posterHtml=`<div class="c-poster"><img src="${posterSrc}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=c-poster-none>🎬</div>'"></div>`;
      else posterHtml=`<div class="c-poster"><div class="c-poster-none">🎬</div></div>`;
    } else {
      posterSrc=true;
      posterHtml=`<div class="c-poster"><img src="${FICCI_POSTER}" alt="FICCI 65" loading="lazy" style="object-fit:contain;background:#111" onerror="this.parentElement.innerHTML='<div class=c-poster-none>🎬</div>'"></div>`;
    }
    const hasPoster=!!posterSrc;
    const{displayTitle,progSuffix}=parseProgramTitle(f.title);
    const durLongHtml=durMin>150?`<span class="c-dur-long">${ICONS.clock} ${Math.floor(durMin/60)}h ${durMin%60}min</span>`:'';
    const zoneHtml=`
      <div class="c-slot-time"><div class="c-time" style="${passed?'color:var(--gray2)':''}">${f.time}</div></div>
      <div class="c-slot-title"><div class="c-title">${displayTitle}${isMid?' 🌙':''}</div></div>
      <div class="c-slot-flags"><div class="c-flags">${flags}</div></div>
      <div class="c-slot-dur"><div class="c-meta-ico">${ICONS.clock} ${f.duration}</div></div>
      <div class="c-slot-venue"><div class="c-meta-ico">${ICONS.pin} ${vc.short}${sl?' · '+sl:''}</div></div>
      <div class="c-slot-space"></div>`;
    const posterCol=posterHtml
      ?posterHtml
      :`<div class="c-poster empty"><div class="c-poster-none"></div></div>`;
    return`<div class="card${isAp?' apertura':isProg?' program':''}${hasPoster?' has-poster':''}${inWL&&!inW?' in-wl':inW?' in-watched':''}${passed?' past-card':''}" data-idx="${i}" data-title="${f.title.replace(/"/g,'&quot;')}">
      ${pastBadge}${nowBadge}${actBtns}
      <div class="c-body">
        ${posterCol}<div class="c-content">${zoneHtml}</div>
      </div>
      ${filmBlock}
      <div class="c-divider"></div>
      <div class="c-foot">
        <div class="c-foot-left">
          ${apBadge}${isProg&&expandBtn?expandBtn:`<span class="c-sec${secActive}" data-sec="${f.section.replace(/"/g,'&quot;')}">${f.section}</span>`}
          ${lbPill}
        </div>
        <div class="c-foot-space"></div>
        <div class="c-foot-right">
          ${progSuffix?`<span class="c-dur" style="color:var(--gray2)">${progSuffix}</span>`:''} 
        </div>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('.card-actions')||e.target.closest('.c-expand')||e.target.closest('.c-lb')) return;
      if(e.target.closest('.c-sec')){const sec=e.target.closest('.c-sec').dataset.sec;activeSec=activeSec===sec?'all':sec;selectedIdx=null;setHint(null);render();return;}
      onCardClick(parseInt(card.dataset.idx),films);
    });
  });
  if(selectedIdx!==null&&selectedIdx<films.length) applyStates(films);
}
