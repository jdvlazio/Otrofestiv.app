name: Create bundle for Capgo updater

on:
  push:
    branches: [main]

concurrency:
  group: bundle-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build number
        id: build
        run: echo "number=$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Build www folder from repo root
        run: |
          mkdir -p www/festivals www/i18n www/assets/leviza
          # Estampar BUILD_VERSION con timestamp del deploy — fuerza SW cache bust
          sed -i "s/const BUILD_VERSION='[^']*'/const BUILD_VERSION='${{ steps.build.outputs.number }}'/" index.html
          cp index.html www/
          cp sw.js www/
          cp manifest.json www/
          cp version.json www/
          cp update.json www/
          cp icon-192.png www/ 2>/dev/null || true
          cp icon-512.png www/ 2>/dev/null || true
          cp -r festivals/. www/festivals/ 2>/dev/null || true
          cp -r i18n/. www/i18n/ 2>/dev/null || true
          cp -r assets/. www/assets/ 2>/dev/null || true
          echo "www contents:"
          ls -la www/

      - name: Create bundle zip
        run: |
          cd www && zip -r ../bundle.zip . && cd ..
          echo "Bundle size: $(du -sh bundle.zip)"

      - name: Update update.json
        run: |
          echo "{\"version\":\"${{ steps.build.outputs.number }}\",\"url\":\"https://github.com/jdvlazio/Otrofestiv.app/releases/download/v${{ steps.build.outputs.number }}/bundle.zip\"}" > update.json
          cat update.json

      - name: Commit update.json
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add update.json
          git diff --staged --quiet || git commit -m "chore: bundle v${{ steps.build.outputs.number }}" && git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.build.outputs.number }}
          name: Bundle ${{ steps.build.outputs.number }}
          files: bundle.zip
          body: "Bundle automático — commit ${{ github.sha }}"
