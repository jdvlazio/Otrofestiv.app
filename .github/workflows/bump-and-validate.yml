name: Bump version y validar

on:
  push:
    paths:
      - 'index.html'
      - 'sw.js'
      - 'version.json'
      - 'validate.py'
      - 'festivals/**.json'
      - 'tests/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Bump version y validar app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validar app
        run: python3 validate.py

      - name: Unit tests dominio
        run: node --test tests/unit/*.test.js
