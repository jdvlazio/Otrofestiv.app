name: Playwright Tests

on:
  push:
    paths:
      - 'index.html'
      - 'src/**'
      - 'sw.js'
      - 'festivals/**.json'
      - 'tests/**.spec.js'
      - 'tests/helpers.js'
      - 'playwright.config.js'
  pull_request:
    paths:
      - 'index.html'
      - 'src/**'
      - 'tests/**.spec.js'
      - 'tests/helpers.js'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Regression tests

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # webkit = motor de iOS para el spec responsive cross-engine (proyecto
        # ios-mobile). chromium cubre la suite de comportamiento + el proyecto
        # android-small (Blink@360).
        run: npx playwright install --with-deps chromium webkit

      - name: Smoke tests
        run: npx playwright test tests/smoke.spec.js

      - name: Regression tests
        run: npx playwright test tests/programa.spec.js tests/sheet.spec.js tests/planner.spec.js tests/miplan.spec.js tests/festivals.spec.js

      - name: Feature tests
        run: npx playwright test tests/auth.spec.js tests/search.spec.js tests/i18n.spec.js tests/i18n-boot.spec.js

      - name: Cross-engine responsive tests
        # Invariantes de layout deterministas bajo WebKit@390 (ios-mobile) +
        # Blink@360 (android-small). El filtro de archivo sólo matchea esos dos
        # proyectos (chromium tiene testIgnore sobre responsive.spec.js); la suite
        # de comportamiento de arriba sigue corriendo SÓLO en chromium@390.
        run: npx playwright test tests/responsive.spec.js

      - name: Run visual audit
        run: |
          mkdir -p test-results/visual
          mkdir -p test-results/visual
          npx playwright test tests/visual-audit.spec.js --reporter=list || true

      - name: Upload screenshots (visual audit)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: visual-audit-screenshots
          path: test-results/visual/
          retention-days: 14

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results.json
          retention-days: 7
