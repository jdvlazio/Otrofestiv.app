name: Playwright Tests

on:
  push:
    paths:
      - 'index.html'
      - 'sw.js'
      - 'festivals/**.json'
      - 'tests/**.spec.js'
      - 'tests/helpers.js'
      - 'playwright.config.js'
  pull_request:
    paths:
      - 'index.html'
      - 'tests/**.spec.js'
      - 'tests/helpers.js'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Regression tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npx playwright test tests/smoke.spec.js

      - name: Regression tests
        run: npx playwright test tests/programa.spec.js tests/sheet.spec.js tests/planner.spec.js tests/miplan.spec.js tests/festivals.spec.js

      - name: Run visual audit
        run: |
          mkdir -p test-results/visual
          npx playwright test tests/visual-audit.spec.js --reporter=list || true

      - name: Upload screenshots (visual audit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-audit-screenshots
          path: test-results/visual/
          retention-days: 14

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results.json
          retention-days: 7
