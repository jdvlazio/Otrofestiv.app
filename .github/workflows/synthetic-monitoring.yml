name: Synthetic Monitoring

on:
  schedule:
    # Corre cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    name: Flujos críticos en producción

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Confirmación de falla: el monitor solo debe alertar ante degradación
      # SOSTENIDA, no ante blips transitorios del CDN de GitHub Pages (que se
      # autosanan en segundos). Si la primera pasada falla, espera 60s y reintenta
      # la suite completa; el job solo queda rojo si la SEGUNDA pasada también
      # falla. (Playwright ya reintenta cada test 2× dentro de cada pasada.)
      - name: Run monitoring tests contra producción (con confirmación)
        env:
          BASE_URL: https://otrofestiv.app
        run: |
          if npx playwright test tests/monitoring.spec.js; then
            echo "✓ Monitor verde en la primera pasada."
            exit 0
          fi
          echo "::warning::Primera pasada falló — reintentando en 60s para descartar blip transitorio del CDN."
          sleep 60
          npx playwright test tests/monitoring.spec.js

      - name: Upload reporte si falla
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: monitoring-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
