name: Synthetic Monitoring

on:
  schedule:
    # Corre cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    name: Flujos críticos en producción

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run monitoring tests contra producción
        run: npx playwright test tests/monitoring.spec.js
        env:
          BASE_URL: https://otrofestiv.app

      - name: Upload reporte si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
